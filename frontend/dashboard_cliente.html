<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Operaciones | iCare Tech CR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0c10; --card: #1f2833; --accent: #00b4d8; --text: #f5f5f7; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* HEADER */
        header { background: #11141a; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .top-nav { display: flex; gap: 20px; margin-left: 40px; }
        .top-nav button { background: none; border: none; color: #8a99ad; cursor: pointer; font-weight: 600; padding: 10px; transition: 0.3s; }
        .top-nav button:hover, .top-nav button.active { color: var(--accent); }
        
        /* SIDEBAR Y LAYOUT */
        .app-layout { display: flex; flex: 1; }
        .sidebar { width: 280px; background: #11141a; padding: 20px; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar h3 { font-size: 12px; color: #555; text-transform: uppercase; margin: 20px 0 10px; }
        .sidebar li { padding: 12px; cursor: pointer; border-radius: 6px; list-style: none; color: #8a99ad; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .sidebar li:hover { background: var(--card); color: var(--accent); }
        .main-content { flex: 1; padding: 40px; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; }
    </style>
</head>
<body>

<header>
    <h1>iCare <span style="color:var(--accent)">OPS</span></h1>
    <nav class="top-nav" id="top-nav">
        <button onclick="showSidebar('inicio')"><i class="fas fa-home"></i> Inicio</button>
        <button onclick="showSidebar('facturacion')"><i class="fas fa-file-invoice"></i> Facturación</button>
        <button onclick="showSidebar('proformas')"><i class="fas fa-calculator"></i> Proformas</button>
        <button onclick="showSidebar('recepcion')"><i class="fas fa-file-import"></i> Recepción</button>
    </nav>
</header>

<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <ul id="menu-opciones"></ul>
    </aside>

    <main class="main-content">
        <div id="contenido-dinamico" class="card">
            <h2>Panel de Control</h2>
            <p>Bienvenido al Centro de Operaciones Corporativas iCare Tech CR.</p>
        </div>
    </main>
</div>

<script>
    const menuData = {
        'inicio': [
            { nombre: 'Mi Plan', icon: 'fa-box' },
            { nombre: 'Clientes', icon: 'fa-users' },
            { nombre: 'Productos', icon: 'fa-tags' },
            { nombre: 'POS', icon: 'fa-cash-register' }
        ],
        'facturacion': [
            { nombre: 'Nueva factura', icon: 'fa-file-plus' },
            { nombre: 'Nuevo tiquete', icon: 'fa-receipt' },
            { nombre: 'Nueva compra', icon: 'fa-shopping-cart' },
            { nombre: 'Nueva exportación', icon: 'fa-plane' },
            { nombre: 'Borradores', icon: 'fa-edit' },
            { nombre: 'Documentos programados', icon: 'fa-calendar' },
            { nombre: 'Documentos generados', icon: 'fa-list' }
        ],
        'proformas': [
            { nombre: 'Nueva proforma', icon: 'fa-calculator' },
            { nombre: 'Proformas generadas', icon: 'fa-file-alt' }
        ],
        'recepcion': [
            { nombre: 'Cargar documento', icon: 'fa-upload' },
            { nombre: 'Documentos cargados', icon: 'fa-folder-open' },
            { nombre: 'Correos recibidos', icon: 'fa-envelope' }
        ]
    };

    function showSidebar(cat) {
        const lista = document.getElementById('menu-opciones');
        lista.innerHTML = '<h3>' + cat.toUpperCase() + '</h3>';
        menuData[cat].forEach(op => {
            lista.innerHTML += `<li onclick="alert('Cargando ${op.nombre}...')"><i class="fas ${op.icon}"></i> ${op.nombre}</li>`;
        });
    }

    async function renderTabla(opcion) {
    const contenedor = document.getElementById('contenido-dinamico');
    contenedor.innerHTML = `<h2>${opcion}</h2><div id="tabla-datos">Cargando...</div>`;
    
    try {
        const res = await fetch('/api/cliente/datos-operativos');
        const data = await res.json();
        
        if(opcion === 'Facturas Emitidas') {
            document.getElementById('tabla-datos').innerHTML = `
                <table style="width:100%; border-collapse:collapse;">
                    <thead>
                        <tr style="border-bottom:2px solid var(--accent)">
                            <th style="padding:15px;">Consecutivo</th>
                            <th style="padding:15px;">Fecha</th>
                            <th style="padding:15px;">Monto</th>
                            <th style="padding:15px;">Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.facturas.map(f => `
                            <tr style="border-bottom:1px solid rgba(255,255,255,0.05)">
                                <td style="padding:15px;">${f.consecutivo}</td>
                                <td style="padding:15px;">${f.fecha}</td>
                                <td style="padding:15px;">₡${f.monto}</td>
                                <td style="padding:15px;"><span style="color:var(--accent)">${f.estado}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
    } catch(e) {
        contenedor.innerHTML = "<h2>Error</h2><p>No se pudieron cargar los datos.</p>";
    }
}

    // Carga inicial
    showSidebar('facturacion');
</script>
</body>
</html>
