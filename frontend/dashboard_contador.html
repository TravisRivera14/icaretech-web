<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Contador | iCare Tech CR</title>
    <link rel="icon" href="Logo_Pestana_v2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
    <link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
    <script src="https://jsuites.net/v4/jsuites.js"></script>
    <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />

    <style>
        :root {
            --bg-dark: #f8fafc; 
            --sidebar-bg: #11141a;
            --card-bg: #1f2833;
            --text-light: #f5f5f7;
            --text-muted: #8a99ad;
            --neon-blue: #55bbcc; 
            --btn-green: #10b981;
            --border-color: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s ease;
            --del: #ff3b30;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg-dark); 
            color: #1e293b; 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden; 
            font-size: 14px; 
            -webkit-font-smoothing: antialiased; 
        }
        
        .sidebar { 
            width: 280px; 
            background: var(--sidebar-bg); 
            border-right: 1px solid #e2e8f0; 
            display: flex; 
            flex-direction: column; 
            position: fixed; 
            height: 100vh; 
            z-index: 100; 
            overflow-y: auto; 
        }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .sidebar-header { 
            padding: 30px 20px 15px 20px; 
            text-align: center; 
            border-bottom: 1px solid var(--border-color); 
        }

        .main-logo-img { 
            height: 65px; 
            object-fit: contain; 
            filter: brightness(0) invert(1); 
        }

        .empresa-badge { 
            background: rgba(16, 185, 129, 0.1); 
            color: var(--btn-green); 
            padding: 5px 10px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 700; 
            display: inline-block; 
            margin-top: 15px;
        }
        
        .nav-menu { padding: 15px 0; }
        
        .nav-item { 
            padding: 12px 25px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            color: var(--text-muted); 
            text-decoration: none; 
            cursor: pointer; 
            transition: var(--transition); 
            font-weight: 500; 
            font-size: 14px; 
        }

        .nav-item:hover, .nav-item.active { 
            color: var(--neon-blue); 
            background: rgba(255,255,255,0.02); 
            border-left: 4px solid var(--neon-blue); 
        }

        .nav-item i.main-icon { width: 25px; font-size: 16px; }

        .logout-btn { padding: 15px; border-top: 1px solid var(--border-color); margin-top: 10px; }
        .logout-btn a { 
            display: block; 
            text-align: center; 
            padding: 10px; 
            background: rgba(255, 59, 48, 0.1); 
            color: #ff3b30; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 13px; 
            cursor: pointer;
        }
        .logout-btn a:hover { background: #ff3b30; color: white; }
        
        .main-content { flex: 1; margin-left: 280px; padding: 35px 45px; overflow-y: auto;}
        
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; padding-bottom: 20px; border-bottom: 2px solid #e2e8f0; }
        .user-profile { display: flex; align-items: center; gap: 12px; padding-left: 18px; border-left: 2px solid #e2e8f0; cursor: pointer; }
        .user-initial { width: 38px; height: 38px; border-radius: 50%; background: var(--btn-green); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 16px; }
        .user-meta { display: flex; flex-direction: column; text-align: right; }
        .user-meta b { font-size: 14px; color: #1e293b; }
        .user-meta span { font-size: 11.5px; color: #ff3b30; font-weight: 600;}

        .page-title { margin: 0 0 20px 0; font-size: 22px; font-weight: 700; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px;}
        .card { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 25px; color: white;}
        
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .metric-box { background: #11141a; padding: 20px; border-radius: 10px; border: 1px solid var(--border-color); }
        .metric-box p { margin: 0 0 8px 0; font-size: 11.5px; color: var(--text-muted); font-weight: 700; text-transform:uppercase;}
        .metric-box h3 { margin: 0; font-size: 24px; font-weight: 700; color: #fff; }

        .form-input { width: 100%; padding: 12px 15px; margin-bottom: 15px; border-radius: 8px; background: #11141a; border: 1px solid var(--border-color); color: #fff; font-size: 14px; transition: 0.3s; box-sizing: border-box; font-family: inherit; }
        .form-input:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.15);}
        label { color: var(--text-muted); font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block;}
        
        .btn-top { padding: 9px 16px; border-radius: 6px; border: none; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; background: var(--neon-blue); color: #fff; }
        .btn-top:hover { opacity: 0.9; }

        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; color: #fff;}
        .admin-table th { color: var(--text-muted); text-align: left; padding: 14px 15px; border-bottom: 2px solid var(--border-color); font-weight: 600; text-transform: uppercase; font-size: 11.5px; background: #11141a; }
        .admin-table td { padding: 15px; border-bottom: 1px solid var(--border-color); color: #cfd8dc; }
        
        .fact-btn-del { padding: 8px 12px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; border-radius: 6px; cursor: pointer;}
        .fact-btn-view { padding: 8px 14px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--btn-green); border-radius: 6px; cursor: pointer;}

        .jexcel_container { background: white; border-radius: 8px; overflow: hidden; }
        .jexcel > thead > tr > td { background-color: #f1f5f9; color: #1e293b; font-weight: bold; }
        
        /* BURBUJA CABYS */
        .cabys-wrapper { position: relative; }
        .cabys-dropdown { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #1f2833; border: 1px solid var(--neon-blue); z-index: 9999; border-radius: 8px; max-height: 250px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 5px; }
        .cabys-item { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; color: #fff; font-size: 13px; transition: 0.2s; }
        .cabys-item:hover { background: var(--neon-blue); color: #000; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <img src="Logo.png" alt="iCare Tech" class="main-logo-img">
            <div><span class="empresa-badge"><i class="fas fa-calculator"></i> Portal Contadores</span></div>
        </div>
        
        <div class="nav-menu" id="sidebar-dynamic-menu">
            <a class="nav-item active" onclick="mostrarModulo('dashboard', this)"><div><i class="fas fa-chart-pie main-icon"></i> Mi Dashboard</div></a>
            <a class="nav-item" onclick="mostrarModulo('excel', this)"><div><i class="fas fa-file-excel main-icon"></i> Hoja de Trabajo (Excel)</div></a>
            
            <div style="margin: 15px 25px; border-top: 1px solid var(--border-color);"></div>
            <div style="padding: 0 25px; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Módulos del Cliente</div>
            
            <a class="nav-item" onclick="mostrarModulo('Inicio Facturador', this)"><div><i class="fas fa-rocket main-icon"></i> Inicio Facturador</div></a>
            <a class="nav-item" onclick="mostrarModulo('Clientes', this)"><div><i class="fas fa-users main-icon"></i> Clientes</div></a>
            <a class="nav-item" onclick="mostrarModulo('Catálogo CABYS', this)"><div><i class="fas fa-box main-icon"></i> Catálogo CABYS</div></a>
            <a class="nav-item" onclick="mostrarModulo('Nueva Factura', this)"><div><i class="fas fa-file-invoice-dollar main-icon"></i> Nueva Factura</div></a>
            <a class="nav-item" onclick="mostrarModulo('Historial de Facturas', this)"><div><i class="fas fa-file-alt main-icon"></i> Historial Facturas</div></a>
            <a class="nav-item" onclick="mostrarModulo('Nueva Proforma', this)"><div><i class="fas fa-file-contract main-icon"></i> Nueva Proforma</div></a>
            <a class="nav-item" onclick="mostrarModulo('Proformas Generadas', this)"><div><i class="fas fa-file-signature main-icon"></i> Proformas</div></a>
            <a class="nav-item" onclick="mostrarModulo('Datos de la Empresa', this)"><div><i class="fas fa-id-card main-icon"></i> Datos Empresa</div></a>
            <a class="nav-item" onclick="mostrarModulo('Llave Hacienda (.p12)', this)"><div><i class="fas fa-key main-icon"></i> Llave Hacienda</div></a>
        </div>
        
        <div class="logout-btn"><a onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></div>
    </nav>

    <main class="main-content">
        <div class="topbar">
            <div>
                <h2 style="color:#1e293b; font-size: 18px; font-weight: 800;">Panel de Control Contable</h2>
            </div>
            <div class="user-profile" onclick="logout()">
                <div class="user-meta"><b id="header-user-name">...</b><span>Cerrar Sesión</span></div>
                <div class="user-initial" id="header-user-initial">C</div>
            </div>
        </div>

        <div id="vista-principal"></div>

    </main>

    <script>
        let excelApp = null;
        window.userDataCache = {};
        window.lineasDocumento = []; 
        window.clientesCache = [];
        window.productosCache = [];

        function mostrarModulo(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            
            const contenedor = document.getElementById('vista-principal');

            if (id === 'dashboard') {
                contenedor.innerHTML = `
                    <h2 class="page-title">Resumen de Clientes</h2>
                    <div class="metrics-grid">
                        <div class="metric-box" style="border-left: 4px solid var(--neon-blue);"><p>EMPRESAS ASIGNADAS</p><h3 id="tot-empresas">1</h3></div>
                        <div class="metric-box"><p>DOCUMENTOS PROCESADOS (MES)</p><h3 id="tot-docs">0</h3></div>
                        <div class="metric-box"><p>ALERTAS HACIENDA</p><h3 style="color:var(--btn-green);">0</h3></div>
                    </div>

                    <div class="card">
                        <h3 style="margin-bottom: 20px; font-size: 18px; color: #fff;"><i class="fas fa-building" style="color:var(--neon-blue);"></i> Empresas bajo mi gestión</h3>
                        <p style="color:var(--text-muted); margin-bottom: 20px;">Como contador, tienes acceso a la data fiscal y al catálogo CABYS de tu cliente corporativo.</p>
                        <div id="lista-empresas-contador" style="background:#11141a; padding:20px; border-radius:8px; border:1px solid var(--border-color);">
                            Cargando empresa...
                        </div>
                    </div>
                `;
                if(window.userDataCache.empresa) {
                    document.getElementById('tot-docs').innerText = window.userDataCache.facturas_mes_actual || 0;
                    document.getElementById('lista-empresas-contador').innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <b style="color:var(--neon-blue); font-size:16px;">${window.userDataCache.empresa}</b><br>
                                <span style="font-size:12px; color:var(--text-muted);">Plan Activo: ${window.userDataCache.plan}</span>
                            </div>
                            <span style="color:var(--btn-green); font-size: 12px; font-weight: bold;"><i class="fas fa-check-circle"></i> Conectado</span>
                        </div>
                    `;
                }
            }
            else if (id === 'excel') {
                contenedor.innerHTML = `
                    <h2 class="page-title">Hoja de Trabajo y Reportes Financieros</h2>
                    <div class="card" style="padding: 20px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom: 15px;">
                            <p style="color:var(--text-muted);">Herramienta de cálculo integrada. Compatible con fórmulas estándar (SUM, AVERAGE, etc).</p>
                            <button style="background:var(--btn-green); color:white; border:none; padding:8px 15px; border-radius:6px; font-weight:bold; cursor:pointer;" onclick="if(excelApp) excelApp.download();"><i class="fas fa-download"></i> Exportar CSV</button>
                        </div>
                        <div id="spreadsheet"></div>
                    </div>
                `;
                excelApp = jexcel(document.getElementById('spreadsheet'), {
                    data: [
                        ['Ventas Enero', 1500000, 195000, '=B1+C1'],
                        ['Ventas Febrero', 2100000, 273000, '=B2+C2'],
                        ['Compras Enero', -500000, -65000, '=B3+C3'],
                        ['', '', '', ''],
                        ['TOTALES', '=SUM(B1:B4)', '=SUM(C1:C4)', '=SUM(D1:D4)']
                    ],
                    columns: [
                        { type: 'text', title:'Concepto', width:250 },
                        { type: 'numeric', title:'Subtotal (₡)', width:150, mask:'₡ #.##,00' },
                        { type: 'numeric', title:'IVA (₡)', width:150, mask:'₡ #.##,00' },
                        { type: 'numeric', title:'Total Bruto', width:150, mask:'₡ #.##,00' },
                    ],
                    minDimensions: [6, 15]
                });
            }
            else if (id === 'Inicio Facturador') {
                contenedor.innerHTML = `
                    <div class="card">
                        <h2 class="page-title" style="color:white; border-bottom: 1px solid var(--border-color);">Panel Fiscal de: <span style="color:var(--neon-blue);">${window.userDataCache.empresa}</span></h2>
                        <div class="metrics-grid">
                            <div class="metric-box"><p>VENTAS NETAS</p><h3>₡0.00</h3></div>
                            <div class="metric-box"><p>COMPRAS NETAS</p><h3>₡0.00</h3></div>
                            <div class="metric-box"><p>BALANCE NETAS</p><h3>₡0.00</h3></div>
                        </div>
                    </div>
                `;
            }
            else if (id === 'Clientes') {
                contenedor.innerHTML = `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:15px;">
                            <h2 style="margin:0; color:white;"><i class="fas fa-users" style="color:var(--neon-blue);"></i> Clientes del Contribuyente</h2>
                            <button class="btn-top" onclick="document.getElementById('form-cliente').style.display='block'"><i class="fas fa-plus"></i> Registrar Cliente</button>
                        </div>
                        <div id="form-cliente" style="display:none; background:#11141a; padding:25px; border-radius:12px; margin-bottom:25px; border:1px solid var(--border-color);">
                            <h3 style="color:white; margin-bottom: 15px;">Nuevo Cliente</h3>
                            <form onsubmit="window.guardarClienteFact(event)" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                                <div><label>Nombre o Razón Social</label><input type="text" id="fc-nombre" class="form-input" required></div>
                                <div><label>Identificación</label><input type="text" id="fc-cedula" class="form-input" required></div>
                                <div><label>Tipo Identificación</label><select id="fc-tipo" class="form-input"><option value="01">Física</option><option value="02">Jurídica</option></select></div>
                                <div><label>Correo Electrónico</label><input type="email" id="fc-correo" class="form-input" required></div>
                                <div><label>Teléfono</label><input type="text" id="fc-telefono" class="form-input"></div>
                                <div style="grid-column:1/-1; display:flex; gap:10px; justify-content:flex-end;">
                                    <button type="button" class="btn-top" style="background:#475569;" onclick="document.getElementById('form-cliente').style.display='none'">Cancelar</button>
                                    <button type="submit" class="btn-top"><i class="fas fa-save"></i> Guardar Cliente</button>
                                </div>
                            </form>
                        </div>
                        <div id="tabla-clientes-fact">Cargando clientes...</div>
                    </div>
                `;
                window.cargarClientesFact();
            }
            else if (id === 'Catálogo CABYS') {
                contenedor.innerHTML = `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:15px;">
                            <h2 style="margin:0; color:white;"><i class="fas fa-box" style="color:var(--neon-blue);"></i> Catálogo CABYS del Cliente</h2>
                            <button class="btn-top" onclick="document.getElementById('form-prod-box').style.display='block'"><i class="fas fa-plus"></i> Nuevo Ítem</button>
                        </div>
                        <div id="form-prod-box" style="display:none; background:#11141a; padding:25px; border-radius:12px; border:1px solid var(--border-color); margin-bottom:25px;">
                            <form onsubmit="window.guardarProductoFact(event)">
                                <div class="cabys-wrapper" style="grid-column:1/-1; margin-bottom:15px;">
                                    <label>Buscar Código CABYS Oficial (Hacienda)</label>
                                    <input type="text" id="buscador-cabys-oficial" class="form-input" placeholder="Escribe el nombre del artículo..." autocomplete="off" onkeyup="window.buscarCabysOficial(this.value)">
                                    <div id="cabys-oficial-dropdown" class="cabys-dropdown"></div>
                                </div>
                                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; width: 100%;">
                                    <div><label>Código CABYS</label><input type="text" id="fp-cabys" class="form-input" required placeholder="13 dígitos"></div>
                                    <div><label>Descripción</label><input type="text" id="fp-desc" class="form-input" required></div>
                                    <div><label>Precio Unitario (₡)</label><input type="number" id="fp-precio" class="form-input" step="0.01" required></div>
                                    <div><label>IVA (%)</label><input type="number" id="fp-iva" class="form-input" step="0.01" required value="13.00"></div>
                                </div>
                                <input type="hidden" id="fp-unidad" value="Sp">
                                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
                                    <button type="button" class="btn-top" style="background:#475569;" onclick="document.getElementById('form-prod-box').style.display='none'">Cancelar</button>
                                    <button type="submit" class="btn-top"><i class="fas fa-save"></i> Registrar Ítem</button>
                                </div>
                            </form>
                        </div>
                        <div id="tabla-productos-fact">Cargando catálogo...</div>
                    </div>
                `;
                window.cargarProductosFact();
            }
            else if (id === 'Nueva Factura' || id === 'Nueva Proforma') {
                window.lineasDocumento = [];
                const docName = id.split(' ')[1];
                contenedor.innerHTML = `
                    <div class="card">
                        <h2 style="color:white; border-bottom: 1px solid var(--border-color); padding-bottom:15px; margin-bottom: 20px;">Emitir ${docName} Electrónica</h2>
                        <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:15px; margin-bottom:20px; background:#11141a; padding:20px; border-radius:12px; border:1px solid var(--border-color);">
                            <div><label>Receptor</label><select id="doc-cliente" class="form-input" style="margin:0;"></select></div>
                            <div><label>Venta</label><select id="doc-condicion" class="form-input" style="margin:0;"><option value="01">Contado</option><option value="02">Crédito</option></select></div>
                            <div><label>Pago</label><select id="doc-medio" class="form-input" style="margin:0;"><option value="04">Transferencia</option><option value="01">Efectivo</option></select></div>
                        </div>
                        
                        <h3 style="color:white; margin-bottom: 15px; font-size: 16px;"><i class="fas fa-list-ol" style="color:var(--neon-blue);"></i> Líneas de Detalle</h3>
                        <div style="display:grid; grid-template-columns: 3fr 1fr 1fr 1fr auto; gap:10px; margin-bottom:15px; align-items:end;">
                            <div class="cabys-wrapper">
                                <label>Producto (Código CABYS o Nombre)</label>
                                <input type="text" id="busca-prod" class="form-input" style="margin:0;" placeholder="Escribe para buscar..." autocomplete="off" onkeyup="window.filtrarDropdownCabys(this.value)">
                                <div id="cabys-dropdown" class="cabys-dropdown"></div>
                            </div>
                            <div><label>Cant.</label><input type="number" id="busca-cant" class="form-input" style="margin:0;" value="1" min="0.1" oninput="window.actualizarTotalLinea()"></div>
                            <div><label>P. Unit</label><input type="text" id="busca-precio" class="form-input" style="margin:0;" disabled></div>
                            <div><label>Total</label><input type="text" id="busca-total" class="form-input" style="margin:0;" disabled></div>
                            <button class="btn-top" style="padding:14px;" onclick="window.agregarLinea()"><i class="fas fa-plus"></i></button>
                        </div>
                        
                        <table class="admin-table" style="margin-bottom:30px;">
                            <thead style="background:#11141a;"><tr><th>Cant.</th><th>CABYS</th><th>Descripción</th><th>P. Unit</th><th>IVA</th><th>Total</th><th></th></tr></thead>
                            <tbody id="doc-body"><tr><td colspan="7" style="text-align:center; color:var(--text-muted);">Sin líneas</td></tr></tbody>
                        </table>
                        
                        <div style="display:flex; justify-content:flex-end; border-top:1px solid var(--border-color); padding-top:20px;">
                            <div style="background:#11141a; padding:20px; border-radius:12px; width:280px; border:1px solid var(--border-color);">
                                <p style="margin:5px 0; display:flex; justify-content:space-between; color:var(--text-muted);">Subtotal: <span id="t-sub" style="color:#fff; font-weight:600;">₡0.00</span></p>
                                <p style="margin:5px 0; display:flex; justify-content:space-between; color:var(--text-muted);">IVA: <span id="t-iva" style="color:#fff; font-weight:600;">₡0.00</span></p>
                                <p style="border-top:1px solid var(--border-color); padding-top:15px; margin-top:15px; display:flex; justify-content:space-between; font-weight:800; font-size:18px;">Total: <span id="t-total" style="color:var(--neon-blue);">₡0.00</span></p>
                            </div>
                        </div>
                        <button id="btn-emitir-doc" class="btn-top" style="width:100%; margin-top:25px; padding:15px; font-size:15px; justify-content:center; opacity:0.5;" disabled onclick="window.emitirDocumento('${docName}')"><i class="fas fa-paper-plane"></i> Finalizar y Emitir ${docName}</button>
                    </div>
                `;
                const selC = document.getElementById('doc-cliente');
                if(!window.clientesCache || window.clientesCache.length === 0) { selC.innerHTML = '<option value="">Sin clientes registrados</option>'; }
                else { selC.innerHTML = '<option value="">-- Seleccionar Cliente --</option>' + window.clientesCache.map(c => `<option value="${c.id}">${c.nombre} (${c.identificacion})</option>`).join(''); }
            }
            else if (id === 'Historial de Facturas' || id === 'Proformas Generadas') {
                const tipo = id === 'Historial de Facturas' ? 'factura' : 'proforma';
                contenedor.innerHTML = `<div class="card"><h2 class="page-title" style="color:white;">${id}</h2><div id="tabla-historial">Cargando...</div></div>`;
                window.cargarHistorialDoc(tipo);
            }
            else if (id === 'Datos de la Empresa') {
                contenedor.innerHTML = `
                    <div class="card">
                        <h2 class="page-title" style="color:white;">Datos Fiscales del Contribuyente</h2>
                        <div id="datos-empresa-box">Cargando...</div>
                    </div>
                `;
                fetch('/api/facturacion/config-empresa', {credentials: 'include'}).then(r=>r.json()).then(data => {
                    if(data.nombre_comercial) {
                        document.getElementById('datos-empresa-box').innerHTML = `
                            <p style="margin-bottom:10px; color:#cfd8dc;">📍 <b>Razón Social:</b> ${data.nombre_comercial}</p>
                            <p style="margin-bottom:10px; color:#cfd8dc;">📞 <b>Teléfono:</b> ${data.telefono}</p>
                            <p style="margin-bottom:10px; color:#cfd8dc;">✉️ <b>Correo:</b> ${data.correo}</p>
                            ${data.logo ? `<img src="${data.logo}" style="height:60px; margin-top:15px; border-radius:6px;">` : ''}
                        `;
                    } else { document.getElementById('datos-empresa-box').innerHTML = "La empresa no ha configurado sus datos."; }
                });
            }
            else if (id === 'Llave Hacienda (.p12)') {
                contenedor.innerHTML = `
                    <div class="card">
                        <h2 class="page-title" style="color:white;"><i class="fas fa-key" style="color:var(--neon-blue);"></i> Credenciales de Hacienda</h2>
                        <p style="color:var(--text-muted);">Como contador no puedes modificar la llave criptográfica por seguridad, solo el Administrador de la cuenta cliente puede renovarla.</p>
                        <div id="estado-hacienda" style="margin-top:20px; padding:15px; background:#11141a; border:1px solid var(--border-color); border-radius:8px;">Verificando estado...</div>
                    </div>
                `;
                fetch('/api/admin/facturacion/probar-conexion', {credentials: 'include'}).then(r=>r.json()).then(d => {
                    const el = document.getElementById('estado-hacienda');
                    if(d.status === "Conexión Exitosa") { el.innerHTML = `<span style="color:var(--btn-green); font-weight:bold;"><i class="fas fa-check-circle"></i> Conexión con ATV Hacienda Activa y Validada.</span>`; }
                    else { el.innerHTML = `<span style="color:#ff3b30; font-weight:bold;"><i class="fas fa-exclamation-triangle"></i> Error de conexión con Hacienda. Solicite al cliente actualizar la llave .p12.</span>`; }
                });
            }
        }

        window.buscarCabysOficial = async function(q) {
            const drop = document.getElementById('cabys-oficial-dropdown');
            if(!q || q.length < 3) { drop.style.display = 'none'; return; }
            try {
                const res = await fetch(`/api/cabys/buscar?q=${encodeURIComponent(q)}`, {credentials: 'include'});
                const matches = await res.json();
                if(matches.length === 0) { 
                    drop.style.display = 'block'; 
                    drop.innerHTML = '<div class="cabys-item" style="color:var(--text-muted); font-size:12px;">No se encontró en el catálogo de Hacienda. Verifica la escritura o ingrésalo manualmente.</div>';
                    return; 
                }
                drop.innerHTML = matches.map(m => `
                    <div class="cabys-item" onclick="window.seleccionarCabysOficial('${m.codigo}', '${m.descripcion.replace(/'/g, "\\'")}', ${m.impuesto})">
                        <b style="font-family:monospace;">${m.codigo}</b> - ${m.descripcion} 
                        <span style="font-weight:bold; float:right;">IVA: ${m.impuesto}%</span>
                    </div>
                `).join('');
                drop.style.display = 'block';
            } catch(e) { console.log("Error buscando CABYS"); }
        };

        window.seleccionarCabysOficial = function(codigo, desc, impuesto) {
            document.getElementById('fp-cabys').value = codigo;
            document.getElementById('fp-desc').value = desc;
            document.getElementById('fp-iva').value = parseFloat(impuesto).toFixed(2);
            document.getElementById('cabys-oficial-dropdown').style.display = 'none';
            document.getElementById('buscador-cabys-oficial').value = ''; 
        };

        window.filtrarDropdownCabys = function(txt) {
            const drop = document.getElementById('cabys-dropdown');
            if(!txt || txt.length < 2) { drop.style.display = 'none'; return; }
            const matches = window.productosCache.filter(p => p.descripcion.toLowerCase().includes(txt.toLowerCase()) || p.codigo_cabys.includes(txt));
            if(matches.length === 0) { 
                drop.style.display = 'block'; 
                drop.innerHTML = '<div class="cabys-item" style="color:var(--text-muted); font-size:12px;">No hay resultados en el catálogo local.</div>';
                return; 
            }
            drop.innerHTML = matches.map(m => `
                <div class="cabys-item" onclick="window.seleccionarCabys('${m.codigo_cabys}', '${m.descripcion.replace(/'/g, "\\'")}', ${m.precio_unitario}, ${m.impuesto}, '${m.unidad_medida}')">
                    <b style="font-family:monospace;">${m.codigo_cabys}</b> - ${m.descripcion} 
                    <span style="font-weight:bold; float:right;">₡${m.precio_unitario}</span>
                </div>
            `).join('');
            drop.style.display = 'block';
        };

        window.seleccionarCabys = function(cabys, desc, precio, imp, uni) {
            window.prodSeleccionado = { codigo_cabys: cabys, descripcion: desc, precio_unitario: precio, impuesto: imp, unidad_medida: uni };
            document.getElementById('busca-prod').value = desc; 
            document.getElementById('busca-precio').value = precio;
            document.getElementById('cabys-dropdown').style.display = 'none';
            window.actualizarTotalLinea();
        };

        document.addEventListener('click', function(e) {
            const dropOficial = document.getElementById('cabys-oficial-dropdown');
            if (dropOficial && e.target.id !== 'buscador-cabys-oficial') dropOficial.style.display = 'none';
            const dropLocal = document.getElementById('cabys-dropdown');
            if (dropLocal && e.target.id !== 'busca-prod') dropLocal.style.display = 'none';
        });

        window.actualizarTotalLinea = function() {
            const cant = parseFloat(document.getElementById('busca-cant').value) || 0;
            const precio = parseFloat(document.getElementById('busca-precio').value) || 0;
            document.getElementById('busca-total').value = (cant * precio).toFixed(2);
        };

        window.agregarLinea = function() {
            if(!window.prodSeleccionado) return alert("Busca y selecciona un producto de la burbuja primero.");
            const cant = parseFloat(document.getElementById('busca-cant').value) || 1;
            window.lineasDocumento.push({ codigo_cabys: window.prodSeleccionado.codigo_cabys, descripcion: window.prodSeleccionado.descripcion, cantidad: cant, precio_unitario: window.prodSeleccionado.precio_unitario, monto_total: cant * window.prodSeleccionado.precio_unitario, impuesto: window.prodSeleccionado.impuesto, unidad_medida: window.prodSeleccionado.unidad_medida });
            document.getElementById('busca-prod').value = ""; document.getElementById('busca-cant').value = "1"; document.getElementById('busca-precio').value = ""; document.getElementById('busca-total').value = ""; window.prodSeleccionado = null; window.renderLineasDocumento();
        };

        window.renderLineasDocumento = function() {
            const tbody = document.getElementById('doc-body');
            let html = ''; let sub = 0; let iva = 0;
            window.lineasDocumento.forEach((l, i) => {
                html += `<tr><td>${l.cantidad}</td><td>${l.codigo_cabys}</td><td><b>${l.descripcion}</b></td><td>₡${l.precio_unitario}</td><td>${l.impuesto}%</td><td style="font-weight:600; color:var(--neon-blue);">₡${l.monto_total.toFixed(2)}</td><td><button class="fact-btn-del" onclick="window.lineasDocumento.splice(${i},1); window.renderLineasDocumento();"><i class="fas fa-trash"></i></button></td></tr>`;
                sub += l.monto_total; iva += l.monto_total * (parseFloat(l.impuesto)/100);
            });
            tbody.innerHTML = html || `<tr><td colspan="7" style="text-align:center; color:var(--text-muted);">Sin líneas</td></tr>`;
            document.getElementById('t-sub').innerText = `₡${sub.toFixed(2)}`; document.getElementById('t-iva').innerText = `₡${iva.toFixed(2)}`; document.getElementById('t-total').innerText = `₡${(sub+iva).toFixed(2)}`;
            const btn = document.getElementById('btn-emitir-doc');
            if (window.lineasDocumento.length > 0) { btn.disabled = false; btn.style.opacity = '1'; } else { btn.disabled = true; btn.style.opacity = '0.5'; }
        };

        window.emitirDocumento = async function(tipo) {
            const cliente_id = document.getElementById('doc-cliente').value;
            if(!cliente_id) return alert("Selecciona un cliente.");
            const btn = document.getElementById('btn-emitir-doc'); btn.innerText = "Procesando..."; btn.disabled = true;
            let sub = 0; let iva = 0; window.lineasDocumento.forEach(l => { sub += l.monto_total; iva += l.monto_total * (parseFloat(l.impuesto)/100); });
            const payload = { cliente_id: cliente_id, condicion_venta: document.getElementById('doc-condicion').value, medio_pago: document.getElementById('doc-medio').value, lineas: window.lineasDocumento, total_gravado: sub, total_impuesto: iva, total_comprobante: sub + iva };
            const endpoint = tipo === 'Factura' ? '/api/facturacion/emitir' : '/api/facturacion/proformas/emitir';
            try {
                const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(payload) });
                const data = await res.json();
                if(data.success) { alert(`¡${tipo} generada con éxito!`); window.mostrarModulo(tipo === 'Factura' ? 'Historial de Facturas' : 'Proformas Generadas', null); } 
                else { alert("Error: " + data.message); btn.innerText = `Emitir ${tipo}`; btn.disabled = false; }
            } catch(e) { alert("Error de red."); btn.disabled = false; }
        };

        window.cargarClientesFact = function() {
            const list = document.getElementById('tabla-clientes-fact');
            fetch('/api/facturacion/clientes', {credentials: 'include'}).then(r=>r.json()).then(data => {
                if(!data || data.length === 0) { list.innerHTML = "<p style='color:var(--text-muted); padding:20px; text-align:center;'>Sin clientes registrados.</p>"; return; }
                list.innerHTML = `<table class="admin-table"><thead><tr><th>Nombre o Razón Social</th><th>Identificación</th><th>Correo de Envío</th><th>Acción</th></tr></thead><tbody>
                    ${data.map(c => `<tr><td><b>${c.nombre}</b></td><td>${c.identificacion}</td><td>${c.correo}</td><td><button class="fact-btn-del" onclick="window.borrarItem('clientes_facturacion', ${c.id}, 'Clientes')"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
                </tbody></table>`;
            });
        };

        window.guardarClienteFact = function(e) {
            e.preventDefault();
            const body = { nombre: document.getElementById('fc-nombre').value, tipo_identificacion: document.getElementById('fc-tipo').value, identificacion: document.getElementById('fc-cedula').value, correo: document.getElementById('fc-correo').value, telefono: document.getElementById('fc-telefono').value };
            fetch('/api/facturacion/clientes', { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(body) }).then(()=> { fetch('/api/facturacion/clientes', {credentials: 'include'}).then(r=>r.json()).then(d => window.clientesCache = d); window.mostrarModulo('Clientes', null); });
        };

        window.cargarProductosFact = function() {
            const area = document.getElementById('tabla-productos-fact');
            fetch('/api/facturacion/productos', {credentials: 'include'}).then(r=>r.json()).then(data => {
                if(!data || data.length === 0) { area.innerHTML = "<p style='color:var(--text-muted); padding:20px; text-align:center;'>El catálogo está vacío.</p>"; return; }
                area.innerHTML = `<table class="admin-table"><thead><tr><th>CABYS</th><th>Descripción</th><th>Precio (CRC)</th><th>Acción</th></tr></thead><tbody>
                    ${data.map(p => `<tr><td><code>${p.codigo_cabys}</code></td><td><b>${p.descripcion}</b></td><td style="color:var(--neon-blue);">₡${p.precio_unitario}</td><td><button class="fact-btn-del" onclick="window.borrarItem('productos_facturacion', ${p.id}, 'Catálogo CABYS')"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
                </tbody></table>`;
            });
        };

        window.guardarProductoFact = function(e) {
            e.preventDefault();
            const body = { codigo_cabys: document.getElementById('fp-cabys').value, descripcion: document.getElementById('fp-desc').value, precio_unitario: document.getElementById('fp-precio').value, unidad_medida: 'Sp', impuesto: document.getElementById('fp-iva').value };
            fetch('/api/facturacion/productos', { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(body) }).then(()=> { fetch('/api/facturacion/productos', {credentials: 'include'}).then(r=>r.json()).then(d => window.productosCache = d); window.mostrarModulo('Catálogo CABYS', null); });
        };

        window.borrarItem = function(tabla, id, moduloRef) {
            if(confirm('¿Eliminar de forma permanente?')) { fetch(`/api/eliminar/${tabla}/${id}`, { method: 'DELETE', credentials: 'include' }).then(() => window.mostrarModulo(moduloRef, null)); }
        };

        window.cargarHistorialDoc = function(tipo) {
            fetch('/api/cliente/datos-operativos', {credentials: 'include'}).then(r=>r.json()).then(data => {
                const area = document.getElementById('tabla-historial');
                const lista = tipo === 'factura' ? data.facturas : data.proformas;
                if(!lista || lista.length === 0) { area.innerHTML = "<p style='color:var(--text-muted); text-align:center; padding:20px;'>No hay documentos emitidos.</p>"; return; }
                area.innerHTML = `<table class="admin-table"><thead><tr><th>Fecha</th><th>Consecutivo</th>${tipo==='factura'?'<th>Estado</th>':''}<th>Monto</th><th>Impresión</th></tr></thead><tbody>
                    ${lista.map(d => `<tr><td>${new Date(d.fecha).toLocaleDateString()}</td><td><b style="color:#fff;">${d.consecutivo}</b></td>${tipo==='factura'?`<td style="color:${d.estado==='Rechazado'?'#ff3b30':'var(--btn-green)'}">${d.estado}</td>`:''}<td><b style="color:var(--neon-blue);">₡${d.monto}</b></td><td><button class="fact-btn-view" onclick="window.open('/api/facturacion/imprimir?tipo=${tipo}&id=${d.id}', '_blank')"><i class="fas fa-print"></i> PDF Oficial</button></td></tr>`).join('')}
                </tbody></table>`;
            });
        };

        window.onload = async () => {
            try {
                const res = await fetch('/api/login', { method: 'GET', credentials: 'include' });
                if (res.status === 401) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                
                if(data.usuario) {
                    document.getElementById('header-user-name').innerText = data.usuario;
                    document.getElementById('header-user-initial').innerText = data.usuario.charAt(0).toUpperCase();
                }

                const opsRes = await fetch('/api/cliente/datos-operativos', {credentials: 'include'});
                window.userDataCache = await opsRes.json();
                
                mostrarModulo('dashboard', document.querySelector('.nav-item.active'));

                fetch('/api/facturacion/clientes', {credentials: 'include'}).then(r=>r.json()).then(d => window.clientesCache = d).catch(e => console.log(e));
                fetch('/api/facturacion/productos', {credentials: 'include'}).then(r=>r.json()).then(d => window.productosCache = d).catch(e => console.log(e));

            } catch (e) { 
                console.warn("Error de conexión"); 
            }
        };

        async function logout() {
            if(confirm('¿Cerrar sesión?')) { 
                await fetch('/api/logout', { credentials: 'include' }); 
                window.location.href = '/login.html'; 
            }
        }
    </script>
</body>
</html>
