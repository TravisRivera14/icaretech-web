<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Operaciones | iCare Tech CR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0c10; --card: #1f2833; --accent: #00b4d8; --text: #f5f5f7; --del: #ff3b30; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #11141a; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); justify-content: space-between;}
        .top-nav { display: flex; gap: 30px; margin-left: 40px; }
        .top-nav button { background: none; border: none; color: #8a99ad; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 15px; }
        .top-nav button:hover, .top-nav button.active { color: var(--accent); }
        
        .app-layout { display: flex; flex: 1; }
        .sidebar { width: 280px; background: #11141a; padding: 20px 0; border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; }
        .menu-title { font-size: 12px; color: #555; text-transform: uppercase; margin: 20px 20px 10px; font-weight: 600; }
        .nav-item { padding: 12px 20px; cursor: pointer; color: #8a99ad; font-size: 14px; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-item:hover { background: var(--card); color: var(--accent); }
        
        .submenu { list-style: none; padding-left: 45px; display: none; background: #0b0c10; margin:0; }
        .submenu li { padding: 8px 0; cursor: pointer; color: #8a99ad; font-size: 13px; transition: 0.2s; }
        .submenu li:hover { color: var(--accent); }
        
        .main-content { flex: 1; padding: 40px; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: var(--accent); text-align: left; padding: 15px; border-bottom: 2px solid var(--accent); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <h1>iCare <span style="color:var(--accent)">OPS</span></h1>
        <span id="badge-admin" style="display:none; background:var(--accent); color:black; font-size:11px; font-weight:bold; padding:4px 8px; border-radius:6px;">ADMIN EMPRESARIAL</span>
    </div>
    <nav class="top-nav" id="top-nav">
        <button id="btn-nav-datacenter" onclick="showSection('datacenter')" style="display:none;"><i class="fas fa-server"></i> Data Center</button>
        <button id="btn-nav-facturacion" onclick="showSection('facturacion')" style="display:none;"><i class="fas fa-file-invoice-dollar"></i> Facturación</button>
        <button id="btn-nav-tickets" onclick="showSection('tickets')" style="display:none;"><i class="fas fa-ticket-alt"></i> Tickets</button>
        <button id="btn-nav-inventario" onclick="showSection('inventario')" style="display:none;"><i class="fas fa-boxes"></i> Inventario</button>
    </nav>
</header>

<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div id="contenido-dinamico" class="card">
            <h2>Centro de Operaciones</h2>
            <p>Conectando con el servidor...</p>
        </div>
    </main>
</div>

<script>
    let userDataCache = {};

    const menuData = {
        'datacenter': [{nombre: 'Resumen de Servidores'}, {nombre: 'Monitoreo'}, {nombre: 'Backups'}],
        'facturacion': [
            {nombre: 'Inicio'}, {nombre: 'Mi plan'}, {nombre: 'Clientes'}, {nombre: 'Productos'}, 
            {nombre: 'POS', sub: ['Ingresar', 'Vendedores']},
            {nombre: 'Facturación', sub: ['Nueva factura', 'Nuevo tiquete', 'Nueva compra', 'Nueva exportación', 'Borradores', 'Documentos programados', 'Documentos generados']},
            {nombre: 'Proformas', sub: ['Nueva proforma', 'Proformas generadas']},
            {nombre: 'Recepción', sub: ['Cargar documento', 'Documentos cargados', 'Correos recibidos']},
            {nombre: 'Reportes'},
            {nombre: 'Configuración', sub: ['Datos de la empresa', 'Usuarios', 'Métodos de pago', 'Impuestos', 'Plantillas de correo', 'Plantillas de documentos']}
        ],
        'tickets': [{nombre: 'Crear Nuevo Ticket'}, {nombre: 'Tickets Activos'}, {nombre: 'Historial'}],
        'inventario': [{nombre: 'Equipos'}, {nombre: 'Piezas'}]
    };

    function showSection(sec) {
        document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-nav-${sec}`).classList.add('active');

        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = `<div class="menu-title">${sec.toUpperCase()}</div>`;
        menuData[sec].forEach(item => {
            if (item.sub) {
                sidebar.innerHTML += `
                    <div class="nav-item" onclick="toggleSub(this)"><i class="fas fa-chevron-down"></i> ${item.nombre}</div>
                    <ul class="submenu" style="display:none">${item.sub.map(s => `<li onclick="render('${s}')">${s}</li>`).join('')}</ul>`;
            } else {
                sidebar.innerHTML += `<div class="nav-item" onclick="render('${item.nombre}')">${item.nombre}</div>`;
            }
        });
        render(menuData[sec][0].nombre); // Renderizar el primer módulo por defecto
    }

    function toggleSub(el) { 
        el.nextElementSibling.style.display = (el.nextElementSibling.style.display === 'none') ? 'block' : 'none'; 
    }

    window.onload = async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const seccion = urlParams.get('seccion');
        const accion = urlParams.get('accion');

        try {
            // LECTURA DE PERMISOS EN EL BACKEND
            const res = await fetch('/api/cliente/datos-operativos', {credentials: 'include'});
            userDataCache = await res.json();

            // BLOQUE DE BLINDAJE DE ERRORES VISUALES
            if (userDataCache.error) { 
                document.getElementById('contenido-dinamico').innerHTML = `
                    <h2 style="color:var(--del);"><i class="fas fa-exclamation-triangle"></i> Acceso Interrumpido</h2>
                    <p style="margin-top:15px; color:#8a99ad; font-size: 15px;">Mensaje del servidor: <b style="color:white;">${userDataCache.error}</b></p>
                    <div style="margin-top:15px; padding:15px; background:#11141a; border-radius:8px; border:1px solid #444; font-size:13.5px; color:#cfd8dc;">
                        ${userDataCache.error === "No autorizado" 
                            ? "Las credenciales son correctas, pero tu navegador está bloqueando las 'Cookies' de sesión de Vercel, o la sesión expiró." 
                            : "Esta cuenta se creó sin estar vinculada a una empresa. Ingresa con tu cuenta de Admin Maestro, edita a este usuario en la pestaña 'Personal Técnico' y asígnale un cliente en el selector."}
                    </div>
                    <button onclick="window.location.href='/login.html'" style="margin-top:20px; padding:10px 20px; background:var(--card); border:1px solid #444; color:white; border-radius:6px; cursor:pointer;">Volver</button>
                `;
                return; 
            }

            // Lógica Cliente Admin
            if (userDataCache.rol === 'cliente_admin') {
                document.getElementById('badge-admin').style.display = 'block';
            }

            // Aplicar Permisos Modulares a los Botones Superiores
            const p = userDataCache.permisos;
            let firstSec = null;
            if (p.datacenter) { document.getElementById('btn-nav-datacenter').style.display = 'flex'; firstSec = firstSec || 'datacenter'; }
            if (p.facturacion) { document.getElementById('btn-nav-facturacion').style.display = 'flex'; firstSec = firstSec || 'facturacion'; }
            if (p.tickets) { document.getElementById('btn-nav-tickets').style.display = 'flex'; firstSec = firstSec || 'tickets'; }
            if (p.inventario) { document.getElementById('btn-nav-inventario').style.display = 'flex'; firstSec = firstSec || 'inventario'; }

            if (seccion === 'tickets' && accion === 'nuevo' && p.tickets) {
                showSection('tickets');
                await render('Crear Nuevo Ticket'); 
            } else if (firstSec) {
                showSection(firstSec);
            } else {
                document.getElementById('contenido-dinamico').innerHTML = "<h2>Acceso Restringido</h2><p>No tienes módulos activos asignados. Contacta a soporte.</p>";
            }
        } catch(e) {
            console.error("Error de carga", e);
            document.getElementById('contenido-dinamico').innerHTML = `<h2>Error de Conexión</h2><p>Fallo de comunicación con el servidor.</p>`;
        }
    };

    async function render(opcion) {
        const modulosEspeciales = ['Crear Nuevo Ticket', 'Inicio', 'Mi plan', 'Clientes', 'Productos', 'Nueva factura', 'Nueva proforma', 'Cargar documento', 'Reportes', 'Datos de la empresa', 'Tickets Activos', 'Historial'];
        
        if (modulosEspeciales.includes(opcion)) {
            return renderModulo(opcion);
        }

        const cont = document.getElementById('contenido-dinamico');
        cont.innerHTML = `<h2>${opcion}</h2><p>Cargando datos...</p>`;
        
        try {
            if(opcion === 'Documentos generados' || opcion === 'Facturas Emitidas') {
                if(userDataCache.facturas && userDataCache.facturas.length > 0) {
                    cont.innerHTML = `<h2>${opcion}</h2>
                        <table><thead><tr><th>Consecutivo</th><th>Fecha</th><th>Monto</th><th>Estado</th></tr></thead>
                        <tbody>${userDataCache.facturas.map(f => `<tr><td>${f.consecutivo}</td><td>${f.fecha}</td><td>₡${f.monto}</td><td>${f.estado}</td></tr>`).join('')}</tbody></table>`;
                } else {
                    cont.innerHTML = `<h2>${opcion}</h2><p>No se encontraron documentos generados.</p>`;
                }
            } else {
                cont.innerHTML = `<h2>${opcion}</h2><p>Módulo de ${opcion} en línea.</p>`;
            }
        } catch(e) { 
            cont.innerHTML = `<h2>Error</h2><p>No se pudo conectar al servidor.</p>`; 
        }
    }

    async function renderModulo(nombre) {
        const cont = document.getElementById('contenido-dinamico');
        
        if (nombre === 'Crear Nuevo Ticket') {
            cont.innerHTML = `
                <h2>Reportar Nuevo Requerimiento</h2>
                <form id="form-ticket" style="display:flex; flex-direction:column; gap:15px; max-width:600px; margin-top:20px;">
                    <div class="form-group">
                        <label style="color:#8a99ad; font-size:13px; margin-bottom:5px; display:block;">Empresa</label>
                        <input type="text" value="Empresa Autorizada" disabled style="padding:10px; width:100%; border-radius:5px; border:1px solid #444; background:#11141a; color:#8a99ad;">
                    </div>
                    <input type="text" id="ticketContacto" placeholder="Nombre completo del contacto" required style="padding:12px; border-radius:5px; border:1px solid #444; background:#0b0c10; color:#fff;">
                    <input type="tel" id="ticketWhatsApp" placeholder="WhatsApp de contacto" required style="padding:12px; border-radius:5px; border:1px solid #444; background:#0b0c10; color:#fff;">
                    <input type="text" id="ticketAsunto" placeholder="Asunto del problema" required style="padding:12px; border-radius:5px; border:1px solid #444; background:#0b0c10; color:#fff;">
                    <textarea id="ticketDescripcion" placeholder="Describe el inconveniente técnico en detalle..." required style="padding:12px; border-radius:5px; border:1px solid #444; background:#0b0c10; color:#fff; height:120px;"></textarea>
                    
                    <label style="color:#8a99ad; font-size:13px; display:block; margin-top:5px;">Prioridad</label>
                    <select id="prioridad" style="padding:12px; border-radius:5px; background:#0b0c10; color:#fff; border:1px solid #444;">
                        <option value="Baja">Baja</option>
                        <option value="Media">Media</option>
                        <option value="Alta">Alta</option>
                    </select>
                    
                    <button type="submit" style="padding:15px; background:var(--accent); border:none; border-radius:5px; font-weight:bold; cursor:pointer; color:white; margin-top:10px;">Enviar Ticket</button>
                </form>
            `;
            document.getElementById('form-ticket').addEventListener('submit', crearTicket);
            
        } else if (nombre === 'Historial' || nombre === 'Tickets Activos') {
            const label = userDataCache.rol === 'cliente_admin' ? 'Tickets de toda la Empresa' : 'Mis tickets reportados';
            
            let listaTickets = userDataCache.tickets || [];
            if (nombre === 'Tickets Activos') {
                listaTickets = listaTickets.filter(t => t.estado.toLowerCase() !== 'resuelto' && t.estado.toLowerCase() !== 'cerrado');
            }

            if (listaTickets.length === 0) {
                cont.innerHTML = `<h2>${nombre}</h2><p style="margin-top:20px;">No se encontraron registros de soporte en esta vista.</p>`;
                return;
            }
            
            let html = `<h2>${nombre} (${label})</h2><div style="margin-top:20px; display:flex; flex-direction:column; gap:15px;">`;
            listaTickets.forEach(t => {
                let atendido = t.atendido_por || 'Pendiente revisión';
                let infoAtencion = t.estado.toLowerCase() === 'resuelto' 
                    ? `<span style="color:#10b981; font-weight:bold;"><i class="fas fa-check-circle"></i> Solucionado por: ${atendido}</span>` 
                    : `<span style="color:#f59e0b; font-weight:bold;"><i class="fas fa-clock"></i> ${atendido === 'Pendiente revisión' ? 'Pendiente revisión' : 'En revisión por: ' + atendido}</span>`;
                
                html += `<div style="padding:15px; background:#0b0c10; border:1px solid #444; border-radius:8px;">
                    <div style="color:var(--accent); font-weight:bold; margin-bottom:5px; font-size:15px;">${t.asunto}</div>
                    <div style="font-size:13px; color:#8a99ad; line-height: 1.6;">
                        Estado actual: <b style="color:white;">${t.estado}</b> | Prioridad: ${t.prioridad} | Reportado: ${new Date(t.fecha).toLocaleDateString()}<br>
                        <div style="margin-top:6px; background:#11141a; padding:6px 10px; border-radius:5px; display:inline-block;">${infoAtencion}</div>
                    </div>
                </div>`;
            });
            cont.innerHTML = html + "</div>";

        } else if (nombre === 'Datos de la empresa') {
            // NUEVO MÓDULO: CONFIGURACIÓN HACIENDA (ATV)
            cont.innerHTML = `
                <h2>Configuración del Contribuyente (Hacienda)</h2>
                <div class="card" style="background:#1f2833; padding:25px; border-radius:8px; margin-top:15px;">
                    <p style="color:#8a99ad; margin-bottom:20px;">Ingresa las credenciales de tu Llave Criptográfica (.p12) para enlazar el facturador con el Ministerio de Hacienda.</p>
                    
                    <form id="form-hacienda" style="max-width: 600px;">
                        <label style="color:#8a99ad; font-size:13px; display:block; margin-bottom:5px;">Usuario (ATV - IDP):</label>
                        <input type="text" id="h-user" placeholder="Ej: cpj-3-101-123456@stag.comprobanteselectronicos.go.cr" required style="width:100%; padding:12px; margin-bottom:15px; border-radius:5px; background:#0b0c10; border:1px solid #444; color:white; font-size:14px;">
                        
                        <label style="color:#8a99ad; font-size:13px; display:block; margin-bottom:5px;">Contraseña (ATV - IDP):</label>
                        <input type="password" id="h-pass" placeholder="Ingresa la contraseña generada en ATV" required style="width:100%; padding:12px; margin-bottom:15px; border-radius:5px; background:#0b0c10; border:1px solid #444; color:white; font-size:14px;">
                        
                        <label style="color:#8a99ad; font-size:13px; display:block; margin-bottom:5px;">PIN de la Llave Criptográfica:</label>
                        <input type="password" id="h-pin" placeholder="PIN de 4 dígitos" required style="width:100%; padding:12px; margin-bottom:15px; border-radius:5px; background:#0b0c10; border:1px solid #444; color:white; font-size:14px;">
                        
                        <label style="color:#8a99ad; font-size:13px; display:block; margin-bottom:5px;">Archivo de Llave (.p12):</label>
                        <input type="file" id="h-p12" accept=".p12" required style="width:100%; padding:10px; margin-bottom:20px; border-radius:5px; background:#0b0c10; border:1px solid #444; color:white;">
                        
                        <label style="color:white; font-size:14px; display:flex; align-items:center; gap:10px; margin-bottom:25px; cursor:pointer;">
                            <input type="checkbox" id="h-prod" style="width:18px; height:18px; margin:0;"> Activar en Ambiente de PRODUCCIÓN
                        </label>

                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <button type="submit" style="padding:12px 25px; background:var(--accent); border:none; border-radius:6px; font-weight:bold; cursor:pointer; color:black;"><i class="fas fa-save"></i> Guardar Credenciales</button>
                            <button type="button" onclick="probarConexionHacienda()" style="padding:12px 25px; background:#11141a; border:1px solid var(--accent); border-radius:6px; font-weight:bold; cursor:pointer; color:var(--accent);"><i class="fas fa-plug"></i> Probar Conexión</button>
                        </div>
                    </form>
                    
                    <div id="hacienda-status" style="margin-top:20px; font-size:14px; padding:15px; border-radius:6px; display:none;"></div>
                </div>
            `;
            document.getElementById('form-hacienda').addEventListener('submit', guardarHacienda);

        } else if (nombre === 'Inicio') {
            cont.innerHTML = `
                <h2>Inicio - Facturación</h2>
                <div class="card" style="background:#1f2833; padding:20px; border-radius:8px; margin-top:15px;">
                    <p style="font-size:15px; line-height:1.6;">Bienvenido al módulo de facturación. Aquí podrás gestionar todo lo relacionado con tus clientes, productos y documentos fiscales.</p>
                    <h3 style="margin-top:20px; color:var(--accent);">Opciones disponibles:</h3>
                    <ul style="color:#8a99ad; line-height:2; margin-top:10px;">
                        <li><strong>Mi plan:</strong> Revisa el estado de tu suscripción actual.</li>
                        <li><strong>Clientes:</strong> Administra tu base de datos de clientes.</li>
                        <li><strong>Productos:</strong> Registra y actualiza tus artículos.</li>
                        <li><strong>Configuración -> Datos de la Empresa:</strong> Configura tus llaves de Hacienda.</li>
                    </ul>
                </div>
            `;
            
        } else if (nombre === 'Mi plan') {
            cont.innerHTML = `
                <h2>Mi Plan Actual</h2>
                <div class="card" style="background:#1f2833; padding:25px; border-radius:8px; margin-top:15px;">
                    <p style="font-size:16px; margin-bottom:15px;">Estás en el <strong>Plan Básico</strong>: incluye hasta 3 facturas mensuales gratuitas.</p>
                    <p style="color:#8a99ad; margin-bottom:25px;">¿Necesitas más capacidad? Puedes actualizar a cualquiera de nuestros planes premium con mejoras integrales para tu facturación electrónica.</p>
                    <button style="padding:12px 25px; background:var(--accent); border:none; border-radius:5px; color:#fff; cursor:pointer; font-weight:bold;">
                        Ver opciones y actualizar Plan
                    </button>
                </div>
            `;
            
        } else {
            cont.innerHTML = `
                <h2>${nombre}</h2>
                <div class="card" style="background:#1f2833; padding:20px; border-radius:8px; margin-top:15px;">
                    <p>Módulo de ${nombre} en línea.</p>
                </div>
            `;
        }
    }

    // --- FUNCIONES NUEVAS PARA HACIENDA ---
    async function guardarHacienda(event) {
        event.preventDefault();
        
        const form = new FormData();
        form.append('usuario_idp', document.getElementById('h-user').value);
        form.append('password_idp', document.getElementById('h-pass').value);
        form.append('pin_p12', document.getElementById('h-pin').value);
        form.append('ambiente', document.getElementById('h-prod').checked ? 'true' : 'false');
        
        const fileInput = document.getElementById('h-p12');
        if (fileInput.files.length > 0) {
            form.append('archivo_p12', fileInput.files[0]);
        }

        const btn = event.submitter;
        btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Guardando...";
        btn.disabled = true;

        try {
            const res = await fetch('/api/admin/configuracion-hacienda', {
                method: 'POST',
                credentials: 'include',
                body: form
            });
            const data = await res.json();
            
            const statusBox = document.getElementById('hacienda-status');
            statusBox.style.display = 'block';
            
            if (data.success) {
                statusBox.style.background = 'rgba(16, 185, 129, 0.2)';
                statusBox.style.border = '1px solid #10b981';
                statusBox.style.color = '#10b981';
                statusBox.innerHTML = "<i class='fas fa-check-circle'></i> " + data.message;
            } else {
                statusBox.style.background = 'rgba(255, 59, 48, 0.2)';
                statusBox.style.border = '1px solid #ff3b30';
                statusBox.style.color = '#ff3b30';
                statusBox.innerHTML = "<i class='fas fa-times-circle'></i> Error: " + data.message;
            }
        } catch (error) {
            alert("Error de red al guardar las credenciales.");
        } finally {
            btn.innerHTML = "<i class='fas fa-save'></i> Guardar Credenciales";
            btn.disabled = false;
        }
    }

    async function probarConexionHacienda() {
        const statusBox = document.getElementById('hacienda-status');
        statusBox.style.display = 'block';
        statusBox.style.background = 'rgba(0, 180, 216, 0.1)';
        statusBox.style.border = '1px solid var(--accent)';
        statusBox.style.color = 'var(--text)';
        statusBox.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Contactando a los servidores del Ministerio de Hacienda...";

        try {
            const res = await fetch('/api/admin/facturacion/probar-conexion', {
                method: 'GET',
                credentials: 'include'
            });
            const data = await res.json();
            
            if (res.ok && data.status === "Conexión Exitosa") {
                statusBox.style.background = 'rgba(16, 185, 129, 0.2)';
                statusBox.style.border = '1px solid #10b981';
                statusBox.style.color = '#10b981';
                statusBox.innerHTML = `<i class='fas fa-check-circle'></i> <b>¡Conexión Exitosa!</b><br><span style="color:#cfd8dc; font-size:13px; font-weight:normal; margin-top:5px; display:block;">El facturador logró autenticarse con Hacienda correctamente. El token de seguridad fue generado.</span>`;
            } else {
                statusBox.style.background = 'rgba(255, 59, 48, 0.2)';
                statusBox.style.border = '1px solid #ff3b30';
                statusBox.style.color = '#ff3b30';
                statusBox.innerHTML = `<i class='fas fa-times-circle'></i> <b>Fallo de Autenticación:</b><br><span style="color:#cfd8dc; font-size:13px; font-weight:normal; margin-top:5px; display:block;">Hacienda rechazó las credenciales. Verifica que el Usuario y Contraseña sean correctos y pertenezcan al ambiente seleccionado (Pruebas o Producción).</span>`;
            }
        } catch (error) {
            statusBox.style.background = 'rgba(255, 59, 48, 0.2)';
            statusBox.style.border = '1px solid #ff3b30';
            statusBox.style.color = '#ff3b30';
            statusBox.innerHTML = "<i class='fas fa-wifi'></i> Error de red. No se pudo conectar con el servidor.";
        }
    }

    async function crearTicket(event) {
        event.preventDefault();
        const ticketData = {
            asunto: document.getElementById('ticketAsunto').value,
            descripcion: document.getElementById('ticketDescripcion').value,
            prioridad: document.getElementById('prioridad').value,
            contacto: document.getElementById('ticketContacto').value,
            whatsapp: document.getElementById('ticketWhatsApp').value
        };

        const res = await fetch('/api/tickets/crear', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(ticketData)
        });
        
        const resJson = await res.json();
        if(resJson.success) {
            alert("¡Ticket enviado correctamente!");
            // Recargar datos y mostrar historial
            const newData = await fetch('/api/cliente/datos-operativos', {credentials: 'include'});
            userDataCache = await newData.json();
            render('Historial');
        } else {
            alert("Error: " + resJson.message);
        }
    }

</script>
