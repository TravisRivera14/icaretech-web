<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Corporativo | iCare Tech CR</title>
    <link rel="icon" href="Logo_Pestana_v2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0b0c10;
            --card-bg: #1f2833;
            --text-light: #f5f5f7;
            --neon-blue: #00b4d8;
            --neon-blue-hover: #90e0ef;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        
        body {
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        .login-container {
            background: var(--card-bg);
            padding: 45px 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            position: relative;
        }
        
        .login-container img {
            width: 160px;
            margin-bottom: 25px;
        }
        
        .login-container h2 {
            margin-bottom: 30px;
            font-size: 22px;
            color: #ffffff;
            font-weight: 700;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        
        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a99ad;
        }
        
        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: #11141a;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        
        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 180, 216, 0.15);
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: var(--neon-blue);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
            margin-bottom: 25px;
            margin-top: 10px;
        }
        
        button:hover {
            background: var(--neon-blue-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 180, 216, 0.25);
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 14px;
        }
        
        .links a {
            color: #8a99ad;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .links a:hover {
            color: var(--text-light);
        }
        
        .link-register {
            color: var(--neon-blue) !important;
            font-weight: 600;
        }

        /* MODAL DE CAMBIO DE CONTRASEÑA OBLIGATORIO */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 12, 16, 0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: var(--card-bg);
            padding: 45px 40px;
            border-radius: 16px;
            border: 1px solid var(--neon-blue);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 180, 216, 0.15);
        }
    </style>
</head>
<body>

    <div class="login-container" id="login-box">
        <img src="Logo.png" alt="iCare Tech CR Logo">
        <h2>Portal Corporativo</h2>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="usuario" placeholder="Usuario o Correo">
        </div>
        
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Contraseña">
        </div>
        
        <button id="btn-login" onclick="login()">Iniciar Sesión</button>
        
        <div class="links">
            <a href="/recuperar">¿Olvidaste tu contraseña?</a>
            <a href="/registro" class="link-register">¿No tienes cuenta? Regístrate aquí</a>
        </div>
    </div>

    <div class="modal-overlay" id="modal-cambio-pass">
        <div class="modal-content">
            <i class="fas fa-shield-alt" style="font-size: 40px; color: var(--neon-blue); margin-bottom: 20px;"></i>
            <h2 style="color: #fff; margin-bottom: 10px;">Seguridad Requerida</h2>
            <p style="color: #8a99ad; font-size: 14px; margin-bottom: 30px; line-height: 1.5;">Has ingresado con una contraseña provisional. Por tu seguridad, debes crear una nueva contraseña para acceder al portal de tu empresa.</p>
            
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" id="new-password" placeholder="Nueva contraseña">
            </div>
            
            <div class="input-group">
                <i class="fas fa-check-double"></i>
                <input type="password" id="confirm-password" placeholder="Confirma tu contraseña">
            </div>
            
            <button onclick="guardarNuevaPassword()">Guardar y Acceder</button>
        </div>
    </div>

    <script>
        let tempUsuarioId = null; 

        async function login() {
            const btn = document.getElementById('btn-login');
            const usr = document.getElementById('usuario').value.trim();
            const pwd = document.getElementById('password').value.trim();
            
            if(!usr || !pwd) {
                alert("Por favor ingresa usuario y contraseña.");
                return;
            }

            btn.innerText = "Verificando...";
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include', 
                    body: JSON.stringify({ usuario: usr, password: pwd })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // SI ES ADMINISTRADOR O PERSONAL -> PANEL MAESTRO (Se agregó personal_admin)
                    if (data.rol === 'admin' || data.rol === 'personal' || data.rol === 'personal_admin') {
                        window.location.href = '/admin.html';
                    } 
                    // SI ES CLIENTE Y DEBE CAMBIAR CONTRASEÑA OBLIGATORIAMENTE
                    else if (data.debe_cambiar_pass === true) {
                        tempUsuarioId = data.usuario_id;
                        document.getElementById('login-box').style.display = 'none';
                        document.getElementById('modal-cambio-pass').style.display = 'flex';
                    } 
                    // SI ES CLIENTE NORMAL -> DASHBOARD
                    else {
                        window.location.href = '/dashboard_cliente.html';
                    }
                } else {
                    alert(data.message || "Usuario o contraseña incorrectos");
                    btn.innerText = "Iniciar Sesión";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                alert("Error de conexión con el servidor.");
                btn.innerText = "Iniciar Sesión";
                btn.disabled = false;
            }
        }

        async function guardarNuevaPassword() {
            const pass1 = document.getElementById('new-password').value;
            const pass2 = document.getElementById('confirm-password').value;

            if (pass1 !== pass2) {
                alert("Las contraseñas no coinciden. Verifica e intenta de nuevo.");
                return;
            }
            if (pass1.length < 6) {
                alert("Por seguridad, la contraseña debe tener al menos 6 caracteres.");
                return;
            }

            try {
                const res = await fetch('/api/cambiar_password_provisional', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({
                        usuario_id: tempUsuarioId,
                        nueva_password: pass1
                    })
                });

                const data = await res.json();
                
                if (data.success) {
                    alert("¡Excelente! Tu contraseña ha sido actualizada.");
                    window.location.href = '/dashboard_cliente.html';
                } else {
                    alert("Error al actualizar la contraseña: " + data.message);
                }
            } catch (error) {
                alert("Error de conexión al guardar la contraseña.");
            }
        }
    </script>
</body>
</html>
