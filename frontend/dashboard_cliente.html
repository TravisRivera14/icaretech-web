<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Operaciones | iCare Tech CR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0c10; --card: #1f2833; --accent: #00b4d8; --text: #f5f5f7; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Barra Superior */
        header { background: #11141a; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .top-nav { display: flex; gap: 30px; margin-left: 40px; }
        .top-nav button { background: none; border: none; color: #8a99ad; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .top-nav button:hover, .top-nav button.active { color: var(--accent); }
        
        /* Layout Principal */
        .app-layout { display: flex; flex: 1; }
        .sidebar { width: 260px; background: #11141a; padding: 20px; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar h3 { font-size: 14px; color: #555; text-transform: uppercase; margin-bottom: 15px; }
        .sidebar li { padding: 12px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; list-style: none; transition: 0.2s; }
        .sidebar li:hover { background: var(--card); color: var(--accent); }
        
        .main-content { flex: 1; padding: 30px; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; }
    </style>
</head>
<body>

<header>
    <h1>iCare <span style="color:var(--accent)">OPS</span></h1>
    <nav class="top-nav" id="top-nav">
        <button onclick="changeCategory('datacenter', this)"><i class="fas fa-server"></i> Data Center</button>
        <button onclick="changeCategory('facturacion', this)"><i class="fas fa-file-invoice-dollar"></i> Facturación</button>
        <button onclick="changeCategory('tickets', this)"><i class="fas fa-ticket-alt"></i> Tickets</button>
        <button onclick="changeCategory('inventario', this)"><i class="fas fa-boxes"></i> Inventario</button>
    </nav>
</header>

<div class="app-layout">
    <aside class="sidebar">
        <h3 id="sidebar-title">Selecciona una categoría</h3>
        <ul id="menu-opciones"></ul>
    </aside>

    <main class="main-content">
        <div id="contenido-dinamico" class="card">
            <h2>Bienvenido al Centro de Operaciones</h2>
            <p>Selecciona una sección en la barra superior para gestionar tu empresa.</p>
        </div>
    </main>
</div>

<script>
    const menuConfig = {
        'facturacion': [
            { nombre: 'Facturas Emitidas', icon: 'fa-file-invoice' },
            { nombre: 'Pagos Realizados', icon: 'fa-credit-card' },
            { nombre: 'Notas de Crédito', icon: 'fa-sticky-note' },
            { nombre: 'Configuración Fiscal', icon: 'fa-cog' }
        ],
        'datacenter': [
            { nombre: 'Estado Servidores', icon: 'fa-server' },
            { nombre: 'Respaldos (Backups)', icon: 'fa-database' },
            { nombre: 'Logs de Acceso', icon: 'fa-list' }
        ],
        'tickets': [
            { nombre: 'Tickets Activos', icon: 'fa-clock' },
            { nombre: 'Historial Cerrados', icon: 'fa-check-circle' },
            { nombre: 'Crear Nuevo Ticket', icon: 'fa-plus-circle' }
        ],
        'inventario': [
            { nombre: 'Equipos en Custodia', icon: 'fa-laptop' },
            { nombre: 'Componentes/Piezas', icon: 'fa-microchip' },
            { nombre: 'Movimientos', icon: 'fa-exchange-alt' }
        ]
    };

    function changeCategory(cat, btn) {
        document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const sidebarTitle = document.getElementById('sidebar-title');
        const lista = document.getElementById('menu-opciones');
        
        sidebarTitle.innerText = cat.toUpperCase();
        lista.innerHTML = '';
        
        menuConfig[cat].forEach(op => {
            lista.innerHTML += `<li onclick="cargarModulo('${op.nombre}')"><i class="fas ${op.icon}"></i> ${op.nombre}</li>`;
        });
    }

    function cargarModulo(nombre) {
        document.getElementById('contenido-dinamico').innerHTML = `<h2>${nombre}</h2><p>Cargando datos desde iCare Core...</p>`;
        // Aquí puedes hacer el fetch a tus rutas de app.py dependiendo del módulo
    }
</script>
</body>
</html>
