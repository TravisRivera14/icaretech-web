<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Factura Electrónica | iCarTech CR</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }
        .facturador-container {
            max-width: 1000px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 16px;
            border: 1px solid #30363d;
            padding: 30px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6);
        }
        h1 { color: #f0f6fc; font-size: 24px; font-weight: 500; margin-bottom: 25px; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }
        label { display: block; margin-bottom: 8px; color: #8b949e; font-size: 13px; }
        select, input {
            width: 100%;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #f0f6fc;
            font-size: 14px;
            box-sizing: border-box;
        }
        select:focus, input:focus { border-color: #58a6ff; outline: none; }

        .btn-back {
            display: inline-block;
            padding: 8px 16px;
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            background: #30363d;
            color: #ffffff;
        }
        
        /* Tabla de líneas */
        .tabla-detalles {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: #0d1117;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #30363d;
        }
        .tabla-detalles th { background: #21262d; color: #c9d1d9; text-align: left; padding: 12px; font-size: 13px; font-weight: 500; }
        .tabla-detalles td { padding: 10px; border-bottom: 1px solid #30363d; }
        
        .btn-add {
            background: #21262d;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 15px;
            display: inline-block;
        }
        .btn-add:hover { background: #30363d; }
        .btn-danger { background: #da3633; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-danger:hover { background: #f85149; }

        /* Panel de Totales */
        .totales-box {
            margin-top: 30px;
            margin-left: auto;
            max-width: 300px;
            background: #21262d;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .total-row.final { border-top: 1px solid #30363d; padding-top: 10px; font-size: 18px; color: #58a6ff; font-weight: 600; }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 12px rgba(35,134,54,0.3);
        }
        .btn-submit:hover { background: #2ea043; }
    </style>
</head>
<body>

<div class="facturador-container">
    <h1>Crear Comprobante Electrónico</h1>
    
    <form id="facturaForm">
        <div class="row">
            <div class="col">
                <label for="cliente_id">Cliente Receptor</label>
                <select id="cliente_id" required>
                    <option value="">-- Seleccione un cliente --</option>
                    <option value="1">Cliente de Prueba (Físico)</option>
                </select>
            </div>
            <div class="col">
                <label for="condicion_venta">Condición de Venta</label>
                <select id="condicion_venta">
                    <option value="01">Contado</option>
                    <option value="02">Crédito</option>
                </select>
            </div>
            <div class="col">
                <label for="medio_pago">Medio de Pago</label>
                <select id="medio_pago">
                    <option value="04">Transferencia Bancaria</option>
                    <option value="01">Efectivo</option>
                    <option value="03">Tarjeta</option>
                </select>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <a href="/" style="color: #58a6ff; text-decoration: none; font-size: 14px;">
                &larr; Volver a la página principal
            </a>
        </div>

        <table class="tabla-detalles" id="tablaLineas">
            <thead>
                <tr>
                    <th style="width: 20%;">Código CAByS</th>
                    <th style="width: 45%;">Descripción del Servicio / Pieza</th>
                    <th style="width: 10%;">Cant.</th>
                    <th style="width: 15%;">Precio Unit. (CRC)</th>
                    <th style="width: 10%;">Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" class="linea-cabys" placeholder="Ej. 8311100000100" maxlength="13" required></td>
                    <td><input type="text" class="linea-desc" placeholder="Mano de obra, reparación, repuesto..." required></td>
                    <td><input type="number" class="linea-cant" value="1" min="1" step="any" oninput="calcularTotales()" required></td>
                    <td><input type="number" class="linea-precio" value="0" min="0" step="any" oninput="calcularTotales()" required></td>
                    <td><button type="button" class="btn-danger" onclick="eliminarLinea(this)">❌</button></td>
                </tr>
            </tbody>
        </table>

        <button type="button" class="btn-add" onclick="agregarLinea()">+ Agregar Línea</button>

        <div class="totales-box">
            <div class="total-row">
                <span>Subtotal:</span>
                <span id="txtSubtotal">₡0.00</span>
            </div>
            <div class="total-row">
                <span>IVA (13%):</span>
                <span id="txtIva">₡0.00</span>
            </div>
            <div class="total-row final">
                <span>Total:</span>
                <span id="txtTotal">₡0.00</span>
            </div>
        </div>

        <button type="submit" class="btn-submit">Emitir Factura Electrónica (Hacienda v4.4)</button>
    </form>
</div>

<script>
    // Agrega una fila extra a la tabla
    function agregarLinea() {
        const tbody = document.querySelector("#tablaLineas tbody");
        const nuevaFila = document.createElement("tr");
        nuevaFila.innerHTML = `
            <td><input type="text" class="linea-cabys" placeholder="Ej. 8311100000100" maxlength="13" required></td>
            <td><input type="text" class="linea-desc" placeholder="Descripción..." required></td>
            <td><input type="number" class="linea-cant" value="1" min="1" step="any" oninput="calcularTotales()" required></td>
            <td><input type="number" class="linea-precio" value="0" min="0" step="any" oninput="calcularTotales()" required></td>
            <td><button type="button" class="btn-danger" onclick="eliminarLinea(this)">❌</button></td>
        `;
        tbody.appendChild(nuevaFila);
        
        // Esta es la línea que enfoca automáticamente el nuevo campo
        nuevaFila.querySelector(".linea-cabys").focus();
        
        calcularTotales();
    }

    // Remueve una fila
    function eliminarLinea(boton) {
        const fila = boton.closest("tr");
        if (document.querySelectorAll("#tablaLineas tbody tr").length > 1) {
            fila.remove();
            calcularTotales();
        } else {
            alert("La factura debe tener al menos una línea.");
        }
    }

    // Lógica matemática en tiempo real para el cliente
    function calcularTotales() {
        let subtotal = 0;
        const filas = document.querySelectorAll("#tablaLineas tbody tr");
        
        filas.forEach(fila => {
            const cant = parseFloat(fila.querySelector(".linea-cant").value) || 0;
            const precio = parseFloat(fila.querySelector(".linea-precio").value) || 0;
            subtotal += (cant * precio);
        });

        let iva = subtotal * 0.13;
        let total = subtotal + iva;

        document.getElementById("txtSubtotal").innerText = "₡" + subtotal.toFixed(2);
        document.getElementById("txtIva").innerText = "₡" + iva.toFixed(2);
        document.getElementById("txtTotal").innerText = "₡" + total.toFixed(2);
    }

    // Envío de datos estructurados al API de Python
    document.getElementById("facturaForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const filas = document.querySelectorAll("#tablaLineas tbody tr");
        let detalles = [];

        filas.forEach(fila => {
            const cant = parseFloat(fila.querySelector(".linea-cant").value);
            const precio = parseFloat(fila.querySelector(".linea-precio").value);
            detalles.push({
                codigo_cabys: fila.querySelector(".linea-cabys").value,
                descripcion: fila.querySelector(".linea-desc").value,
                cantidad: cant,
                precio_unitario: precio,
                monto_total: cant * precio
            });
        });

        const payload = {
            cliente_id: document.getElementById("cliente_id").value,
            condicion_venta: document.getElementById("condicion_venta").value,
            medio_pago: document.getElementById("medio_pago").value,
            lineas: detalles
        };

        // Loader simulado en el botón estilo Apple
        const btn = document.querySelector(".btn-submit");
        btn.innerText = "Procesando con Hacienda...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/facturacion/emitir', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include', // <--- AGREGA ESTA LÍNEA ESENCIAL
                body: JSON.stringify(payload)
            });
            
            if (data.success) {
                alert("¡Excelente! Factura emitida y enviada a Hacienda.\nClave: " + data.clave);
                window.location.reload();
            } else {
                alert("Error al emitir: " + data.message);
                btn.innerText = "Emitir Factura Electrónica (Hacienda v4.4)";
                btn.disabled = false;
            }
            
        } catch (err) {
            alert("Error de comunicación con el servidor.");
            btn.innerText = "Emitir Factura Electrónica (Hacienda v4.4)";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
