<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iCare Tech CR | Soporte Técnico</title>
    </head>
<body>
    <script>
        // MANTÉN TU LÓGICA DE CARGA ORIGINAL, SOLO ASEGÚRATE QUE EL FETCH APUNTE A:
        fetch('/api/todo')
        .then(r => r.json())
        .then(data => {
            // Ejemplo: si tienes un id="productos-lista" en tu HTML original:
            const lista = document.getElementById('productos-lista');
            if (lista && data.productos) {
                lista.innerHTML = ''; // Limpiar antes de cargar
                data.productos.forEach(p => {
                    lista.innerHTML += `<div><h3>${p.nombre}</h3><p>₡${p.precio}</p></div>`;
                });
            }
            // Aquí puedes añadir la lógica para Servicios, Reseñas, etc.
        });
    </script>
</body>
</html>
