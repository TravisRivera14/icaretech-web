<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Soporte | iCare Tech CR</title>
    <link rel="icon" href="Logo_Pestana_v2.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --nav-bg: #355c6b; --neon-green: #7cf5a6; --turquoise-main: #00b4d8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7f6; padding: 20px; }
        .form-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: var(--turquoise-main); color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 5px; width: 100%; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Solicitar Soporte Técnico</h1>
        <form id="ticketForm" onsubmit="enviarTicket(event)">
            <select id="empresaSelect" required>
                <option value="">Cargando empresas...</option>
            </select>
            <input type="text" id="ticketContacto" placeholder="Nombre o Contacto" required>
            <input type="text" id="ticketAsunto" placeholder="Asunto del reporte" required>
            <textarea id="ticketDescripcion" rows="4" placeholder="Detalles técnicos" required></textarea>
            
            <label>Prioridad:</label>
            <div id="prioridad-selector">
                <button type="button" onclick="selectPriority('Alta')">Alta</button>
            </div>
            
            <button type="submit" id="btn-submit">Enviar Ticket</button>
        </form>
    </div>

    <script>
        const API = "http://localhost:5000";
        let prioridadSeleccionada = 'Alta';

        // Cargar empresas al iniciar
        document.addEventListener("DOMContentLoaded", () => {
            fetch(`${API}/api/empresas`)
                .then(r => r.json())
                .then(data => {
                    const select = document.getElementById('empresaSelect');
                    select.innerHTML = data.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
                }).catch(() => {
                    document.getElementById('empresaSelect').innerHTML = '<option>Error al cargar empresas</option>';
                });
        });

        async function enviarTicket(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "Enviando...";

            const data = {
                empresa_id: document.getElementById('empresaSelect').value,
                contacto: document.getElementById('ticketContacto').value,
                asunto: document.getElementById('ticketAsunto').value,
                descripcion: document.getElementById('ticketDescripcion').value,
                prioridad: prioridadSeleccionada
            };

            try {
                const res = await fetch(`${API}/tickets`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) {
                    alert("¡Ticket creado con éxito!");
                    document.getElementById('ticketForm').reset();
                } else {
                    throw new Error("Error en servidor");
                }
            } catch (err) {
                alert("Error al procesar el ticket. Intenta más tarde.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Ticket";
            }
        }

        function selectPriority(p) { prioridadSeleccionada = p; }
    </script>
</body>
</html>
