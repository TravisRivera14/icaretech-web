<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCare Tech CR | Soporte Técnico Avanzado y Seguridad Electrónica</title>
    <link rel="icon" href="Logo_Pestana_v2.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --dark-bg: #0b0c10; --card-bg: #1f2833; --turquoise-main: #00b4d8; --text-light: #f5f5f7; }
        body { background-color: var(--dark-bg); color: var(--text-light); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .anim-up { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .anim-up.visible { opacity: 1; transform: translateY(0); }
        .partner-card { display: inline-block; padding: 15px; }
        .partner-logo { max-width: 150px; filter: grayscale(1); transition: 0.3s; }
        .partner-logo:hover { filter: grayscale(0); }
    </style>
</head>
<body>

    <div id="socios-container" class="anim-up"></div>

    <script>
        const API = "http://localhost:5000"; // Asegúrate de que coincida con tu backend

        document.addEventListener("DOMContentLoaded", () => {
            loadHomeData();
        });

        async function loadHomeData() {
            try {
                const res = await fetch(`${API}/api/data`);
                const data = await res.json();

                // Cargar Socios
                const partC = document.getElementById('socios-container');
                if (partC && data.socios) {
                    partC.innerHTML = data.socios.map(p => `
                        <a href="${p.url || '#'}" target="_blank" class="partner-card">
                            <img src="${p.imagen}" alt="${p.nombre}" class="partner-logo">
                        </a>`).join('');
                }

                // Cargar otros elementos (ejemplo para beneficios)
                // renderizarBeneficios(data.beneficios);

                applyAnimations();
            } catch (err) {
                console.error("Error al cargar datos principales:", err);
            }
        }

        function applyAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.anim-up').forEach(el => observer.observe(el));
        }
    </script>
</body>
</html>
