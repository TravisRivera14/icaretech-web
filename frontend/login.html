<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso iCareTech CR</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #161b22; padding: 40px; border-radius: 12px; border: 1px solid #30363d; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; }
        button { width: 100%; padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Iniciar Sesión</h2>
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
        <p><a href="/recuperar" style="color: #58a6ff; font-size: 12px;">¿Olvidaste tu contraseña?</a></p>
    </div>

    <script>
        async function login() {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include', 
                body: JSON.stringify({
                    usuario: document.getElementById('usuario').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            
            if (data.success) {
                // REDIRECCIÓN INTELIGENTE BASADA EN ROL
                if (data.rol === 'admin') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/dashboard_cliente';
                }
            } else {
                alert("Usuario o contraseña incorrectos");
            }
        }
    </script>
</body>
</html>
