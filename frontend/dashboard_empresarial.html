<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Corporativo | iCare Tech CR</title>
    <link rel="icon" href="Logo_Pestana_v2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f1522; /* Fondo base un poco más claro */
            --sidebar-bg: rgba(255, 255, 255, 0.04); /* DUQUESA BLANCO TRANSPARENTE */
            --card-bg: rgba(255, 255, 255, 0.05); /* Tarjetas translúcidas */
            --card-hover: rgba(255, 255, 255, 0.08);
            --text-light: #f5f5f7;
            --text-muted: #94a3b8;
            --neon-blue: #00b4d8;
            --border-color: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s ease;
            --btn-green: #10b981;
            --btn-purple: #8b5cf6;
            --btn-yellow: #f59e0b;
            --del: #ff3b30;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* BARRA LATERAL CON EFECTO CRISTAL (GLASSMORPHISM) */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        
        .sidebar-header {
            padding: 30px 25px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        
        .sidebar-header img {
            max-width: 140px;
            margin-bottom: 15px;
        }
        
        .empresa-badge {
            background: rgba(0, 180, 216, 0.1);
            color: var(--neon-blue);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }
        
        .nav-menu { padding: 20px 0; flex: 1; overflow-y: auto; }
        
        .nav-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            font-size: 15px;
        }
        
        .nav-item:hover, .nav-item.active {
            color: var(--neon-blue);
            background: rgba(255,255,255,0.03);
            border-left: 4px solid var(--neon-blue);
        }
        
        .nav-item i.main-icon { width: 25px; font-size: 18px; }

        .dropdown-container {
            display: none;
            background: rgba(0,0,0,0.2);
            border-left: 1px solid var(--border-color);
        }

        .dropdown-container a {
            padding: 12px 25px 12px 55px;
            display: block;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: var(--transition);
        }

        .dropdown-container a:hover {
            color: var(--text-light);
            background: rgba(255,255,255,0.03);
        }
        
        .logout-btn { padding: 20px; border-top: 1px solid var(--border-color); }
        .logout-btn a { display: block; text-align: center; padding: 12px; background: rgba(255, 59, 48, 0.1); color: #ff3b30; border-radius: 8px; text-decoration: none; font-weight: 600; transition: var(--transition); }
        .logout-btn a:hover { background: #ff3b30; color: white; }

        /* CONTENIDO PRINCIPAL */
        .main-content { flex: 1; margin-left: 280px; padding: 40px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .user-info h1 { font-size: 24px; color: #fff; margin-bottom: 5px; }
        .user-info p { color: var(--text-muted); font-size: 15px; }

        /* TARJETAS CON EFECTO CRISTAL */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        
        .dash-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
            cursor: pointer;
        }

        .dash-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-blue);
            background: var(--card-hover);
            box-shadow: 0 10px 30px rgba(0, 180, 216, 0.1);
        }

        .dash-icon { width: 60px; height: 60px; border-radius: 12px; background: rgba(0, 180, 216, 0.1); color: var(--neon-blue); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .dash-info h3 { color: #fff; font-size: 18px; margin-bottom: 5px; }
        .dash-info p { color: var(--text-muted); font-size: 14px; }

        /* VISTAS INTERNAS DEL FACTURADOR */
        .page-title { margin: 0 0 20px 0; font-size: 20px; font-weight: 600; color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;}
        .section-title { margin: 0 0 15px 0; font-size: 16px; font-weight: 600; color: #fff;}
        .breadcrumb { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
        .breadcrumb span { color: var(--neon-blue); font-weight: 600; }
        
        .card-white { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 24px; }
        .metric-box { background: var(--card-bg); backdrop-filter: blur(12px); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .metric-box p { margin: 0 0 8px 0; font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: 0.5px; }
        .metric-box h3 { margin: 0; font-size: 22px; font-weight: 700; color: #fff; }

        .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .btn-top {
            padding: 10px 18px; border-radius: 8px; border: none; color: white; font-weight: 600; font-size: 13.5px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;
        }
        .btn-top:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-t-green { background: #10b981; color: #fff;}
        .btn-t-blue { background: var(--neon-blue); color: #fff; }

        .form-input { 
            width: 100%; padding: 12px 15px; margin-bottom: 15px; border-radius: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: #fff; font-size: 13.5px; transition: 0.3s; box-sizing: border-box; font-family: inherit;
        }
        .form-input:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.2);}
        label { color: #cfd8dc; font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block;}

        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13.5px; color: #fff;}
        .admin-table th { color: var(--text-muted); text-align: left; padding: 14px 15px; border-bottom: 2px solid var(--border-color); font-weight: 600; text-transform: uppercase; font-size: 11px; background: rgba(0,0,0,0.2); }
        .admin-table td { padding: 14px 15px; border-bottom: 1px solid var(--border-color); color: #cfd8dc; }
        .admin-table tr:hover td { background: rgba(255,255,255,0.03); }

        .fact-btn-del { padding: 6px 10px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.3s;}
        .fact-btn-del:hover { background: #ef4444; color: white;}
        .fact-btn-view { padding: 6px 12px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--btn-green); border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.3s; margin-right: 5px; font-weight: 600;}
        .fact-btn-view:hover { background: var(--btn-green); color: white;}

        .tabs-header { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; gap: 5px; }
        .tab-link { padding: 12px 20px; cursor: pointer; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: 0.2s; }
        .tab-link:hover { color: #fff; }
        .tab-link.active { color: var(--neon-blue); border-bottom-color: var(--neon-blue); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <img src="Logo.png" alt="iCare Tech">
            <div><span class="empresa-badge" id="nombre-empresa-badge">Cargando Empresa...</span></div>
        </div>
        
        <div class="nav-menu" id="sidebar-dynamic-menu">
            </div>
        
        <div class="logout-btn">
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="topbar">
            <div class="user-info">
                <h1 id="bienvenida-usuario">Bienvenido, Usuario</h1>
                <p>Resumen de actividad corporativa</p>
            </div>
            
            <div style="display:flex; align-items:center; gap: 20px;">
                <div style="color: var(--neon-blue); font-size: 24px; cursor:pointer;" title="Notificaciones">
                    <i class="fas fa-bell"></i>
                </div>
                <div style="display:flex; align-items:center; gap:12px; padding-left:20px; border-left:1px solid var(--border-color);">
                    <div style="text-align: right; display: flex; flex-direction: column;">
                        <span id="header-user-name" style="color:white; font-weight:700; font-size:14px; margin-bottom: 2px;">Cargando...</span>
                        <span onclick="logout()" style="color:#ff3b30; font-size:12px; font-weight: 600; cursor:pointer; transition: 0.3s;" onmouseover="this.style.color='#ff6b6b'" onmouseout="this.style.color='#ff3b30'"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</span>
                    </div>
                    <div id="header-user-initial" style="width:40px; height:40px; border-radius:50%; background:var(--neon-blue); display:flex; align-items:center; justify-content:center; color:black; font-weight:800; font-size:18px;">U</div>
                </div>
            </div>
        </div>

        <div id="vista-principal" class="dashboard-grid">
            <div class="dash-card" onclick="showSection('tickets')">
                <div class="dash-icon"><i class="fas fa-ticket-alt"></i></div>
                <div class="dash-info">
                    <h3>Centro de Soporte</h3>
                    <p>Gestiona tickets y reporta averías.</p>
                </div>
            </div>
            
            <div class="dash-card" onclick="showSection('facturacion')">
                <div class="dash-icon"><i class="fas fa-file-invoice-dollar"></i></div>
                <div class="dash-info">
                    <h3>Módulo Contable</h3>
                    <p>Facturación electrónica y proformas.</p>
                </div>
            </div>
            
            <div class="dash-card" onclick="showSection('datacenter')">
                <div class="dash-icon"><i class="fas fa-server"></i></div>
                <div class="dash-info">
                    <h3>Cloud & Data Center</h3>
                    <p>Monitoreo y respaldos de servidores.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let userDataCache = {};
        let lineasDocumento = []; 
        let clientesCache = [];
        let productosCache = [];

        // Menú lateral dinámico
        const menuData = {
            'datacenter': [
                {nombre: 'Resumen Data Center', icon: 'fa-server'}, 
                {nombre: 'Monitoreo', icon: 'fa-chart-area'}, 
                {nombre: 'Respaldos', icon: 'fa-shield-alt'}
            ],
            'facturacion': [
                {nombre: 'Inicio Facturador', icon: 'fa-rocket'},
                {nombre: 'Clientes', icon: 'fa-users'},
                {nombre: 'Catálogo CABYS', icon: 'fa-box'},
                {nombre: 'Nueva Factura', icon: 'fa-file-invoice-dollar'},
                {nombre: 'Historial de Facturas', icon: 'fa-file-alt'},
                {nombre: 'Nueva Proforma', icon: 'fa-file-contract'},
                {nombre: 'Proformas Generadas', icon: 'fa-file-signature'},
                {nombre: 'Datos de la Empresa', icon: 'fa-id-card'},
                {nombre: 'Llave Hacienda (.p12)', icon: 'fa-key'}
            ],
            'tickets': [
                {nombre: 'Reportar Avería', icon: 'fa-plus-circle'}, 
                {nombre: 'Tickets Activos', icon: 'fa-list'}, 
                {nombre: 'Historial de Soporte', icon: 'fa-history'}
            ]
        };

        window.showSection = function(sec) {
            const menuHtml = document.getElementById('sidebar-dynamic-menu');
            let items = menuData[sec];
            
            let html = `
                <div class="nav-item" onclick="cargarVista('inicio')" style="margin-bottom:15px; border-bottom:1px solid var(--border-color); padding-bottom:20px;">
                    <div><i class="fas fa-arrow-left main-icon"></i> Volver al Menú</div>
                </div>
            `;
            items.forEach((item, index) => {
                html += `
                <a class="nav-item ${index === 0 ? 'active' : ''}" onclick="renderModulo('${item.nombre}', this)">
                    <div><i class="fas ${item.icon} main-icon"></i> ${item.nombre}</div>
                </a>`;
            });
            menuHtml.innerHTML = html;
            renderModulo(items[0].nombre, menuHtml.querySelector('.nav-item.active'));
        };

        window.cargarVista = function(vista) {
            if(vista === 'inicio') location.reload(); 
        };

        window.renderModulo = function(opcion, el) {
            if(el) {
                document.querySelectorAll('.sidebar .nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }

            const contenedor = document.getElementById('vista-principal');
            contenedor.classList.remove('dashboard-grid');

            // MÓDULO DATA CENTER
            if (opcion === 'Resumen Data Center' || opcion === 'Monitoreo' || opcion === 'Respaldos') {
                contenedor.innerHTML = `<div class="breadcrumb">Cloud & Data Center / <span>${opcion}</span></div><div class="card-white"><h2 class="page-title"><i class="fas fa-server"></i> ${opcion}</h2><p style="color:var(--text-muted);">Módulo de infraestructura en línea.</p></div>`;
            }

            // MÓDULO CONTABLE (FACTURACIÓN)
            else if (opcion === 'Inicio Facturador') {
                const plan = userDataCache.plan || 'Gratis';
                contenedor.innerHTML = `
                    <div class="breadcrumb">Modulo Contable / <span>Información general</span></div>
                    <h2 class="page-title">Información general de facturación</h2>
                    
                    <div class="metrics-grid">
                        <div class="metric-box"><p>VENTAS NETAS</p><h3>₡0.00</h3></div>
                        <div class="metric-box"><p>COMPRAS NETAS</p><h3>₡0.00</h3></div>
                        <div class="metric-box"><p>BALANCE NETAS</p><h3>₡0.00</h3></div>
                        <div class="metric-box"><p>PROVISIÓN MENSUAL DE VENTAS</p><h3>₡0.00</h3></div>
                    </div>

                    <div class="split-grid">
                        <div class="card-white">
                            <h3 class="section-title">PLAN RECOMENDADO</h3>
                            <p style="color:var(--text-muted); margin-bottom:15px;">Basado en las características de su perfil, este es un plan recomendado de nuestra tienda:</p>
                            <h4 style="color:var(--neon-blue); margin:0 0 10px 0;">PLAN PROFESIONAL (Actualmente: ${plan})</h4>
                            <ul style="color:#cfd8dc; padding-left:20px; line-height:1.8;">
                                <li>Documentos Ilimitados</li>
                                <li>Reportes Especializados</li>
                                <li>Dashboard Completo de Indicadores</li>
                            </ul>
                        </div>
                        <div class="card-white">
                            <h3 class="section-title">DISPONGA DE UN MAYOR ANÁLISIS</h3>
                            <p style="color:var(--text-muted); margin-bottom:15px;">Mejorando su plan podrá contar con más áreas de datos para su negocio:</p>
                            <ul style="color:#cfd8dc; padding-left:20px; line-height:1.8;">
                                <li>Gráficos de mejores ventas y compras</li>
                                <li>Gráficos de mejores clientes y proveedores</li>
                                <li>Información de medios de pago</li>
                            </ul>
                        </div>
                    </div>
                `;
            }
            else if (opcion === 'Clientes') {
                contenedor.innerHTML = `
                    <div class="breadcrumb">Modulo Contable / <span>Clientes</span></div>
                    <div class="card-white">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:15px;">
                            <h2 class="page-title" style="border:none; margin:0; padding:0;">Clientes registrados</h2>
                            <button class="btn-top btn-t-blue" onclick="document.getElementById('form-cliente').style.display='block'"><i class="fas fa-plus"></i> Registrar Cliente</button>
                        </div>
                        <div id="form-cliente" style="display:none; background:rgba(0,0,0,0.2); padding:25px; border-radius:12px; margin-bottom:20px; border:1px solid var(--border-color);">
                            <h3 class="section-title">Nuevo Cliente</h3>
                            <form onsubmit="window.guardarClienteFact(event)" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                                <div><label>Nombre o Razón Social</label><input type="text" id="fc-nombre" class="form-input" required></div>
                                <div><label>Identificación</label><input type="text" id="fc-cedula" class="form-input" required></div>
                                <div><label>Tipo Identificación</label><select id="fc-tipo" class="form-input"><option value="01">Física</option><option value="02">Jurídica</option></select></div>
                                <div><label>Correo Electrónico</label><input type="email" id="fc-correo" class="form-input" required></div>
                                <div><label>Teléfono</label><input type="text" id="fc-telefono" class="form-input"></div>
                                <div style="grid-column:1/-1; display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
                                    <button type="button" class="btn-top" style="background:#475569;" onclick="document.getElementById('form-cliente').style.display='none'">Cancelar</button>
                                    <button type="submit" class="btn-top btn-t-green"><i class="fas fa-save"></i> Guardar Cliente</button>
                                </div>
                            </form>
                        </div>
                        <div id="tabla-clientes-fact">Cargando clientes...</div>
                    </div>
                `;
                window.cargarClientesFact();
            }
            else if (opcion === 'Catálogo CABYS') {
                contenedor.innerHTML = `
                    <div class="breadcrumb">Modulo Contable / <span>CABYS</span></div>
                    <div class="card-white">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:15px;">
                            <h2 class="page-title" style="border:none; margin:0; padding:0;">Catálogo de productos y servicios</h2>
                            <button class="btn-top btn-t-blue" onclick="document.getElementById('form-prod-box').style.display='block'"><i class="fas fa-plus"></i> Nuevo Ítem</button>
                        </div>
                        <div id="form-prod-box" style="display:none; background:rgba(0,0,0,0.2); padding:25px; border-radius:12px; border:1px solid var(--border-color); margin-bottom:20px;">
                            <form onsubmit="window.guardarProductoFact(event)" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                                <div><label>Código CABYS</label><input type="text" id="fp-cabys" class="form-input" required placeholder="13 dígitos"></div>
                                <div><label>Descripción</label><input type="text" id="fp-desc" class="form-input" required></div>
                                <div><label>Precio Unitario (₡)</label><input type="number" id="fp-precio" class="form-input" step="0.01" required></div>
                                <div><label>IVA (%)</label><select id="fp-iva" class="form-input"><option value="13.00">13%</option><option value="0.00">0%</option></select></div>
                                <input type="hidden" id="fp-unidad" value="Sp">
                                <div style="grid-column:1/-1; display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
                                    <button type="button" class="btn-top" style="background:#475569;" onclick="document.getElementById('form-prod-box').style.display='none'">Cancelar</button>
                                    <button type="submit" class="btn-top btn-t-green"><i class="fas fa-save"></i> Registrar Ítem</button>
                                </div>
                            </form>
                        </div>
                        <div id="tabla-productos-fact">Cargando catálogo...</div>
                    </div>
                `;
                window.cargarProductosFact();
            }
            else if (opcion === 'Nueva Factura' || opcion === 'Nueva Proforma') {
                window.renderEditorDocumento(opcion === 'Nueva Factura' ? 'Factura' : 'Proforma');
            }
            else if (opcion === 'Historial de Facturas' || opcion === 'Proformas Generadas') {
                const tipo = opcion === 'Historial de Facturas' ? 'factura' : 'proforma';
                contenedor.innerHTML = `<div class="breadcrumb">Modulo Contable / <span>${opcion}</span></div><div class="card-white"><h2 class="page-title">${opcion}</h2><div id="tabla-historial">Cargando...</div></div>`;
                window.cargarHistorialDoc(tipo);
            }
            else if (opcion === 'Datos de la Empresa') {
                window.renderConfigEmpresa();
            }
            else if (opcion === 'Llave Hacienda (.p12)') {
                window.renderConfigHacienda();
            }

            // ---------- MODULO TICKETS (SOPORTE) ----------
            else if (opcion === 'Reportar Avería') {
                contenedor.innerHTML = `
                    <div class="breadcrumb">Soporte iCare / <span>Reportar Avería</span></div>
                    <div class="card-white" style="max-width:650px;">
                        <h2 class="page-title"><i class="fas fa-plus-circle"></i> Nuevo Requerimiento</h2>
                        <form id="form-ticket" onsubmit="window.crearTicket(event)">
                            <label>Nombre de Contacto</label><input type="text" id="t-contacto" class="form-input" required>
                            <label>WhatsApp de Contacto</label><input type="text" id="t-whats" class="form-input" required>
                            <label>Asunto del Requerimiento</label><input type="text" id="t-asunto" class="form-input" required>

        window.agregarLinea = function() {

            lineasDocumento.push({ codigo_cabys: window.prodSeleccionado.codigo_cabys, descripcion: window.prodSeleccionado.descripcion, cantidad: cant, precio_unitario: window.prodSeleccionado.precio_unitario, monto_total: cant * window.prodSeleccionado.precio_unitario, impuesto: window.prodSeleccionado.impuesto, unidad_medida: window.prodSeleccionado.unidad_medida });

            tbody.innerHTML = html || `<tr><td colspan="7" style="text-align:center; color:var(--text-muted);">Sin líneas</td></tr>`;
            document.getElementById('t-sub').innerText = `₡${sub.toFixed(2)}`; document.getElementById('t-iva').innerText = `₡${iva.toFixed(2)}`; document.getElementById('t-total').innerText = `₡${(sub+iva).toFixed(2)}`;

        window.emitirDocumento = async function(tipo) {
            const cliente_id = document.getElementById('doc-cliente').value;
            if(!cliente_id) return alert("Selecciona un cliente.");
            const btn = document.getElementById('btn-emitir-doc'); btn.innerText = "Procesando..."; btn.disabled = true;
            let sub = 0; let iva = 0; lineasDocumento.forEach(l => { sub += l.monto_total; iva += l.monto_total * (parseFloat(l.impuesto)/100); });
            const payload = { cliente_id: cliente_id, condicion_venta: document.getElementById('doc-condicion').value, medio_pago: document.getElementById('doc-medio').value, lineas: lineasDocumento, total_gravado: sub, total_impuesto: iva, total_comprobante: sub + iva };
            const endpoint = tipo === 'Factura' ? '/api/facturacion/emitir' : '/api/facturacion/proformas/emitir';
            try {
                const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(payload) });
                const data = await res.json();
                if(data.success) { alert(`¡${tipo} generada con éxito!`); window.renderModulo(tipo === 'Factura' ? 'Historial de Facturas' : 'Proformas Generadas'); } 
                else { alert("Error: " + data.message); btn.innerText = `Emitir ${tipo}`; btn.disabled = false; }
            } catch(e) { alert("Error de red."); btn.disabled = false; }
        };

                if(lista.length === 0) { area.innerHTML = "<p style='color:var(--text-muted); text-align:center; padding:20px;'>No hay tickets en esta vista.</p>"; return; }
                
                area.innerHTML = `<table class="admin-table"><thead><tr><th>Fecha</th><th>Asunto / Falla</th><th>Prioridad</th><th>Estado</th><th>Atendido por</th></tr></thead><tbody>
                    ${lista.map(t => `<tr>
                        <td>${new Date(t.fecha).toLocaleDateString()}</td>
                        <td><b style="color:#fff;">${t.asunto}</b><br><span style="font-size:11.5px; color:var(--text-muted);">${t.descripcion}</span></td>
                        <td style="color:${t.prioridad === 'Alta' ? 'var(--del)' : 'var(--btn-yellow)'}">${t.prioridad}</td>
                        <td style="color:${t.estado==='Resuelto'?'var(--btn-green)':'var(--btn-blue)'}">${t.estado}</td>
                        <td>${t.atendido_por}</td>
                    </tr>`).join('')}
                </tbody></table>`;
            });
        };

        // --- INICIALIZADOR GLOBAL ---
        window.onload = async () => {
            try {
                const res = await fetch('/api/login', { method: 'GET', credentials: 'include' });
                if (res.status === 401) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                if(data.usuario) {
                    document.getElementById('bienvenida-usuario').innerText = `Bienvenido, ${data.usuario}`;
                    document.getElementById('nombre-empresa-badge').innerText = data.empresa || "Cliente Corporativo";
                    const headerUserName = document.getElementById('header-user-name');
                    const headerUserInitial = document.getElementById('header-user-initial');
                    if (headerUserName && headerUserInitial) { headerUserName.innerText = data.usuario; headerUserInitial.innerText = data.usuario.charAt(0).toUpperCase(); }
                }
                
                fetch('/api/cliente/datos-operativos', {credentials: 'include'}).then(r=>r.json()).then(d => userDataCache = d);
                fetch('/api/facturacion/clientes', {credentials: 'include'}).then(r=>r.json()).then(d => clientesCache = d);
                fetch('/api/facturacion/productos', {credentials: 'include'}).then(r=>r.json()).then(d => productosCache = d);

            } catch (e) { console.warn("backend offline"); }
        };

        async function logout() {
            if(confirm('¿Seguro que deseas cerrar sesión?')) { try { await fetch('/api/logout', { credentials: 'include' }); window.location.href = '/login.html'; } catch (e) { window.location.href = '/login.html'; } }
        }
    </script>
</body>
</html>
