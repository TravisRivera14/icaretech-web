<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Operaciones | iCare Tech CR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0c10; --card: #1f2833; --accent: #00b4d8; --text: #f5f5f7; --del: #ff3b30; --green: #10b981;}
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased;}
        
        header { background: #11141a; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); justify-content: space-between;}
        h1 { margin: 0; font-size: 20px;}
        
        .top-nav { display: flex; gap: 20px; }
        .top-nav button { background: none; border: none; color: #8a99ad; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 14px; padding: 8px 12px; border-radius: 6px;}
        .top-nav button:hover { background: rgba(255,255,255,0.03); color: white; }
        .top-nav button.active { color: var(--accent); background: rgba(0, 180, 216, 0.1); }
        
        .app-layout { display: flex; flex: 1; }
        .sidebar { width: 260px; background: #11141a; padding: 20px 0; border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; }
        .menu-title { font-size: 11px; color: #555; text-transform: uppercase; margin: 15px 20px 8px; font-weight: 700; letter-spacing: 1px;}
        .nav-item { padding: 11px 20px; cursor: pointer; color: #8a99ad; font-size: 13.5px; display: flex; align-items: center; gap: 12px; transition: 0.2s; font-weight: 500;}
        .nav-item:hover { background: rgba(255,255,255,0.03); color: white; }
        .nav-item.active { color: var(--accent); background: rgba(0, 180, 216, 0.05); border-left: 3px solid var(--accent); padding-left: 17px;}
        
        .submenu { list-style: none; padding-left: 45px; display: none; background: rgba(0,0,0,0.2); margin:0; }
        .submenu li { padding: 9px 0; cursor: pointer; color: #8a99ad; font-size: 13px; transition: 0.2s; font-weight: 500;}
        .submenu li:hover { color: white; }
        .submenu li.active { color: var(--accent); font-weight: 600;}
        
        .main-content { flex: 1; padding: 30px; background: #0e1014; overflow-y:auto;}
        .card { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
        
        h2 { margin: 0 0 25px 0; font-size: 22px; font-weight: 700;}
        h3 { margin: 0 0 15px 0; font-size: 16px; font-weight: 600; color: #fff;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px;}
        th { color: #8a99ad; text-align: left; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;}
        td { padding: 14px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #cfd8dc;}
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.01); color: white;}

        .fact-input { width: 100%; padding: 11px 15px; margin-bottom: 15px; border-radius: 6px; background: #0b0c10; border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 13.5px; transition: 0.3s; box-sizing: border-box; font-family: inherit;}
        .fact-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(0, 180, 216, 0.2);}
        .fact-btn { padding: 11px 20px; background: var(--accent); border: none; border-radius: 6px; font-weight: 700; cursor: pointer; color: black; font-size: 13.5px; transition: 0.3s; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; justify-content: center;}
        .fact-btn:hover { background: white; transform: translateY(-1px);}
        .fact-btn:disabled { background: #444 !important; color: #8a99ad !important; cursor: not-allowed; transform: none;}
        
        /* ESTILOS TARJETAS DE PRECIOS */
        .pricing-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; justify-content: flex-start; align-items: flex-end;}
        .price-card { background: white; border-radius: 12px; width: 280px; overflow: hidden; text-align: center; color: #333; display: flex; flex-direction: column; border: 1px solid #e1e4e8; position: relative;}
        .price-card.recommended { transform: scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.3); border: 2px solid #2ea043; z-index: 10; margin: 0 10px;}
        .price-card.dark-card { background: #161b22; border-color: #30363d; color: #f5f5f7; }
        
        .price-header { padding: 15px; font-weight: 800; font-size: 14px; letter-spacing: 1px;}
        .bg-blue { background: #0071e3; color: white; }
        .bg-green { background: #2ea043; color: white; }
        .bg-dark { background: #333; color: white; }
        
        .price-badge { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: #da3633; color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: 800;}
        .price-amount { padding: 25px 20px 10px; border-bottom: 1px solid #f0f0f0; }
        .dark-card .price-amount { border-bottom-color: #30363d; }
        
        .price-amount h2 { font-size: 38px; color: #111; margin: 0; font-weight: 800;}
        .dark-card .price-amount h2 { color: #fff; }
        .price-amount .colones { font-size: 13px; color: #666; margin: 5px 0;}
        .dark-card .price-amount .colones { color: #8a99ad; }
        .price-amount .period { font-size: 13px; color: #2ea043; font-weight: 600;}
        .dark-card .price-amount .period { color: #8a99ad; }
        
        .price-features { padding: 20px; list-style: none; margin: 0; flex: 1; }
        .price-features li { padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; color: #444; }
        .dark-card .price-features li { border-bottom-color: #30363d; color: #cfd8dc; }
        .price-features li:last-child { border-bottom: none; }
        .price-features b { color: #111; }
        .dark-card .price-features b { color: var(--accent); }
        
        .price-btn-box { padding: 20px; background: #fafafa; border-top: 1px solid #e1e4e8;}
        .dark-card .price-btn-box { background: #11141a; border-top-color: #30363d; }
        .price-btn { padding: 12px 25px; border-radius: 6px; font-weight: 700; text-decoration: none; display: inline-block; width: 100%; box-sizing: border-box; font-size: 13px; cursor: pointer; transition:0.2s;}
        
        .btn-outline { border: 2px solid #0071e3; color: #0071e3; background: transparent; }
        .btn-outline:hover { background: #0071e3; color: white; }
        .btn-solid { border: 2px solid #2ea043; background: #2ea043; color: white; }
        .btn-solid:hover { background: #238636; border-color: #238636; }
        .btn-disabled { border: 2px solid #555; background: #333; color: #888; cursor: default; }

        .fact-btn-del { padding: 6px 10px; background: rgba(255,59,48,0.1); border: 1px solid rgba(255,59,48,0.3); color: var(--del); border-radius: 4px; cursor: pointer; font-size: 11px; transition: 0.3s;}
        .fact-btn-del:hover { background: var(--del); color: white; border-color: var(--del);}
        .fact-btn-view { padding: 6px 10px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--green); border-radius: 4px; cursor: pointer; font-size: 11px; transition: 0.3s; margin-right: 5px;}
        .fact-btn-view:hover { background: var(--green); color: white; border-color: var(--green);}
        
        .lineas-table th { background: #11141a; padding: 10px; font-size: 10px;}
        .lineas-table td { padding: 8px 10px; background: #161a22; border-bottom: 1px solid #0b0c10;}
        #total-box p { margin: 5px 0; display: flex; justify-content: space-between; color: #8a99ad; }
        #total-box p b { color: white; font-size: 15px;}
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <img src="Logo_Admin_v2.png" alt="Logo" style="height:30px;">
        <h1>iCare <span style="color:var(--accent)">OPS</span></h1>
        <span id="badge-admin" style="display:none; background:var(--green); color:white; font-size:10px; font-weight:bold; padding:4px 8px; border-radius:4px; letter-spacing:0.5px;">ADMIN EMPRESARIAL</span>
    </div>
    <nav class="top-nav" id="top-nav">
        <button id="btn-nav-facturacion" onclick="showSection('facturacion')" style="display:none;"><i class="fas fa-file-invoice-dollar"></i> Facturación y Proformas</button>
        <button id="btn-nav-tickets" onclick="showSection('tickets')" style="display:none;"><i class="fas fa-ticket-alt"></i> Soporte Técnico</button>
        <button id="btn-nav-datacenter" onclick="showSection('datacenter')" style="display:none;"><i class="fas fa-server"></i> Cloud & Data Center</button>
        <button id="btn-nav-inventario" onclick="showSection('inventario')" style="display:none;"><i class="fas fa-boxes"></i> Inventario</button>
    </nav>
</header>

<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div id="contenido-dinamico" class="card">
            <h2>Centro de Operaciones</h2>
            <p style="color:#8a99ad;">Cargando interfaz y permisos...</p>
        </div>
    </main>
</div>

<script>
    let userDataCache = {};
    let lineasDocumento = []; 
    let clientesCache = [];
    let productosCache = [];

    // Función de contacto a WhatsApp para ventas
    function openWA(msg) {
        window.open(`https://wa.me/50686390631?text=${encodeURIComponent(msg)}`, '_blank');
    }

    const menuData = {
        'datacenter': [{nombre: 'Resumen'}, {nombre: 'Monitoreo'}, {nombre: 'Respaldos'}],
        'facturacion': [
            {nombre: 'Inicio'}, {nombre: 'Clientes'}, {nombre: 'Catálogo CABYS'}, 
            {nombre: 'Facturación Electrónica', sub: ['Nueva Factura', 'Historial de Facturas']},
            {nombre: 'Proformas', sub: ['Nueva Proforma', 'Proformas Generadas']},
            {nombre: 'Configuración', sub: ['Datos de la Empresa', 'Llave Hacienda (.p12)']}
        ],
        'tickets': [{nombre: 'Reportar Avería'}, {nombre: 'Tickets Activos'}, {nombre: 'Historial'}],
        'inventario': [{nombre: 'Resumen Stock'}, {nombre: 'Movimientos'}]
    };

    function showSection(sec) {
        document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById(`btn-nav-${sec}`);
        if(btn) btn.classList.add('active');

        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = `<div class="menu-title">${btn ? btn.innerText.toUpperCase() : sec.toUpperCase()}</div>`;
        
        menuData[sec].forEach(item => {
            if (item.sub) {
                sidebar.innerHTML += `<div class="nav-item" onclick="toggleSub(this)"><i class="fas fa-chevron-right" style="font-size:10px; width:12px;"></i> ${item.nombre}</div>
                    <ul class="submenu">${item.sub.map(s => `<li onclick="render('${s}', this)">${s}</li>`).join('')}</ul>`;
            } else { sidebar.innerHTML += `<div class="nav-item" onclick="render('${item.nombre}', this)">${item.nombre}</div>`; }
        });
        
        const firstItem = sidebar.querySelector('.nav-item');
        if(firstItem) firstItem.click();
    }

    function toggleSub(el) { 
        const sub = el.nextElementSibling;
        const icon = el.querySelector('i');
        const isOpen = sub.style.display === 'block';
        sub.style.display = isOpen ? 'none' : 'block'; 
        icon.className = isOpen ? 'fas fa-chevron-right' : 'fas fa-chevron-down';
    }

    window.onload = async function() {
        try {
            const res = await fetch('/api/cliente/datos-operativos', {credentials: 'include'});
            userDataCache = await res.json();
            if (userDataCache.error) { renderError(userDataCache.error); return; }
            if (userDataCache.rol === 'cliente_admin') document.getElementById('badge-admin').style.display = 'block';

            const p = userDataCache.permisos;
            let firstSec = null;
            if (p.facturacion) { document.getElementById('btn-nav-facturacion').style.display = 'flex'; firstSec = 'facturacion'; }
            if (p.tickets) { document.getElementById('btn-nav-tickets').style.display = 'flex'; if(!firstSec) firstSec = 'tickets'; }
            if (p.datacenter) { document.getElementById('btn-nav-datacenter').style.display = 'flex'; if(!firstSec) firstSec = 'datacenter'; }
            if (p.inventario) { document.getElementById('btn-nav-inventario').style.display = 'flex'; if(!firstSec) firstSec = 'inventario'; }

            if (firstSec) showSection(firstSec);
            else document.getElementById('contenido-dinamico').innerHTML = "<h2>Sin Módulos</h2><p>No tienes acceso a ningún módulo operativo.</p>";
            
            fetch('/api/facturacion/clientes', {credentials: 'include'}).then(r=>r.json()).then(d => clientesCache = d);
            fetch('/api/facturacion/productos', {credentials: 'include'}).then(r=>r.json()).then(d => productosCache = d);

        } catch(e) { renderError("Fallo de conexión"); }
    };

    function render(opcion, el) {
        document.querySelectorAll('.sidebar .nav-item, .sidebar .submenu li').forEach(i => i.classList.remove('active'));
        if(el) el.classList.add('active');
        
        const modulos = {
            'Inicio': renderInicioFact, 'Clientes': renderClientes, 'Catálogo CABYS': renderProductos,
            'Nueva Factura': () => renderEditorDocumento('Factura'), 'Historial de Facturas': renderHistorialFacturas,
            'Nueva Proforma': () => renderEditorDocumento('Proforma'), 'Proformas Generadas': renderHistorialProformas,
            'Datos de la Empresa': renderConfigEmpresa, 'Llave Hacienda (.p12)': renderConfigHacienda,
            'Reportar Avería': renderNuevoTicket, 'Tickets Activos': renderTicketsActivos, 'Historial': renderTicketsHistorial
        };
        if(modulos[opcion]) modulos[opcion]();
        else document.getElementById('contenido-dinamico').innerHTML = `<h2>${opcion}</h2><p style="color:#8a99ad;">Módulo en construcción...</p>`;
    }

    // --- NUEVO INICIO CON GUÍA Y PLANES (REQ: IMAGEN) ---
    function renderInicioFact() {
        const plan = userDataCache.plan || 'Gratis';
        const usadas = userDataCache.facturas_mes_actual || 0;
        
        let headerMensaje = `Actualmente tu empresa está en el plan <b style="color:var(--accent);">${plan.toUpperCase()}</b>.`;
        if (plan === 'Gratis') {
            headerMensaje += `<br><br><div style="background:rgba(255,149,0,0.1); border:1px solid #ff9500; color:#ff9500; padding:15px; border-radius:8px; display:inline-block;">
                <i class="fas fa-chart-pie"></i> Has emitido <b>${usadas} de 3</b> facturas gratuitas este mes.
            </div>`;
        }

        document.getElementById('contenido-dinamico').innerHTML = `
            <h2><i class="fas fa-rocket" style="color:var(--accent);"></i> Bienvenido al Facturador iCareTech CR</h2>
            
            <div class="card" style="background:#11141a; padding:25px; border-radius:8px; margin-bottom:40px;">
                <h3 style="color:var(--accent); border-bottom:1px solid #333; padding-bottom:10px;"><i class="fas fa-book-open"></i> ¿Cómo empezar a facturar?</h3>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:20px; margin-top:20px;">
                    <div style="background:#0b0c10; padding:15px; border-radius:8px; border:1px solid #333;">
                        <h4 style="color:white; margin:0 0 10px 0; font-size:15px;"><span style="color:var(--accent); margin-right:5px;">1.</span> Configura Hacienda</h4>
                        <p style="color:#8a99ad; font-size:13px; margin:0;">Sube tu llave .p12 y PIN en "Configuración" para autorizar tus documentos.</p>
                    </div>
                    <div style="background:#0b0c10; padding:15px; border-radius:8px; border:1px solid #333;">
                        <h4 style="color:white; margin:0 0 10px 0; font-size:15px;"><span style="color:var(--accent); margin-right:5px;">2.</span> Ingresa tu Catálogo</h4>
                        <p style="color:#8a99ad; font-size:13px; margin:0;">Registra a tus clientes frecuentes y agrega tus productos con su código CABYS.</p>
                    </div>
                    <div style="background:#0b0c10; padding:15px; border-radius:8px; border:1px solid #333;">
                        <h4 style="color:white; margin:0 0 10px 0; font-size:15px;"><span style="color:var(--accent); margin-right:5px;">3.</span> Emite Documentos</h4>
                        <p style="color:#8a99ad; font-size:13px; margin:0;">Usa el botón "Nueva Factura" o "Proforma". El sistema calculará y firmará todo.</p>
                    </div>
                </div>
                <div style="display:flex; gap:15px; margin-top:25px; flex-wrap:wrap;">
                    <button class="fact-btn" onclick="render('Nueva Factura', document.querySelectorAll('.submenu li')[0])"><i class="fas fa-file-invoice-dollar"></i> Emitir Nueva Factura</button>
                    <button class="fact-btn" style="background:#11141a; border:1px solid var(--green); color:var(--green);" onclick="render('Nueva Proforma', document.querySelectorAll('.submenu li')[2])"><i class="fas fa-file-contract"></i> Generar Proforma</button>
                </div>
            </div>

            <h2 style="border-top:1px solid #333; padding-top:30px;"><i class="fas fa-star" style="color:#f59e0b;"></i> Planes y Suscripciones</h2>
            <p style="color:#8a99ad; font-size:15px; margin-bottom:10px;">${headerMensaje}</p>

            <div class="pricing-grid">
                
                <div class="price-card dark-card">
                    <div class="price-header bg-dark">BÁSICO / GRATIS</div>
                    <div class="price-amount">
                        <h2>$0.00</h2>
                        <div class="colones">₡0.00</div>
                        <div class="period">Mensual</div>
                    </div>
                    <ul class="price-features">
                        <li><b>3 Documentos</b> al mes</li>
                        <li>Personas Físicas y Jurídicas</li>
                        <li>1 Usuario de Acceso</li>
                        <li>Multi-Moneda (USD/CRC)</li>
                        <li>Resguardo Básico XML</li>
                    </ul>
                    <div class="price-btn-box">
                        <button class="price-btn btn-disabled">PLAN ACTUAL</button>
                    </div>
                </div>

                <div class="price-card">
                    <div class="price-header bg-blue">PAGO POR USO</div>
                    <div class="price-amount">
                        <h2>$21.99</h2>
                        <div class="colones">₡10,036.68 <i class="fas fa-info-circle"></i></div>
                        <div class="period">Anual + IVA</div>
                    </div>
                    <ul class="price-features">
                        <li><b>70 Documentos</b> (Vigencia 1 año)</li>
                        <li>Físicas / Jurídicas / Dimex / Nite</li>
                        <li>Usuarios <b>2</b> + Contador Gratuito</li>
                        <li>Multi-Moneda – <b>USD/CRC</b></li>
                        <li>Logo en la factura y proformas</li>
                        <li>Facturación Walmart, Gessa, PriceSmart</li>
                        <li>5 años de Resguardo de XML</li>
                        <li>Video Tutoriales</li>
                    </ul>
                    <div class="price-btn-box"><button class="price-btn btn-outline" onclick="openWA('Hola, me interesa el plan de facturación PAGO POR USO')">ADQUIRIR PLAN</button></div>
                </div>

                <div class="price-card recommended">
                    <div class="price-badge">RECOMENDADO</div>
                    <div class="price-header bg-green" style="padding-top:25px;">PROFESIONAL</div>
                    <div class="price-amount">
                        <h2>$11.99</h2>
                        <div class="colones">₡5,472.48 <i class="fas fa-info-circle"></i></div>
                        <div class="period">Mensual + IVA</div>
                    </div>
                    <ul class="price-features">
                        <li>Documentos <b>ilimitados</b> Emisión/Recepción</li>
                        <li>Físicas / Jurídicas / Dimex / Nite</li>
                        <li>Usuarios <b>3</b> + Contador Gratuito</li>
                        <li>Multi-Moneda – <b>USD/CRC</b></li>
                        <li>Logo en la factura y Proformas</li>
                        <li>Facturación Walmart, Gessa, PriceSmart</li>
                        <li>5 años de Resguardo de XML</li>
                        <li>Módulo inventario: 1 Bodega $6/mes</li>
                        <li>Asistencia Técnica 24/365</li>
                    </ul>
                    <div class="price-btn-box"><button class="price-btn btn-solid" onclick="openWA('Hola, me interesa el plan de facturación PROFESIONAL')">ACTUALIZAR PLAN</button></div>
                </div>

                <div class="price-card">
                    <div class="price-header bg-blue">EMPRESARIAL</div>
                    <div class="price-amount">
                        <h2>$29.99</h2>
                        <div class="colones">₡13,688.04 <i class="fas fa-info-circle"></i></div>
                        <div class="period">Mensual + IVA</div>
                    </div>
                    <ul class="price-features">
                        <li>Documentos <b>ilimitados</b> Emisión/Recepción</li>
                        <li>Físicas / Jurídicas / Dimex / Nite</li>
                        <li>Usuarios <b>Ilimitados</b> + Contador</li>
                        <li>Multi-Moneda – <b>Ilimitados</b></li>
                        <li>Logo y Banner personalizable</li>
                        <li>Sucursales, Terminales y Costos</li>
                        <li>5 años de Resguardo de XML</li>
                        <li>Módulo inventario: 1 Bodega incluida</li>
                        <li>Asistencia Técnica Premium</li>
                    </ul>
                    <div class="price-btn-box"><button class="price-btn btn-outline" onclick="openWA('Hola, me interesa el plan de facturación EMPRESARIAL')">ADQUIRIR PLAN</button></div>
                </div>
            </div>
        `;
    }

    function renderClientes() {
        document.getElementById('contenido-dinamico').innerHTML = `
            <h2>Directorio de Clientes</h2>
            <div style="display:flex; gap:25px; flex-wrap:wrap;">
                <div class="card" style="flex:1; min-width:300px; background:#11141a; padding:25px;">
                    <h3><i class="fas fa-user-plus" style="color:var(--accent);"></i> Nuevo Cliente</h3>
                    <form id="form-cliente" onsubmit="guardarClienteFact(event)">
                        <label>Nombre o Razón Social</label><input type="text" id="fc-nombre" class="fact-input" required>
                        <label>Tipo Identificación</label><select id="fc-tipo" class="fact-input"><option value="01">Física</option><option value="02">Jurídica</option></select>
                        <label>Identificación</label><input type="text" id="fc-cedula" class="fact-input" required>
                        <label>Correo Electrónico</label><input type="email" id="fc-correo" class="fact-input" required>
                        <label>Teléfono</label><input type="text" id="fc-telefono" class="fact-input">
                        <button type="submit" class="fact-btn" style="width:100%;"><i class="fas fa-save"></i> Guardar Cliente</button>

            const cant = parseFloat(document.getElementById('busca-cant').value) || 0;

    function agregarLinea() {
        if(!window.prodSeleccionado) return alert("Busca y selecciona un producto primero.");
        const cant = parseFloat(document.getElementById('busca-cant').value) || 1;
        
        lineasDocumento.push({
            codigo_cabys: window.prodSeleccionado.codigo_cabys,
            descripcion: window.prodSeleccionado.descripcion,
            cantidad: cant,
            precio_unitario: window.prodSeleccionado.precio_unitario,
            monto_total: cant * window.prodSeleccionado.precio_unitario,
            impuesto: window.prodSeleccionado.impuesto,
            unidad_medida: window.prodSeleccionado.unidad_medida
        });
        
        document.getElementById('busca-prod').value = "";
        document.getElementById('busca-cant').value = "1";
        document.getElementById('busca-precio').value = "";
        document.getElementById('busca-total').value = "";
        window.prodSeleccionado = null;
        
        renderLineasDocumento();
    }

    function renderLineasDocumento() {
        const tbody = document.getElementById('doc-body');
        let html = '';
        let sub = 0; let iva = 0;
        
        lineasDocumento.forEach((l, i) => {
            html += `<tr>
                <td>${l.cantidad}</td>
                <td>${l.codigo_cabys}</td>
                <td>${l.descripcion}</td>
                <td>₡${l.precio_unitario}</td>
                <td>${l.impuesto}%</td>
                <td style="color:var(--green);">₡${l.monto_total.toFixed(2)}</td>
                <td><button class="fact-btn-del" onclick="lineasDocumento.splice(${i},1); renderLineasDocumento();"><i class="fas fa-trash"></i></button></td>
            </tr>`;
            sub += l.monto_total;
            iva += l.monto_total * (parseFloat(l.impuesto)/100);
        });
        
        tbody.innerHTML = html;
        document.getElementById('t-sub').innerText = `₡${sub.toFixed(2)}`;
        document.getElementById('t-iva').innerText = `₡${iva.toFixed(2)}`;
        document.getElementById('t-total').innerText = `₡${(sub+iva).toFixed(2)}`;
        
        const btnEmitir = document.getElementById('btn-emitir-doc');
        if(lineasDocumento.length > 0) {
            btnEmitir.disabled = false;
            btnEmitir.style.background = btnEmitir.dataset.color;
            btnEmitir.style.cursor = 'pointer';
        } else {
            btnEmitir.disabled = true;
            btnEmitir.style.background = '#444';
            btnEmitir.style.cursor = 'not-allowed';
        }
    }

    async function emitirDocumento(tipo) {
        const cliente_id = document.getElementById('doc-cliente').value;
        if(!cliente_id) return alert("Selecciona un cliente.");
        if(lineasDocumento.length === 0) return alert("Agrega al menos una línea.");
        
        const btn = document.getElementById('btn-emitir-doc');
        btn.innerText = "Procesando..."; btn.disabled = true;
        
        let sub = 0; let iva = 0;
        lineasDocumento.forEach(l => { sub += l.monto_total; iva += l.monto_total * (parseFloat(l.impuesto)/100); });

        const payload = {
            cliente_id: cliente_id,
            condicion_venta: document.getElementById('doc-condicion').value,
            medio_pago: document.getElementById('doc-medio').value,
            lineas: lineasDocumento,
            total_gravado: sub,
            total_impuesto: iva,
            total_comprobante: sub + iva
        };

        const endpoint = tipo === 'Factura' ? '/api/facturacion/emitir' : '/api/facturacion/proformas/emitir';
        
        try {
            const res = await fetch(endpoint, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include',
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.success) {
                alert(`¡${tipo} generada con éxito!\nConsecutivo: ${data.consecutivo}`);
                render(tipo === 'Factura' ? 'Historial de Facturas' : 'Proformas Generadas');
            } else {
                alert("Error: " + data.message);
                btn.innerText = `Finalizar y Emitir ${tipo}`; btn.disabled = false;
            }
        } catch(e) {
            alert("Error de red o conexión al servidor.");
            btn.innerText = `Finalizar y Emitir ${tipo}`; btn.disabled = false;
        }
    }

                    </label>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <button type="submit" class="fact-btn"><i class="fas fa-save"></i> Guardar Credenciales</button>
                        <button type="button" class="fact-btn" style="background:#11141a; border:1px solid var(--accent); color:var(--accent);" onclick="probarConexionHacienda()"><i class="fas fa-plug"></i> Probar Conexión</button>
                    </div>
                </form>
                <div id="hacienda-status" style="margin-top:20px; font-size:14px; padding:15px; border-radius:6px; display:none;"></div>
            </div>
        `;
        document.getElementById('form-hacienda').addEventListener('submit', guardarHacienda);
    }

    async function guardarHacienda(event) {
        event.preventDefault();
        const form = new FormData();
        form.append('usuario_idp', document.getElementById('h-user').value);
        form.append('password_idp', document.getElementById('h-pass').value);
        form.append('pin_p12', document.getElementById('h-pin').value);
        form.append('ambiente', document.getElementById('h-prod').checked ? 'true' : 'false');
        if (document.getElementById('h-p12').files.length > 0) form.append('archivo_p12', document.getElementById('h-p12').files[0]);

        const btn = event.submitter; btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Guardando..."; btn.disabled = true;

        try {
            const res = await fetch('/api/admin/configuracion-hacienda', { method: 'POST', credentials: 'include', body: form });
            const data = await res.json();
            const statusBox = document.getElementById('hacienda-status');
            statusBox.style.display = 'block';
            
            if (data.success) {
                statusBox.style.background = 'rgba(16, 185, 129, 0.2)'; statusBox.style.border = '1px solid #10b981'; statusBox.style.color = '#10b981';
                statusBox.innerHTML = "<i class='fas fa-check-circle'></i> " + data.message;
            } else {
                statusBox.style.background = 'rgba(255, 59, 48, 0.2)'; statusBox.style.border = '1px solid #ff3b30'; statusBox.style.color = '#ff3b30';
                statusBox.innerHTML = "<i class='fas fa-times-circle'></i> Error: " + data.message;
            }
        } catch (error) { alert("Error de red."); } finally { btn.innerHTML = "<i class='fas fa-save'></i> Guardar Credenciales"; btn.disabled = false; }
    }

    async function probarConexionHacienda() {
        const statusBox = document.getElementById('hacienda-status');
        statusBox.style.display = 'block'; statusBox.style.background = 'rgba(0, 180, 216, 0.1)'; statusBox.style.border = '1px solid var(--accent)'; statusBox.style.color = 'var(--text)';
        statusBox.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Contactando a Hacienda...";

        try {
            const res = await fetch('/api/admin/facturacion/probar-conexion', { method: 'GET', credentials: 'include' });
            const data = await res.json();
            if (res.ok && data.status === "Conexión Exitosa") {
                statusBox.style.background = 'rgba(16, 185, 129, 0.2)'; statusBox.style.border = '1px solid #10b981'; statusBox.style.color = '#10b981';
                statusBox.innerHTML = `<i class='fas fa-check-circle'></i> <b>¡Conexión Exitosa!</b><br><span style="color:#cfd8dc; font-size:13px; font-weight:normal; margin-top:5px; display:block;">Autenticado correctamente con Hacienda.</span>`;
            } else {
                statusBox.style.background = 'rgba(255, 59, 48, 0.2)'; statusBox.style.border = '1px solid #ff3b30'; statusBox.style.color = '#ff3b30';
                statusBox.innerHTML = `<i class='fas fa-times-circle'></i> <b>Fallo de Autenticación:</b><br><span style="color:#cfd8dc; font-size:13px; font-weight:normal; margin-top:5px; display:block;">Hacienda rechazó las credenciales.</span>`;
            }
        } catch (error) { statusBox.innerHTML = "<i class='fas fa-wifi'></i> Error de red."; }
    }

    function renderNuevoTicket() {
        document.getElementById('contenido-dinamico').innerHTML = `
            <h2>Reportar Nueva Avería o Requerimiento</h2>
            <form id="form-ticket" style="display:flex; flex-direction:column; gap:15px; max-width:600px; margin-top:20px;">
                <input type="text" id="ticketContacto" placeholder="Tu nombre completo" class="fact-input" required>
                <input type="tel" id="ticketWhatsApp" placeholder="WhatsApp de contacto" class="fact-input" required>
                <input type="text" id="ticketAsunto" placeholder="Resumen del problema" class="fact-input" required>
                <textarea id="ticketDescripcion" placeholder="Detalla el inconveniente técnico..." class="fact-input" required style="height:120px; font-family:inherit;"></textarea>
                <label>Prioridad Sugerida</label>
                <select id="prioridad" class="fact-input"><option value="Baja">Baja - Consulta o mejora</option><option value="Media">Media - Fallo parcial</option><option value="Alta">Alta - Operación detenida</option></select>
                <button type="submit" class="fact-btn" style="width:100%; font-size:15px;"><i class="fas fa-paper-plane"></i> Enviar Reporte a Soporte</button>
            </form>
        `;
        document.getElementById('form-ticket').addEventListener('submit', crearTicket);
    }

    async function crearTicket(event) {
        event.preventDefault();
        const btn = event.submitter; btn.innerHTML = "Enviando..."; btn.disabled = true;
        const ticketData = { asunto: document.getElementById('ticketAsunto').value, descripcion: document.getElementById('ticketDescripcion').value, prioridad: document.getElementById('prioridad').value, contacto: document.getElementById('ticketContacto').value, whatsapp: document.getElementById('ticketWhatsApp').value, empresa_id: userDataCache.empresa_id };
        try {
            const res = await fetch('/api/tickets/crear', { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(ticketData) });
            const resJson = await res.json();
            if(resJson.success) { alert("¡Reporte enviado! Soporte Técnico te contactará pronto."); renderTicketsActivos(); }
            else alert("Error: " + resJson.message);
        } catch(e) { alert("Fallo de conexión."); }
        btn.innerHTML = "<i class='fas fa-paper-plane'></i> Enviar Reporte a Soporte"; btn.disabled = false;
    }

    function renderTicketsActivos() { renderListaTickets('Activos'); }
    function renderTicketsHistorial() { renderListaTickets('Historial'); }

    async function renderListaTickets(vista) {
        const cont = document.getElementById('contenido-dinamico');
        cont.innerHTML = `<h2>${vista === 'Activos' ? 'Tickets en Proceso' : 'Historial Completo de Soporte'}</h2><div id="lista-tickets" style="margin-top:20px; display:flex; flex-direction:column; gap:15px;">Cargando...</div>`;
        
        const res = await fetch('/api/cliente/datos-operativos', {credentials: 'include'});
        userDataCache = await res.json();
        let lista = userDataCache.tickets || [];
        if(vista === 'Activos') lista = lista.filter(t => t.estado !== 'Resuelto' && t.estado !== 'Cerrado');

        const div = document.getElementById('lista-tickets');
        if(lista.length === 0) { div.innerHTML = "<p style='color:#8a99ad;'>No hay tickets en esta vista.</p>"; return; }
        
        div.innerHTML = lista.map(t => {
            const colorPrio = t.prioridad === 'Alta' ? 'var(--del)' : (t.prioridad === 'Media' ? '#f59e0b' : '#8a99ad');
            const iconEstado = t.estado === 'Resuelto' ? 'fa-check-circle' : 'fa-clock';
            const colorEstado = t.estado === 'Resuelto' ? 'var(--green)' : '#f59e0b';
            
            return `<div style="padding:18px; background:#11141a; border:1px solid #333; border-radius:8px;">
                <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:10px;">
                    <div style="color:white; font-weight:600; font-size:15px;">${t.asunto}</div>
                    <span style="font-size:10px; font-weight:bold; text-transform:uppercase; color:${colorPrio}; border:1px solid ${colorPrio}; padding:3px 6px; border-radius:4px;">${t.prioridad}</span>
                </div>
                <div style="font-size:13px; color:#cfd8dc; margin-bottom:10px; line-height:1.5;">${t.descripcion}</div>
                <div style="font-size:12px; color:#8a99ad; border-top:1px solid #333; padding-top:10px; display:flex; justify-content:space-between;">
                    <span><i class="fas fa-calendar-alt"></i> ${new Date(t.fecha).toLocaleDateString()} | Por: ${t.contacto}</span>
                    <span style="color:${colorEstado}; font-weight:600;"><i class="fas ${iconEstado}"></i> ${t.estado}</span>
                </div>
            </div>`;
        }).join('');
    }

    function renderError(msg) {
        document.getElementById('contenido-dinamico').innerHTML = `<h2 style="color:var(--del);">Error de Acceso</h2><p>${msg}</p><button onclick="window.location.href='/login.html'" class="fact-btn" style="background:#333; color:white; margin-top:15px;">Volver al Login</button>`;
    }
</script>
</body>
</html>
