<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin iCare | Control Maestro</title>
    <style>
        :root { --brand: #1b4332; --edit: #0071e3; --del: #ff3b30; --bg: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #ddd; }
        input, textarea, button { width: 100%; padding: 12px; margin: 6px 0 12px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }
        button { background: var(--brand); color: white; border: none; cursor: pointer; font-weight: bold; }
        .list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .btn-edit { background: var(--edit); padding: 6px 14px; border-radius: 4px; color: white; border: none; cursor: pointer; }
        .btn-del { background: var(--del); padding: 6px 14px; border-radius: 4px; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1>Control Maestro iCare Tech CR</h1>
    
    <div>
        <div class="card">
            <h2>⭐ Gestionar Reseñas</h2>
            <input type="text" id="revClient" placeholder="Nombre">
            <input type="text" id="revPos" placeholder="Puesto">
            <textarea id="revText" rows="3" placeholder="Comentario"></textarea>
            <button id="btn-save-rev">Guardar Reseña</button>
        </div>
        
        <div class="card">
            <h2>💻 Gestionar Servicio</h2>
            <input type="text" id="sIcon" placeholder="Icono">
            <input type="text" id="sTitle" placeholder="Título">
            <textarea id="sDesc" placeholder="Descripción"></textarea>
            <textarea id="sProcess" placeholder="Proceso"></textarea>
            <textarea id="sBenefits" placeholder="Beneficios (uno por línea)"></textarea>
            <button id="btn-save-srv">Guardar Servicio</button>
        </div>
    </div>

    <div>
        <div class="card">
            <h2>📦 Gestionar Producto</h2>
            <input type="text" id="pName" placeholder="Nombre">
            <input type="text" id="pPrice" placeholder="Precio">
            <input type="text" id="pCat" placeholder="Categoría">
            <button id="btn-save-prod">Guardar Producto</button>
        </div>
        
        <div class="card">
            <h2>📋 Gestión Actual</h2>
            <div id="master-list">Cargando...</div>
        </div>
    </div>
</div>

<script>
    const API = '/api';
    let cacheData = { servicios: [], productos: [], resenas: [] };

    // Asignación de eventos segura
    document.getElementById('btn-save-rev').addEventListener('click', subirResena);
    document.getElementById('btn-save-srv').addEventListener('click', subirServicio);
    document.getElementById('btn-save-prod').addEventListener('click', subirProducto);

    function loadContent() {
        fetch(`${API}/todo`)
        .then(r => r.json())
        .then(data => {
            cacheData.servicios = data.servicios || [];
            cacheData.productos = data.productos || [];
            cacheData.resenas = data.resenas || [];
            renderList();
        });
    }

    function renderList() {
        const list = document.getElementById('master-list');
        list.innerHTML = "";
        cacheData.servicios.forEach((s, idx) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>${s.titulo}</span>`;
            
            const btnDel = document.createElement('button');
            btnDel.className = 'btn-del';
            btnDel.innerText = 'Eliminar';
            btnDel.addEventListener('click', () => del('servicios', s.id));
            
            div.appendChild(btnDel);
            list.appendChild(div);
        });
    }

    function subirResena() {
        const data = { 
            cliente: document.getElementById('revClient').value,
            puesto: document.getElementById('revPos').value,
            comentario: document.getElementById('revText').value
        };
        fetch(`${API}/resenas`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) })
        .then(() => loadContent());
    }

    function subirServicio() {
        const data = {
            titulo: document.getElementById('sTitle').value,
            descripcion: document.getElementById('sDesc').value,
            proceso: document.getElementById('sProcess').value,
            beneficios: document.getElementById('sBenefits').value
        };
        fetch(`${API}/servicios`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) })
        .then(() => loadContent());
    }

    function subirProducto() {
        const data = {
            nombre: document.getElementById('pName').value,
            precio: document.getElementById('pPrice').value,
            categoria: document.getElementById('pCat').value
        };
        fetch(`${API}/productos`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) })
        .then(() => loadContent());
    }

    function del(t, id) {
        if(confirm("¿Eliminar?")) {
            fetch(`${API}/eliminar/${t}/${id}`, { method: 'DELETE' }).then(() => loadContent());
        }
    }

    window.onload = loadContent;
</script>
</body>
</html>
