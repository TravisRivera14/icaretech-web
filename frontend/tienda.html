<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCare Tech CR | Catálogo Especializado</title>
    <link rel="icon" href="Logo_Pestana_v2.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-page: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-sec: #6e6e73;
            --accent-blue: #0071e3;
            --border-subtle: #d2d2d7;
            --nav-bg: #355c6b;
            --neon-green: #7cf5a6;
            --neon-green-hover: #65d98e;
            --icon-blue: #4ea5ce;
            --footer-dark: #1a1a1a;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }

        body { 
            background-color: var(--bg-page); 
            color: var(--text-main); 
            line-height: 1.5;
            padding-bottom: 50px;
        }

        header { 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 20px 40px; 
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 30px;
        }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; }
        .logo-area { display: flex; align-items: center; text-decoration: none; color: var(--text-main); font-weight: bold; gap: 10px; }
        .logo-img { height: 50px; width: auto; } 
        .btn-back { color: var(--text-sec); text-decoration: none; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .shop-layout { 
            display: grid; 
            grid-template-columns: 280px 1fr; 
            gap: 30px; 
            max-width: 1300px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }

        .sidebar-filters { background: var(--card-bg); padding: 25px; border-radius: 18px; border: 1px solid var(--border-subtle); height: fit-content; }
        .filter-group { margin-bottom: 30px; }
        .filter-group h4 { font-size: 14px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-sec); }
        .filter-group input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-subtle); outline: none; margin-bottom: 10px; }
        .range-inputs { display: flex; gap: 10px; align-items: center; }
        .range-inputs input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border-subtle); text-align: center; font-size: 13px; }
        .gama-option { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 14px; color: var(--text-main); cursor: pointer; }

        .results-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; background: var(--card-bg); padding: 20px 25px; 
            border-radius: 18px; border: 1px solid var(--border-subtle); 
        }
        
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 25px; 
        }
        
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .product-img { width: 100%; height: 180px; object-fit: contain; border-radius: 12px; margin-bottom: 15px; }
        .product-card h3 { font-size: 16px; font-weight: 600; color: var(--text-main); margin-bottom: 10px; min-height: 44px; }
        .product-price { font-size: 1.25rem; font-weight: 600; color: var(--text-main); margin: 10px 0; }
        
        .btn-quote {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 980px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn-quote:hover { opacity: 0.8; }

        @media (max-width: 900px) {
            .shop-layout { grid-template-columns: 1fr; }
            .results-header { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <a href="index.html" class="logo-area">
                <img src="Logo.png" alt="Logo" class="logo-img">
                <span>Catálogo iCare</span>
            </a>
            <div style="display: flex; align-items: center; gap: 25px;">
                <a href="/servicio" style="color: var(--accent-blue); text-decoration: none; font-size: 15px; font-weight: 600;">Soporte</a>
                <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Volver</a>
            </div>
        </div>
    </header>

    <div class="shop-layout">
        <aside class="sidebar-filters">
            <div class="filter-group">
                <h4>Buscar Pieza</h4>
                <input type="text" id="shopSearch" placeholder="Nombre de componente..." onkeyup="filtrarCatalogo()">
            </div>
            
            <div class="filter-group">
                <h4>Precio</h4>
                <div class="range-inputs">
                    <input type="number" id="priceMin" placeholder="Mín ₡" onkeyup="filtrarCatalogo()">
                    <span>-</span>
                    <input type="number" id="priceMax" placeholder="Máx ₡" onkeyup="filtrarCatalogo()">
                </div>
            </div>

            <div class="filter-group">
                <h4>Gamas</h4>
                <div class="gama-option"><input type="radio" name="gama" checked onclick="setGama('todas')"> Todas</div>
                <div class="gama-option"><input type="radio" name="gama" onclick="setGama('premium')"> Premium Service Pack</div>
                <div class="gama-option"><input type="radio" name="gama" onclick="setGama('estandar')"> Componentes Estándar</div>
            </div>
        </aside>

        <main>
            <div class="results-header">
                <h2 id="current-cat-title">Cargando Categoría...</h2>
                <span id="results-count" style="font-size: 14px; color: var(--text-sec); font-weight: 500;">0 productos encontrados</span>
            </div>

            <div class="products-grid" id="shop-products-container"></div>
        </main>
    </div>

    <script>
        const API = '/api';
        let tiendaProductos = [];
        let categoriaActiva = "";
        let gamaFiltro = "todas";

        const urlParams = new URLSearchParams(window.location.search);
        categoriaActiva = urlParams.get('cat') || "";

        function openWA(m) { window.open(`https://wa.me/50686390631?text=${encodeURIComponent(m)}`, "_blank"); }

        function setGama(gama) {
            gamaFiltro = gama;
            filtrarCatalogo();
        }

        function filtrarCatalogo() {
            const txt = document.getElementById('shopSearch').value.toLowerCase();
            const min = parseFloat(document.getElementById('priceMin').value) || 0;
            const max = parseFloat(document.getElementById('priceMax').value) || Infinity;
            
            const contenedor = document.getElementById('shop-products-container');
            if(!contenedor) return;
            contenedor.innerHTML = "";

            const formatter = new Intl.NumberFormat('es-CR', { style: 'currency', currency: 'CRC' });

            const filtrados = tiendaProductos.filter(p => {
                const coincideCat = (p.categoria || "Otros") === categoriaActiva;
                const coincideTxt = p.nombre && p.nombre.toLowerCase().includes(txt);
                const coincidePrecio = p.precio >= min && p.precio <= max;
                
                let coincideGama = true;
                if (gamaFiltro === 'premium') coincideGama = p.nombre && p.nombre.toLowerCase().includes('service pack');
                if (gamaFiltro === 'estandar') coincideGama = p.nombre && !p.nombre.toLowerCase().includes('service pack');

                return coincideCat && coincideTxt && coincidePrecio && coincideGama;
            });

            document.getElementById('results-count').innerText = `${filtrados.length} productos encontrados`;

            if(filtrados.length === 0) {
                contenedor.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #888;">No hay componentes cargados para este filtro en este momento.</div>`;
                return;
            }

            filtrados.forEach(p => {
                contenedor.innerHTML += `
                    <div class="product-card">
                        <img src="${p.imagen || 'https://via.placeholder.com/200'}" class="product-img">
                        <h3>${p.nombre}</h3>
                        <div class="product-price">${formatter.format(p.precio)}</div>
                        <button class="btn-quote" onclick="openWA('Hola iCare, estoy interesado en cotizar la pieza: ${p.nombre}')">Cotizar Componente</button>
                    </div>`;
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            if(!categoriaActiva) {
                document.getElementById('current-cat-title').innerText = "Catálogo General";
            } else {
                document.getElementById('current-cat-title').innerText = categoriaActiva;
            }

            fetch(`${API}/todo`)
            .then(r => r.json())
            .then(data => {
                if(data.productos) {
                    tiendaProductos = data.productos;
                    filtrarCatalogo();
                }
            }).catch(() => {
                document.getElementById('shop-products-container').innerHTML = "Error al conectar con la base de datos.";
            });
        });
    </script>
</body>
</html>
