<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Operaciones | iCare Tech CR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0c10; --card: #1f2833; --accent: #00b4d8; --text: #f5f5f7; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #11141a; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .top-nav { display: flex; gap: 30px; margin-left: 40px; }
        .top-nav button { background: none; border: none; color: #8a99ad; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 15px; }
        .top-nav button:hover, .top-nav button.active { color: var(--accent); }
        
        .app-layout { display: flex; flex: 1; }
        .sidebar { width: 280px; background: #11141a; padding: 20px 0; border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; }
        .menu-title { font-size: 12px; color: #555; text-transform: uppercase; margin: 20px 20px 10px; font-weight: 600; }
        .nav-item { padding: 12px 20px; cursor: pointer; color: #8a99ad; font-size: 14px; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-item:hover { background: var(--card); color: var(--accent); }
        
        .submenu { list-style: none; padding-left: 45px; display: none; background: #0b0c10; }
        .submenu li { padding: 10px 0; cursor: pointer; color: #8a99ad; font-size: 13px; transition: 0.2s; }
        .submenu li:hover { color: var(--accent); }
        
        .has-submenu::after { content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900; margin-left: auto; font-size: 12px; transition: transform 0.3s; }
        .has-submenu.active::after { transform: rotate(180deg); }
        
        .main-content { flex: 1; padding: 40px; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; }
    </style>
</head>
<body>

<header>
    <h1>iCare <span style="color:var(--accent)">OPS</span></h1>
    <nav class="top-nav" id="top-nav">
        <button onclick="showMainSection('datacenter')" class="active"><i class="fas fa-server"></i> Data Center</button>
        <button onclick="showMainSection('facturacion')"><i class="fas fa-file-invoice-dollar"></i> Facturación</button>
        <button onclick="showMainSection('tickets')"><i class="fas fa-ticket-alt"></i> Tickets</button>
        <button onclick="showMainSection('inventario')"><i class="fas fa-boxes"></i> Inventario</button>
    </nav>
</header>

<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <!-- Los menús se cargarán aquí dinámicamente -->
    </aside>

    <main class="main-content">
        <div id="contenido-dinamico" class="card">
            <h2>Panel de Control</h2>
            <p>Bienvenido al Centro de Operaciones.</p>
        </div>
    </main>
</div>

<script>
    const menuData = {
        'datacenter': [
            { nombre: 'Resumen de Servidores', icon: 'fa-server' },
            { nombre: 'Monitoreo en Tiempo Real', icon: 'fa-chart-line' },
            { nombre: 'Backups y Seguridad', icon: 'fa-shield-alt' },
            { nombre: 'Logs de Sistema', icon: 'fa-list' }
        ],
        'facturacion': [
            { nombre: 'Inicio', icon: 'fa-home' },
            { nombre: 'Mi plan', icon: 'fa-star' },
            { nombre: 'Clientes', icon: 'fa-users' },
            { nombre: 'Productos', icon: 'fa-th-large' },
            { 
                nombre: 'POS', icon: 'fa-cash-register', 
                submenu: ['Ingresar', 'Vendedores']
            },
            { 
                nombre: 'Facturación', icon: 'fa-file-invoice', 
                submenu: ['Nueva factura', 'Nuevo tiquete', 'Nueva compra', 'Nueva exportación', 'Borradores', 'Documentos programados', 'Documentos generados'] 
            },
            { 
                nombre: 'Proformas', icon: 'fa-calculator', 
                submenu: ['Nueva proforma', 'Proformas generadas'] 
            },
            { 
                nombre: 'Recepción', icon: 'fa-upload', 
                submenu: ['Cargar documento', 'Documentos cargados', 'Correos recibidos'] 
            },
            { nombre: 'Reportes', icon: 'fa-file-alt' }
        ],
        'tickets': [
            { nombre: 'Tickets Activos', icon: 'fa-clock' },
            { nombre: 'Historial Cerrados', icon: 'fa-check-circle' },
            { nombre: 'Crear Nuevo Ticket', icon: 'fa-plus-circle' }
        ],
        'inventario': [
            { nombre: 'Equipos en Custodia', icon: 'fa-laptop' },
            { nombre: 'Inventario de Piezas', icon: 'fa-microchip' },
            { nombre: 'Movimientos Recientes', icon: 'fa-exchange-alt' }
        ]
    };

    function showMainSection(section) {
        document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
        // Activamos el botón de la barra superior
        const buttons = document.querySelectorAll('.top-nav button');
        buttons.forEach(btn => {
            if(btn.textContent.toLowerCase().includes(section)) btn.classList.add('active');
        });

        // Cargamos la barra lateral
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = '<div class="menu-title">' + section.toUpperCase() + '</div>';
        
        menuData[section].forEach(item => {
            if (item.submenu) {
                sidebar.innerHTML += `
                    <div class="nav-item has-submenu" onclick="toggleSubmenu(this)">
                        <i class="fas ${item.icon}"></i> ${item.nombre}
                    </div>
                    <ul class="submenu">
                        ${item.submenu.map(sub => `<li onclick="renderModulo('${sub}')">${sub}</li>`).join('')}
                    </ul>
                `;
            } else {
                sidebar.innerHTML += `
                    <div class="nav-item" onclick="renderModulo('${item.nombre}')">
                        <i class="fas ${item.icon}"></i> ${item.nombre}
                    </div>
                `;
            }
        });
    }

    function toggleSubmenu(element) {
        element.classList.toggle('active');
        const submenu = element.nextElementSibling;
        if (submenu.style.display === 'block') {
            submenu.style.display = 'none';
        } else {
            submenu.style.display = 'block';
        }
    }

    function renderModulo(nombre) {
        document.getElementById('contenido-dinamico').innerHTML = `<h2>${nombre}</h2><p>Cargando información...</p>`;
    }

    // Inicializamos con la sección de facturación seleccionada
    showMainSection('facturacion');
</script>
</body>
</html>
