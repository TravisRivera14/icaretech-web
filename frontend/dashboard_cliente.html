<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Operaciones | iCare Tech CR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0c10; --card: #1f2833; --accent: #00b4d8; --text: #f5f5f7; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #11141a; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); justify-content: space-between; }
        .top-nav { display: flex; gap: 30px; }
        .top-nav button { background: none; border: none; color: #8a99ad; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 15px; }
        .top-nav button:hover, .top-nav button.active { color: var(--accent); }
        
        .app-layout { display: flex; flex: 1; }
        .sidebar { width: 280px; background: #11141a; padding: 20px 0; border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; }
        .menu-title { font-size: 12px; color: #555; text-transform: uppercase; margin: 20px 20px 10px; font-weight: 600; }
        .nav-item { padding: 12px 20px; cursor: pointer; color: #8a99ad; font-size: 14px; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-item:hover { background: var(--card); color: var(--accent); }
        .submenu { list-style: none; padding-left: 45px; display: none; background: #0b0c10; margin:0;}
        .submenu li { padding: 10px 0; cursor: pointer; color: #8a99ad; font-size: 13px; transition: 0.2s; }
        .submenu li:hover { color: var(--accent); }
        
        .main-content { flex: 1; padding: 40px; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <h1>iCare <span style="color:var(--accent)">OPS</span></h1>
        <span id="badge-admin" style="display:none; background:var(--accent); color:black; font-size:11px; font-weight:bold; padding:4px 8px; border-radius:6px;">ADMIN EMPRESARIAL</span>
    </div>
    <nav class="top-nav" id="top-nav">
        <button id="btn-nav-datacenter" onclick="showSection('datacenter')" style="display:none;"><i class="fas fa-server"></i> Data Center</button>
        <button id="btn-nav-facturacion" onclick="showSection('facturacion')" style="display:none;"><i class="fas fa-file-invoice-dollar"></i> Facturación</button>
        <button id="btn-nav-tickets" onclick="showSection('tickets')" style="display:none;"><i class="fas fa-ticket-alt"></i> Tickets</button>
        <button id="btn-nav-inventario" onclick="showSection('inventario')" style="display:none;"><i class="fas fa-boxes"></i> Inventario</button>
    </nav>
</header>

<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div id="contenido-dinamico" class="card">
            <h2>Cargando conexión segura...</h2>
        </div>
    </main>
</div>

<script>
    let userDataCache = {};

    const menuData = {
        'datacenter': [{nombre: 'Resumen de Servidores'}, {nombre: 'Monitoreo'}, {nombre: 'Backups'}],
        'facturacion': [{nombre: 'Inicio'}, {nombre: 'Nueva Factura'}, {nombre: 'Historial Fiscal'}],
        'tickets': [{nombre: 'Crear Nuevo Ticket'}, {nombre: 'Historial de Tickets'}],
        'inventario': [{nombre: 'Equipos Activos'}, {nombre: 'Solicitud de Piezas'}]
    };

    window.onload = async function() {
        try {
            const res = await fetch('/api/cliente/datos-operativos', {credentials: 'include'});
            userDataCache = await res.json();
            
            if(userDataCache.error) { window.location.href = '/login.html'; return; }
            
            if (userDataCache.rol === 'cliente_admin') {
                document.getElementById('badge-admin').style.display = 'block';
            }

            // Aplicar Permisos Visuales
            const p = userDataCache.permisos;
            let firstSec = null;
            if(p.datacenter) { document.getElementById('btn-nav-datacenter').style.display = 'flex'; firstSec = firstSec||'datacenter'; }
            if(p.facturacion) { document.getElementById('btn-nav-facturacion').style.display = 'flex'; firstSec = firstSec||'facturacion'; }
            if(p.tickets) { document.getElementById('btn-nav-tickets').style.display = 'flex'; firstSec = firstSec||'tickets'; }
            if(p.inventario) { document.getElementById('btn-nav-inventario').style.display = 'flex'; firstSec = firstSec||'inventario'; }

            if(firstSec) showSection(firstSec);
            else document.getElementById('contenido-dinamico').innerHTML = "<h2>Acceso Restringido</h2><p>No tienes módulos activos asignados.</p>";

        } catch(e) { console.error("Error cargando perfil"); }
    };

    function showSection(sec) {
        document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-nav-${sec}`).classList.add('active');

        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = `<div class="menu-title">${sec.toUpperCase()}</div>`;
        menuData[sec].forEach(item => {
            sidebar.innerHTML += `<div class="nav-item" onclick="renderModulo('${item.nombre}')">${item.nombre}</div>`;
        });
        
        renderModulo(menuData[sec][0].nombre); // Auto-render first option
    }

    function renderModulo(nombre) {
        const cont = document.getElementById('contenido-dinamico');
        
        if (nombre === 'Crear Nuevo Ticket') {
            cont.innerHTML = `
                <h2>Reportar Nueva Falla</h2>
                <input type="text" id="t-asunto" placeholder="Asunto" style="width:100%; padding:12px; margin-top:15px; background:#0b0c10; color:white; border:1px solid #444; border-radius:8px;">
                <textarea id="t-desc" placeholder="Descripción detallada..." style="width:100%; height:120px; padding:12px; margin-top:10px; background:#0b0c10; color:white; border:1px solid #444; border-radius:8px;"></textarea>
                <select id="t-prio" style="width:100%; padding:12px; margin-top:10px; background:#0b0c10; color:white; border:1px solid #444; border-radius:8px;">
                    <option value="Baja">Prioridad Baja</option><option value="Media">Prioridad Media</option><option value="Alta">Prioridad Alta</option>
                </select>
                <button onclick="enviarT()" style="margin-top:15px; padding:12px 25px; background:var(--accent); color:black; font-weight:bold; border:none; border-radius:8px; cursor:pointer;">Crear Ticket</button>
            `;
        } else if (nombre === 'Historial de Tickets') {
            const label = userDataCache.rol === 'cliente_admin' ? 'Tickets de toda la empresa' : 'Mis tickets reportados';
            if (!userDataCache.tickets || userDataCache.tickets.length === 0) {
                cont.innerHTML = `<h2>${label}</h2><p>No se encontraron registros activos.</p>`;
                return;
            }
            let html = `<h2>${label}</h2><div style="margin-top:20px; display:flex; flex-direction:column; gap:15px;">`;
            userDataCache.tickets.forEach(t => {
                html += `<div style="padding:15px; background:#0b0c10; border:1px solid #444; border-radius:8px;">
                    <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">${t.asunto}</div>
                    <div style="font-size:13px; color:#8a99ad;">Estado: <b style="color:white;">${t.estado}</b> | Prioridad: ${t.prioridad}</div>
                </div>`;
            });
            cont.innerHTML = html + "</div>";
        } else {
            cont.innerHTML = `<h2>${nombre}</h2><p style="margin-top:15px; color:#8a99ad;">Has accedido correctamente al módulo autorizado por tu administrador de sistema. Esta sección se encuentra en despliegue.</p>`;
        }
    }

    async function enviarT() {
        const d = { 
            contacto: "Usuario Corporativo", asunto: document.getElementById('t-asunto').value, 
            descripcion: document.getElementById('t-desc').value, prioridad: document.getElementById('t-prio').value 
        };
        const res = await fetch('/api/tickets/crear', { method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include', body: JSON.stringify(d) });
        if(res.ok) { alert("Reportado con éxito."); renderModulo('Historial de Tickets'); }
    }
</script>
</body>
</html>
