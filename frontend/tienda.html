<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCare Tech CR | Catálogo Especializado</title>
    <link rel="icon" href="Logo_Pestana_v2.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --nav-bg: #355c6b; --neon-green: #7cf5a6; --turquoise-main: #00b4d8; --bg-light: #f4f7f6; }
        body { background-color: var(--bg-light); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 20px; }
        .catalogo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .product-img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 10px; }
        .btn-quote { background: var(--turquoise-main); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 id="current-cat-title">Catálogo</h1>
    <div id="shop-products-container" class="catalogo-grid">
        <p>Cargando catálogo premium...</p>
    </div>

    <script>
        const API = "http://localhost:5000";
        let tiendaProductos = [];
        const formatter = new Intl.NumberFormat('es-CR', { style: 'currency', currency: 'USD' });

        function openWA(mensaje) {
            const numero = "506XXXXXXXX"; // Tu número de empresa aquí
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        function filtrarCatalogo() {
            const contenedor = document.getElementById('shop-products-container');
            contenedor.innerHTML = '';
            
            if (tiendaProductos.length === 0) {
                contenedor.innerHTML = '<p>No hay productos disponibles actualmente.</p>';
                return;
            }

            tiendaProductos.forEach(p => {
                contenedor.innerHTML += `
                    <div class="product-card">
                        <img src="${p.imagen}" class="product-img" alt="${p.nombre}">
                        <h3>${p.nombre}</h3>
                        <p><strong>${formatter.format(p.precio)}</strong></p>
                        <button class="btn-quote" onclick="openWA('Hola, me interesa: ${p.nombre}')">Cotizar</button>
                    </div>`;
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetch(`${API}/api/data`)
            .then(r => r.json())
            .then(data => {
                if(data.productos) {
                    tiendaProductos = data.productos;
                    filtrarCatalogo();
                }
            })
            .catch(() => {
                document.getElementById('shop-products-container').innerHTML = "Error al conectar con la base de datos.";
            });
        });
    </script>
</body>
</html>
