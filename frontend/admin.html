<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin iCare | Control Maestro</title>
    <style>
        :root { --brand: #1b4332; --edit: #0071e3; --del: #ff3b30; --bg: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        h1 { font-size: 28px; font-weight: 700; color: #111; margin-bottom: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #ddd; }
        .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: #222; }
        input, textarea, button { width: 100%; padding: 12px; margin: 6px 0 12px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--brand); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .btn-edit { background: var(--edit); width: auto; padding: 6px 14px; margin-right: 5px; border-radius: 4px; display: inline-block; color: white; cursor: pointer; border: none; }
        .btn-del { background: var(--del); width: auto; padding: 6px 14px; border-radius: 4px; display: inline-block; color: white; cursor: pointer; border: none; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div style="grid-column: 1/-1;"><h1>Control Maestro iCare Tech CR</h1></div>
    
    <div>
        <div class="card">
            <h2 id="rev-label">⭐ Gestionar Reseñas</h2>
            <input type="text" id="revClient" placeholder="Nombre del Cliente">
            <input type="text" id="revPos" placeholder="Puesto / Empresa">
            <textarea id="revText" rows="3" placeholder="Comentario..."></textarea>
            <button id="btn-save-rev">Guardar Reseña</button>
        </div>
        </div>
    
    <div>
        <div class="card" style="grid-column: 1/-1;">
            <h2>📋 Gestión Actual</h2>
            <div id="master-list">Cargando...</div>
        </div>
    </div>
</div>

<script>
    const API = '/api';
    let cacheData = { servicios: [], productos: [], resenas: [] };

    // Corrección crítica: Usamos listeners en lugar de onclick
    document.getElementById('btn-save-rev').addEventListener('click', subirResena);

    function loadContent() {
        fetch(`${API}/todo`)
        .then(r => r.json())
        .then(data => {
            cacheData.servicios = data.servicios || [];
            cacheData.productos = data.productos || [];
            cacheData.resenas = data.resenas || [];
            renderList();
        })
        .catch(() => document.getElementById('master-list').innerText = "Error cargando datos.");
    }

    function renderList() {
        const list = document.getElementById('master-list');
        list.innerHTML = "";
        
        cacheData.servicios.forEach((s, idx) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>${s.titulo}</span> <div id="actions-${idx}"></div>`;
            
            const btnEdit = document.createElement('button');
            btnEdit.className = 'btn-edit';
            btnEdit.innerText = 'Editar';
            btnEdit.addEventListener('click', () => prepararEdicion('servicios', idx));
            
            div.querySelector(`#actions-${idx}`).appendChild(btnEdit);
            list.appendChild(div);
        });
    }

    function prepararEdicion(tipo, index) {
        console.log("Editando:", cacheData[tipo][index]);
        // Aquí tu lógica de edición...
    }

    function subirResena() {
        const data = {
            cliente: document.getElementById('revClient').value,
            puesto: document.getElementById('revPos').value,
            comentario: document.getElementById('revText').value
        };
        fetch(`${API}/resenas`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(() => loadContent());
    }

    window.onload = loadContent;
</script>
</body>
</html>
