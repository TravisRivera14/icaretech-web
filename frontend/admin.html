<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin iCare | Control Maestro Premium</title>
    <link rel="icon" href="Logo_Admin_v2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --dark-bg: #0b0c10; --card-bg: #1f2833; --turquoise-main: #00b4d8; 
            --del: #ff3b30; --text-light: #f5f5f7; 
        }
        body { background-color: var(--dark-bg); color: var(--text-light); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark-bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .admin-section { display: none; padding: 20px; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--card-bg); }
        .data-table th, .data-table td { padding: 12px; border: 1px solid #333; text-align: left; }
        .btn-del { color: var(--del); cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Acceso Administrativo</h2>
            <input type="password" id="passAdmin" placeholder="Contraseña">
            <button onclick="validarAcceso()">Entrar</button>
        </div>
    </div>

    <div id="admin-panel" class="admin-section">
        <h1>Dashboard iCare Tech</h1>
        
        <section>
            <h2>Configuración de Contenido</h2>
            <input type="text" id="h_titulo" placeholder="Título Hero">
            <textarea id="mision" placeholder="Misión"></textarea>
            <textarea id="vision" placeholder="Visión"></textarea>
            <textarea id="compromiso" placeholder="Compromiso"></textarea>
            <button onclick="updateConfig()">Guardar Cambios</button>
        </section>

        <div id="seccion-usuarios-admin" style="display:none;">
            <h2>Tickets Pendientes</h2>
            <table class="data-table" id="tabla-tickets">
                <thead><tr><th>Cliente</th><th>Asunto</th><th>Prioridad</th><th>Acción</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="seccion-logs-admin" style="display:none;">
            <h2>Historial de Actividad</h2>
            <div id="logs-container"></div>
        </div>
    </div>

    <script>
        const API = "http://localhost:5000";
        let cacheTickets = [];

        async function validarAcceso() {
            const pass = document.getElementById('passAdmin').value;
            // Nota: En producción, esto debe ser una petición a /auth
            if(pass === "1234") { 
                document.getElementById('login-overlay').style.display = 'none';
                loadContent();
            } else { alert("Clave incorrecta"); }
        }

        async function loadContent() {
            try {
                const res = await fetch(`${API}/admin/tickets`, {credentials: 'include'});
                const tickets = await res.json();
                if(tickets) {
                    document.getElementById('seccion-usuarios-admin').style.display = 'block';
                    document.getElementById('seccion-logs-admin').style.display = 'block';
                    renderTablaTickets(tickets);
                }
            } catch (err) { console.error("Error:", err); }
        }

        function renderTablaTickets(tickets) {
            const tbody = document.querySelector('#tabla-tickets tbody');
            tbody.innerHTML = tickets.map(t => `
                <tr>
                    <td>${t.contacto}</td>
                    <td>${t.asunto}</td>
                    <td>${t.prioridad}</td>
                    <td><button class="btn-del" onclick="del('tickets', ${t.id})">Eliminar</button></td>
                </tr>
            `).join('');
        }

        function updateConfig() { 
            const data = {
                hero_titulo: document.getElementById('h_titulo').value,
                mision: document.getElementById('mision').value,
                vision: document.getElementById('vision').value,
                compromiso: document.getElementById('compromiso').value
            };
            fetch(`${API}/config`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data) 
            }).then(() => alert("Contenidos actualizados."));
        }

        function del(t, id) { 
            if(confirm("¿Seguro que deseas eliminar este registro?")) {
                fetch(`${API}/eliminar/${t}/${id}`, { method:'DELETE' }).then(() => loadContent());
            }
        }
    </script>
</body>
</html>
