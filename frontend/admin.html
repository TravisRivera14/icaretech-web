<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin iCare | Control Maestro Premium</title>
    <link rel="icon" href="Logo_Admin_v2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --dark-bg: #0b0c10;
            --card-bg: #1f2833;
            --turquoise-main: #00b4d8;
            --turquoise-dark: #0077b6;
            --turquoise-light: #90e0ef;
            --del: #ff3b30; 
            --text-light: #f5f5f7;
            --text-secondary: #8a99ad;
            --border-smooth: rgba(255, 255, 255, 0.05);
            --radius-premium: 16px;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --shadow-premium: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; letter-spacing: -0.2px; }
        body { background: var(--dark-bg); color: var(--text-light); -webkit-font-smoothing: antialiased; display: flex; min-height: 100vh; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 12, 16, 0.9); z-index: 99999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .login-card { background: var(--card-bg); padding: 45px 35px; border-radius: 24px; box-shadow: var(--shadow-premium); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border-smooth); }

        .sidebar { width: 280px; background: #11141a; border-right: 1px solid var(--border-smooth); padding: 30px 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; left: 0; top: 0; z-index: 100; }
        .sidebar-brand { font-size: 18px; font-weight: 800; color: #ffffff; margin-bottom: 35px; padding-left: 10px; display: flex; align-items: center; gap: 10px; }
        .sidebar-brand span { color: var(--turquoise-main); }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 6px; }
        .sidebar-item { padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: var(--transition-smooth); }
        .sidebar-item:hover, .sidebar-item.active { background: var(--card-bg); color: #ffffff; }
        .sidebar-item.active i { color: var(--turquoise-main); }

        .main-content { margin-left: 280px; flex: 1; padding: 40px 50px; max-width: 1200px; }
        .header-area { margin-bottom: 35px; }
        .header-area h1 { font-size: 28px; font-weight: 800; color: #ffffff; letter-spacing: -0.8px; }
        .header-area p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

        .tab-section { display: none; animation: techFadeIn 0.5s ease forwards; }
        .tab-section.active { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @keyframes techFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid-two-columns { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 901px) { .grid-two-columns { grid-template-columns: 1fr 1fr; } }

        .card { background: var(--card-bg); padding: 30px; border-radius: var(--radius-premium); box-shadow: var(--shadow-premium); border: 1px solid var(--border-smooth); box-sizing: border-box; }
        .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #ffffff; display: flex; align-items: center; gap: 10px; }

        input, textarea, button, select { width: 100%; padding: 14px; margin: 6px 0 16px 0; border-radius: 10px; border: 1px solid transparent; background: var(--dark-bg); color: var(--text-light); box-sizing: border-box; font-size: 14.5px; outline: none; transition: var(--transition-smooth); }
        input:focus, textarea:focus, select:focus { background: #11141a; border-color: var(--turquoise-main); box-shadow: 0 0 10px rgba(0, 180, 216, 0.2); }
        label { font-size: 12px; font-weight: 600; color: var(--text-secondary); display: block; margin-top: 4px; }
        button { background: var(--turquoise-main); color: #000000; border: none; cursor: pointer; font-weight: 700; border-radius: 22px; padding: 12px 24px; box-shadow: 0 4px 15px rgba(0, 180, 216, 0.15); }
        button:hover { background: var(--turquoise-light); transform: translateY(-1px); }
        .btn-brand-accent { background: var(--turquoise-dark); color: white; }
        .btn-brand-accent:hover { background: var(--turquoise-main); color: black; }

        .list-container { max-height: 400px; overflow-y: auto; background: #11141a; border: 1px solid var(--border-smooth); border-radius: 12px; padding: 8px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border-smooth); font-size: 13.5px; }
        .btn-edit { background: rgba(0, 180, 216, 0.15); color: var(--turquoise-main); width: auto; padding: 6px 14px; margin-right: 5px; font-size: 12px; border-radius: 6px; border: none; }
        .btn-del { background: rgba(255, 59, 48, 0.15); color: var(--del); width: auto; padding: 6px 14px; font-size: 12px; border-radius: 6px; border: none; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="margin-bottom:6px; font-weight:800; color:var(--turquoise-main); font-size: 24px;">Control Maestro</h2>
        <form id="form-login-master">
            <input type="text" id="login-user" placeholder="Usuario" required>
            <input type="password" id="login-pass" placeholder="Contraseña" required>
            <button type="submit" style="width:100%;">Ingresar</button>
        </form>
    </div>
</div>

<aside class="sidebar">
    <div class="sidebar-brand"><i class="fas fa-shield-halved"></i> iCare Admin</div>
    <ul class="sidebar-menu">
        <li class="sidebar-item active" onclick="switchTab('tab-tickets')"><i class="fas fa-headset"></i> Tickets</li>
        <li class="sidebar-item" onclick="switchTab('tab-empresas')"><i class="fas fa-building"></i> Clientes</li>
        <li class="sidebar-item" onclick="switchTab('tab-contenidos')"><i class="fas fa-sliders"></i> Landing</li>
        <li class="sidebar-item" onclick="switchTab('tab-personal')"><i class="fas fa-users-gear"></i> Personal</li>
        <li class="sidebar-item" onclick="switchTab('tab-auditoria')"><i class="fas fa-clock-rotate-left"></i> Auditoría</li>
    </ul>
</aside>

<main class="main-content">
    <div class="header-area">
        <h1 id="main-panel-title">Módulo Maestro</h1>
        <p>Centro de operaciones iCare Tech CR.</p>
    </div>

    <section id="tab-tickets" class="tab-section active">
        <div class="card">
            <h2><i class="fas fa-filter"></i> Tickets</h2>
            <select id="filtroEmpresaTickets" onchange="filtrarTicketsPorEmpresa(this.value)">
                <option value="Todos">-- Todas --</option>
            </select>
            <div class="ticket-table-wrapper">
                <table class="ticket-table" style="width:100%; border-collapse:collapse;">
                    <thead><tr><th>Fecha</th><th>Empresa</th><th>Contacto</th><th>Asunto</th><th>Urgencia</th><th>Estado</th></tr></thead>
                    <tbody id="tabla-tickets-soporte"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="tab-empresas" class="tab-section">
        <div class="grid-two-columns">
            <div class="card">
                <h2 id="emp-soporte-label"><i class="fas fa-plus-circle"></i> Dar de Alta Empresa</h2>
                <input type="text" id="newSupportEmpName" placeholder="Nombre compañía">
                <label>Logotipo de la empresa:</label>
                <input type="file" id="newSupportEmpImg" accept="image/*" style="padding: 10px;">
                <div id="imgPreviewContainer" style="display:none; margin: 10px 0;">
                    <img id="currentImgPreview" style="max-height: 80px; border-radius: 8px;">
                    <button type="button" onclick="borrarImagenEmpresa()" style="background: var(--del); padding: 5px 10px; font-size: 10px; margin-left: 10px;">Borrar Imagen</button>
                </div>
                <button onclick="agregarEmpresaSoporte()" class="btn-brand-accent" id="btn-guardar-empresa-soporte">+ Vincular Cliente</button>
            </div>
            <div class="card">
                <h2><i class="fas fa-list-ol"></i> Empresas Activas</h2>
                <div id="lista-empresas-soporte-bajas" class="list-container"></div>
            </div>
        </div>
    </section>

    <section id="tab-contenidos" class="tab-section">
        </section>
    <section id="tab-personal" class="tab-section">
        </section>
    <section id="tab-auditoria" class="tab-section">
        </section>
</main>

<script>
    const API = '/api';
    let imgEmpEdit = "";
    let editSupportEmpId = null;

    // --- LÓGICA DE IMÁGENES ---
    const handleFile = (id, cb) => {
        const el = document.getElementById(id);
        if(!el) return;
        el.onchange = (e) => {
            const r = new FileReader(); 
            r.onload = () => cb(r.result);
            if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
        };
    };

    /* Estilo Premium Minimalista para tarjetas de empresa */
    .empresa-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0, 0, 0, 0.08);
        transition: transform 0.2s ease;
    }

    .empresa-logo {
        width: 60px;
        height: 60px;
        object-fit: contain;
        margin-bottom: 15px;
        border-radius: 8px;
    }

    handleFile('newSupportEmpImg', res => {
        imgEmpEdit = res;
        document.getElementById('currentImgPreview').src = res;
        document.getElementById('imgPreviewContainer').style.display = 'block';
    });

    function borrarImagenEmpresa() {
        imgEmpEdit = "";
        document.getElementById('currentImgPreview').src = "";
        document.getElementById('imgPreviewContainer').style.display = 'none';
        document.getElementById('newSupportEmpImg').value = "";
    }

    function ajustarEdicionEmpresaSoporte(id, nombre, imagen = "") {
        editSupportEmpId = id;
        imgEmpEdit = imagen;
        document.getElementById('newSupportEmpName').value = nombre;
        
        if(imagen && imagen !== 'undefined') {
            document.getElementById('currentImgPreview').src = imagen;
            document.getElementById('imgPreviewContainer').style.display = 'block';
        } else {
            document.getElementById('imgPreviewContainer').style.display = 'none';
        }

        document.getElementById('emp-soporte-label').innerHTML = `<i class="fas fa-pen-to-square"></i> Editar Empresa`;
        document.getElementById('btn-guardar-empresa-soporte').innerText = "Actualizar Empresa";
    }

    function agregarEmpresaSoporte() {
        const nombre = document.getElementById('newSupportEmpName').value;
        if(!nombre) return alert("Especifica el nombre.");
        
        const payload = { nombre: nombre, imagen: imgEmpEdit };

        if (editSupportEmpId) {
            fetch(`${API}/recomiendan/${editSupportEmpId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Actualizado.");
                editSupportEmpId = null;
                imgEmpEdit = "";
                document.getElementById('imgPreviewContainer').style.display = 'none';
                document.getElementById('newSupportEmpName').value = "";
                loadContent();
            });
        } else {
            fetch(`${API}/admin/empresas-soporte`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Vinculado.");
                imgEmpEdit = "";
                document.getElementById('newSupportEmpName').value = "";
                loadContent();
            });
        }
    }

    function loadContent() {
        fetch(`${API}/todo`)
        .then(r => r.json())
        .then(data => {
            if(!data.empresas) return;
            const divBajas = document.getElementById('lista-empresas-soporte-bajas');
            divBajas.innerHTML = data.empresas.map(e => `
                <div class="list-item">
                    <span>🏢 ${e.nombre}</span>
                    <div>
                        <button class="btn-edit" onclick="ajustarEdicionEmpresaSoporte(${e.id}, '${e.nombre}', '${e.imagen || ''}')">Editar</button>
                        <button class="btn-del" onclick="eliminarEmpresaSoporte(${e.id})">Baja</button>
                    </div>
                </div>
            `).join('');
        });
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-section').forEach(section => section.classList.remove('active'));
        document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    window.onload = () => loadContent();
</script>
</body>
</html>
