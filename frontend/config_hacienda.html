<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Hacienda | iCarTech CR</title>
    <link rel="stylesheet" href="assets/css/style.css"> 
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .form-container {
            max-width: 550px;
            margin: 60px auto;
            padding: 40px;
            background: #161b22;
            border-radius: 16px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; margin-bottom: 30px; font-weight: 500; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #8b949e; font-size: 14px; }
        .input-group input[type="text"], .input-group input[type="password"] {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .input-group input:focus { border-color: #58a6ff; outline: none; }
        .file-drop-area {
            border: 2px dashed #30363d;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            background: #0d1117;
            cursor: pointer;
        }
        .file-drop-area:hover { border-color: #58a6ff; }
        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d1117;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #1f883d;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-submit:hover { background: #238636; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Configuración de Facturación</h2>
    <p style="color: #8b949e; text-align: center; font-size: 13px; margin-top: -20px; margin-bottom: 25px;">
        Ingrese sus credenciales criptográficas obtenidas desde el portal ATV de Hacienda.
    </p>

    <form action="/guardar-configuracion-hacienda" method="POST" enctype="multipart/form-data">
        
        <div class="input-group">
            <label for="usuario_idp">Usuario API (IDP)</label>
            <input type="text" id="usuario_idp" name="usuario_idp" placeholder="cpj-3-101-xxxxxx@idp.comprobanteselectronicos.go.cr" required>
        </div>

        <div class="input-group">
            <label for="password_idp">Contraseña API (IDP)</label>
            <input type="password" id="password_idp" name="password_idp" placeholder="••••••••••••••••••••••••" required>
        </div>

        <div class="input-group">
            <label>Llave Criptográfica (.p12)</label>
            <div class="file-drop-area" onclick="document.getElementById('archivo_p12').click()">
                <span id="file-label">Arrastra o selecciona tu archivo .p12</span>
                <input type="file" id="archivo_p12" name="archivo_p12" accept=".p12" style="display: none;" onchange="updateLabel(this)" required>
            </div>
        </div>

        <div class="input-group">
            <label for="pin_p12">PIN de la Llave (4 dígitos)</label>
            <input type="password" id="pin_p12" name="pin_p12" maxlength="4" placeholder="1234" required>
        </div>

        <div class="toggle-group">
            <span style="font-size: 14px; color: #8b949e;">Ambiente de Producción (Legal)</span>
            <input type="checkbox" id="ambiente" name="ambiente" value="true" style="transform: scale(1.3); cursor: pointer;">
        </div>

        <button type="submit" class="btn-submit">Guardar Configuración Segura</button>
    </form>
</div>

<script>
    function updateLabel(input) {
        const label = document.getElementById('file-label');
        if (input.files.length > 0) {
            label.innerText = "Archivo cargado: " + input.files[0].name;
            label.style.color = "#58a6ff";
        }
    }
</script>
</body>
</html>
