<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Corporativo | iCare Tech CR</title>
    <link rel="icon" href="Logo_Pestana_v2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0b0c10;
            --card-bg: #1f2833;
            --text-light: #f5f5f7;
            --neon-blue: #00b4d8;
            --neon-blue-hover: #90e0ef;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        
        body {
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .register-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        
        .register-container img {
            width: 140px;
            margin-bottom: 20px;
        }
        
        .register-container h2 {
            margin-bottom: 10px;
            font-size: 22px;
            color: #ffffff;
        }
        
        .register-container p.subtitle {
            color: #8a99ad;
            font-size: 14px;
            margin-bottom: 25px;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 15px;
            text-align: left;
        }
        
        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a99ad;
            pointer-events: none; 
        }
        
        input, select {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: #11141a;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        select {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input:focus, select:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 180, 216, 0.15);
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: var(--neon-blue);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
            margin-top: 15px;
            margin-bottom: 20px;
        }
        
        button:hover {
            background: var(--neon-blue-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 180, 216, 0.25);
        }
        
        .links a {
            color: #8a99ad;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .links a:hover {
            color: var(--text-light);
        }
        
        #success-msg {
            display: none;
            color: #7cf5a6;
            background: rgba(124, 245, 166, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #7cf5a6;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <img src="Logo.png" alt="iCare Tech CR Logo">
        <h2 id="form-title">Crear Cuenta Gratis</h2>
        <p class="subtitle" id="form-subtitle">Ingresa tus datos para empezar a facturar de inmediato.</p>
        
        <div id="success-msg">
            <i class="fas fa-check-circle"></i> Solicitud enviada exitosamente. Nuestro equipo validará los datos y te enviará las credenciales.
        </div>

        <form id="registroForm" onsubmit="enviarRegistro(event)">
            
            <div class="input-group">
                <i class="fas fa-id-badge"></i>
                <select id="tipo_cuenta" onchange="cambiarTipoCuenta()" required>
                    <option value="particular">Cliente Particular (Gratis - Acceso Inmediato)</option>
                    <option value="empresa">Empresa Corporativa (Requiere Aprobación)</option>
                </select>
            </div>

            <div class="input-group" id="field-empresa" style="display:none;">
                <i class="fas fa-building"></i>
                <input type="text" id="regEmpresa" placeholder="Empresa en la que trabaja">
            </div>
            
            <div class="input-group" id="field-puesto" style="display:none;">
                <i class="fas fa-briefcase"></i>
                <input type="text" id="regPuesto" placeholder="Puesto que desempeña">
            </div>

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="regNombre" placeholder="Nombre completo o Razón Social" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" id="regTelefono" placeholder="Número telefónico" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="regCorreo" placeholder="Correo electrónico" required>
            </div>

            <div class="input-group" id="field-password">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPassword" placeholder="Crea una contraseña" required>
            </div>
            
            <button type="submit" id="btn-submit">Registrarse y Entrar</button>
        </form>
        
        <div class="links">
            <a href="/login.html"><i class="fas fa-arrow-left"></i> Volver al inicio de sesión</a>
        </div>
    </div>

    <script>
        function cambiarTipoCuenta() {
            const tipo = document.getElementById('tipo_cuenta').value;
            const fieldEmpresa = document.getElementById('field-empresa');
            const fieldPuesto = document.getElementById('field-puesto');
            const fieldPassword = document.getElementById('field-password');
            const btnSubmit = document.getElementById('btn-submit');
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');

            if (tipo === 'empresa') {
                fieldEmpresa.style.display = 'block'; document.getElementById('regEmpresa').required = true;
                fieldPuesto.style.display = 'block'; document.getElementById('regPuesto').required = true;
                fieldPassword.style.display = 'none'; document.getElementById('regPassword').required = false;
                title.innerText = "Solicitud Corporativa";
                subtitle.innerText = "Completa los datos para habilitar el portal de tu empresa en nuestra plataforma.";
                btnSubmit.innerHTML = "Enviar Solicitud";
            } else {
                fieldEmpresa.style.display = 'none'; document.getElementById('regEmpresa').required = false;
                fieldPuesto.style.display = 'none'; document.getElementById('regPuesto').required = false;
                fieldPassword.style.display = 'block'; document.getElementById('regPassword').required = true;
                title.innerText = "Crear Cuenta Gratis";
                subtitle.innerText = "Ingresa tus datos para empezar a facturar de inmediato.";
                btnSubmit.innerHTML = "Registrarse y Entrar";
            }
        }

        window.onload = function() { cambiarTipoCuenta(); };

        async function enviarRegistro(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerText = "Procesando..."; btn.disabled = true;

            const tipo = document.getElementById('tipo_cuenta').value;
            let payload = {};
            let endpoint = '';

            if (tipo === 'particular') {
                payload = {
                    nombre: document.getElementById('regNombre').value,
                    correo: document.getElementById('regCorreo').value,
                    telefono: document.getElementById('regTelefono').value,
                    password: document.getElementById('regPassword').value
                };
                endpoint = '/api/registro_particular';
            } else {
                payload = {
                    empresa: document.getElementById('regEmpresa').value,
                    nombre: document.getElementById('regNombre').value,
                    puesto: document.getElementById('regPuesto').value,
                    telefono: document.getElementById('regTelefono').value,
                    correo: document.getElementById('regCorreo').value
                };
                endpoint = '/api/registro_corporativo';
            }

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if(data.success) {
                    if (tipo === 'particular') {
                        alert("¡Cuenta creada con éxito! Ahora inicia sesión con tu correo y contraseña.");
                        window.location.href = '/login.html';
                    } else {
                        document.getElementById('registroForm').style.display = 'none';
                        document.getElementById('success-msg').style.display = 'block';
                        document.getElementById('form-title').style.display = 'none';
                        document.getElementById('form-subtitle').style.display = 'none';
                    }
                } else {
                    alert("Error: " + (data.message || "Intenta nuevamente."));
                    btn.innerText = tipo === 'particular' ? "Registrarse y Entrar" : "Enviar Solicitud";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Error de conexión al servidor.");
                btn.innerText = tipo === 'particular' ? "Registrarse y Entrar" : "Enviar Solicitud";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
