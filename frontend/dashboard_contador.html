<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Contador ERP | iCare Tech CR</title>
    <link rel="icon" href="Logo_Pestana_v2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
    <link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
    <script src="https://jsuites.net/v4/jsuites.js"></script>
    <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />

    <style>
        :root {
            --bg-dark: #f8fafc; 
            --sidebar-bg: #2b78e4;
            --sidebar-hover: #1e62c2;
            --card-bg: #1f2833;
            --text-light: #ffffff;
            --text-muted: #8a99ad;
            --neon-blue: #55bbcc; 
            --btn-green: #7cb342; 
            --border-color: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s ease;
            --del: #ff3b30;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg-dark); 
            color: #1e293b; 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden; 
            font-size: 14px; 
            -webkit-font-smoothing: antialiased; 
        }
        
        /* BARRA LATERAL (ERP SIDEBAR) */
        .sidebar { 
            width: 280px; 
            background: var(--sidebar-bg); 
            display: flex; 
            flex-direction: column; 
            position: fixed; 
            height: 100vh; 
            z-index: 100; 
            overflow-y: auto; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .sidebar-header { 
            padding: 30px 20px 15px 20px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .main-logo-img { 
            height: 60px; 
            object-fit: contain; 
            filter: brightness(0) invert(1); 
        }

        .empresa-badge { 
            background: rgba(255, 255, 255, 0.2); 
            color: #fff; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 700; 
            display: inline-block; 
            margin-top: 15px;
        }
        
        /* ESTILOS DEL ACORDEÓN DE MENÚS (NUEVO) */
        .nav-menu { padding: 15px 0; }
        
        .menu-category {
            padding: 14px 25px;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
        }

        .menu-category:hover { background: var(--sidebar-hover); }
        .menu-category i.icon-left { width: 30px; font-size: 18px; }
        .menu-category i.icon-right { font-size: 12px; transition: transform 0.3s; }

        .submenu {
            display: none;
            background: rgba(0,0,0,0.1);
            padding: 5px 0;
        }

        .submenu-item {
            padding: 12px 25px 12px 65px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .submenu-item i { margin-right: 10px; font-size: 10px; }
        .submenu-item:hover, .submenu-item.active {
            color: #ffffff;
            background: rgba(255,255,255,0.1);
            font-weight: 700;
        }

        .logout-btn { padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; }
        .logout-btn a { 
            display: block; text-align: center; padding: 10px; 
            background: rgba(255, 59, 48, 0.2); color: #fff; 
            border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer;
        }
        .logout-btn a:hover { background: #ff3b30; }
        
        /* CONTENIDO PRINCIPAL */
        .main-content { flex: 1; margin-left: 280px; padding: 25px 45px; overflow-y: auto;}
        
        .topbar { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #e2e8f0; 
        }

        .erp-header-info {
            display: flex; gap: 30px; align-items: center;
        }

        .erp-header-box {
            font-size: 12px; color: #64748b;
        }
        .erp-header-box b {
            font-size: 14px; color: #1e293b; display: block; margin-top: 3px;
        }

        .btn-top { 
            padding: 9px 16px; border-radius: 6px; border: none; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; background: var(--sidebar-bg); color: #fff; 
        }
        .btn-top:hover { opacity: 0.9; }

        .btn-t-green { background: var(--btn-green); color: #fff; }

        .page-title { margin: 0 0 5px 0; font-size: 26px; font-weight: 800; color: var(--card-bg);}
        .breadcrumb { font-size: 11px; color: #7cb342; margin-bottom: 25px; font-weight: 700; text-transform: uppercase;}
        
        .card { background: #ffffff; padding: 30px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; color: #1e293b;}

        .form-input, .form-select { 
            width: 100%; padding: 10px 14px; margin-bottom: 15px; border-radius: 6px; background: #f8fafc; border: 1px solid #cbd5e1; color: #1e293b; font-size: 13px; transition: 0.3s; box-sizing: border-box; font-family: inherit; 
        }
        .form-input:focus, .form-select:focus { border-color: var(--sidebar-bg); outline: none; box-shadow: 0 0 0 3px rgba(43, 120, 228, 0.15);}
        label { color: #475569; font-size: 12px; font-weight: 600; margin-bottom: 6px; display: block;}

        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px;}
        .admin-table th { color: #ffffff; text-align: left; padding: 12px 15px; font-weight: 600; background: var(--sidebar-bg); }
        .admin-table td { padding: 12px 15px; border-bottom: 1px solid #e2e8f0; color: #334155; }
        
        /* BÚSQUEDA CABYS (Burbuja) */
        .cabys-wrapper { position: relative; }
        .cabys-dropdown { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #ffffff; border: 1px solid var(--sidebar-bg); z-index: 9999; border-radius: 6px; max-height: 250px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-top: 5px; }
        .cabys-item { padding: 10px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; color: #1e293b; font-size: 12px; transition: 0.2s; }
        .cabys-item:hover { background: #f1f5f9; color: var(--sidebar-bg); font-weight: 600;}
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <img src="Logo.png" alt="iCare Tech" class="main-logo-img">
            <div><span class="empresa-badge"><i class="fas fa-calculator"></i> ERP Contador</span></div>
        </div>
        
        <div class="nav-menu" id="sidebar-dynamic-menu">
            <!-- EL MENÚ SE GENERARÁ DINÁMICAMENTE AQUÍ -->
        </div>
        
        <div class="logout-btn"><a onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></div>
    </nav>

    <main class="main-content">
        <div class="topbar">
            <div>
                <h1 class="page-title" id="top-title">Dashboard</h1>
                <div class="breadcrumb" id="top-bread">INICIO > DASHBOARD</div>
            </div>
            <div class="erp-header-info">
                <div class="erp-header-box">SUCURSAL: <b>PRINCIPAL</b><br>TERMINAL: <b>01</b></div>
                <div class="erp-header-box">USUARIO <b id="header-user-name">CARGANDO...</b></div>
                <div class="erp-header-box">PERFIL <b>Contador Autorizado</b></div>
                <div class="erp-header-box" style="border-left: 2px solid #e2e8f0; padding-left: 20px;">
                    PLAN ADQUIRIDO
                    <b style="color: var(--sidebar-bg);" id="header-plan">Cargando...</b>
                </div>
            </div>
        </div>

        <div id="vista-principal"></div>
    </main>

    <script>
        // SEGURIDAD: Escapar caracteres HTML peligrosos (Prevención XSS)
        function escapeHTML(str) {
            if (str === null || str === undefined) return '';
            return str.toString().replace(/[&<>'"]/g, match => {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[match];
            });
        }

        let excelApp = null;
        window.userDataCache = {};
        window.lineasDocumento = []; 
        window.clientesCache = [];
        window.productosCache = [];

        // ESTRUCTURA DEL MENÚ ERP
        const erpMenu = [
            {
                id: 'inicio', nombre: 'Inicio y Herramientas', icon: 'fa-home',
                subitems: ['Mi Dashboard', 'Hoja de Trabajo (Excel)', 'Cambiar Empresa']
            },
            {
                id: 'facturar', nombre: 'Facturar', icon: 'fa-file-invoice',
                subitems: ['Crear Documento', 'Ver Doc Elect.', 'Crear Fac Export.', 'Ver Cotizaciones', 'Buscar Venta', 'Fact RS/OP.', 'NC a Fact RS/OP.']
            },
            {
                id: 'aceptacion', nombre: 'Aceptación', icon: 'fa-check-double',
                subitems: ['Aceptación de Documentos']
            },
            {
                id: 'compras', nombre: 'Compras', icon: 'fa-shopping-cart',
                subitems: ['Ver Fact Compras', 'Crear Fact Compras', 'Recibir Documentos']
            },
            {
                id: 'productos', nombre: 'Productos', icon: 'fa-box',
                subitems: ['Ver Productos', 'Crear Productos', 'Inventario']
            },
            {
                id: 'clientes', nombre: 'Clientes', icon: 'fa-users',
                subitems: ['Ver Clientes', 'Crear Cliente']
            },
            {
                id: 'cuentas', nombre: 'Cuentas', icon: 'fa-clipboard-list',
                subitems: ['Gestión de Cuentas']
            },
            {
                id: 'reportes', nombre: 'Reportes Mas Usados', icon: 'fa-chart-pie',
                subitems: ['Venta Diaria', 'Compras por Proveedor', 'Venta Consolidada', 'Reporte de Venta', 'Reporte de FEC', 'Reporte de Recepción', 'Reporte de REA', 'Reporte de IVA', 'Reporte Fact PDF']
            },
            {
                id: 'config', nombre: 'Configuración', icon: 'fa-cogs',
                subitems: ['Datos de la Empresa', 'Llave Hacienda (.p12)']
            }
        ];

        function renderSidebar() {
            const menuHtml = document.getElementById('sidebar-dynamic-menu');
            let html = '';
            
            erpMenu.forEach(cat => {
                html += `
                    <div class="menu-category" onclick="toggleSubmenu('${cat.id}')">
                        <div style="display:flex; align-items:center;">
                            <i class="fas ${cat.icon} icon-left"></i> ${escapeHTML(cat.nombre).toUpperCase()}
                        </div>
                        <i class="fas fa-caret-down icon-right" id="arrow-${cat.id}"></i>
                    </div>
                    <div class="submenu" id="sub-${cat.id}">
                `;
                cat.subitems.forEach(sub => {
                    html += `<a class="submenu-item" onclick="window.renderModulo('${escapeHTML(sub)}', '${escapeHTML(cat.nombre)}', this)"><i class="fas fa-chevron-right"></i> ${escapeHTML(sub).toUpperCase()}</a>`;
                });
                html += `</div>`;
            });
            
            menuHtml.innerHTML = html;
        }

        function toggleSubmenu(id) {
            const sub = document.getElementById(`sub-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            
            document.querySelectorAll('.submenu').forEach(el => {
                if(el.id !== `sub-${id}`) el.style.display = 'none';
            });
            document.querySelectorAll('.icon-right').forEach(el => {
                if(el.id !== `arrow-${id}`) el.style.transform = 'rotate(0deg)';
            });

            if (sub.style.display === 'block') {
                sub.style.display = 'none';
                arrow.style.transform = 'rotate(0deg)';
            } else {
                sub.style.display = 'block';
                arrow.style.transform = 'rotate(180deg)';
            }
        }

        window.renderModulo = function(opcion, categoria, el) {
            if(el) {
                document.querySelectorAll('.submenu-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }

            document.getElementById('top-title').innerText = opcion;
            document.getElementById('top-bread').innerText = `${categoria.toUpperCase()} > ${opcion.toUpperCase()}`;

            const contenedor = document.getElementById('vista-principal');

            if (opcion === 'Mi Dashboard' || opcion === 'Cambiar Empresa') {
                contenedor.innerHTML = `
                    <div class="metrics-grid">
                        <div class="metric-box" style="border-left: 4px solid var(--sidebar-bg);"><p>EMPRESAS ASIGNADAS</p><h3 id="tot-empresas">0</h3></div>
                        <div class="metric-box"><p>FACTURAS DEL MES</p><h3 id="tot-docs">0</h3></div>
                        <div class="metric-box"><p>ESTADO API</p><h3 style="color:var(--btn-green);">CONECTADO</h3></div>
                    </div>
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                            <h3 style="font-size: 16px;"><i class="fas fa-building" style="color:var(--sidebar-bg);"></i> Selecciona la Empresa a Administrar</h3>
                            <button class="btn-top" onclick="document.getElementById('form-nueva-empresa').style.display='block'">+ Nueva Empresa</button>
                        </div>
                        
                        <div id="form-nueva-empresa" style="display:none; background:#f1f5f9; padding:20px; border-radius:8px; margin-bottom:20px; border:1px dashed #cbd5e1;">
                            <label>Nombre Legal del Nuevo Cliente</label>
                            <input type="text" id="nueva-emp-nombre" class="form-input" style="background:#fff;">
                            <div style="display:flex; gap:10px;">
                                <button class="btn-top" onclick="crearEmpresaContador()">Registrar</button>
                                <button class="btn-top" style="background:#94a3b8;" onclick="document.getElementById('form-nueva-empresa').style.display='none'">Cancelar</button>
                            </div>
                        </div>

                        <div id="lista-empresas-contador" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                            Cargando cartera de clientes...
                        </div>
                    </div>
                `;
                cargarEmpresasContador();
            }

            else if (opcion === 'Aceptación de Documentos') {
                contenedor.innerHTML = `
                    <div class="card">
                        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:20px; background:#f8fafc; padding:25px; border-radius:12px; border:1px solid #e2e8f0;">
                            <div><label>Nombre emisor:</label><input type="text" class="form-input" style="background:#fff; margin:0;"></div>
                            <div><label>Cédula emisor:</label><input type="text" class="form-input" style="background:#fff; margin:0;"></div>
                            <div><label>Consecutivo documento:</label><input type="text" class="form-input" style="background:#fff; margin:0;"></div>
                            <div><label>Usuario:</label><select class="form-select" style="background:#fff; margin:0;"><option>Todos</option></select></div>
                            
                            <div><label>Tipo documento:</label><select class="form-select" style="background:#fff; margin:0;"><option>Todos</option><option>Factura Electrónica</option></select></div>
                            <div><label>Buscar en bandeja:</label><select class="form-select" style="background:#fff; margin:0;"><option>Aceptados</option><option>Pendientes</option><option>Rechazados</option></select></div>
                            <div><label>Estado Hacienda:</label><select class="form-select" style="background:#fff; margin:0;"><option>Todos</option><option>Aceptado</option></select></div>
                            <div><label>Moneda:</label><select class="form-select" style="background:#fff; margin:0;"><option>Todos</option><option>CRC</option><option>USD</option></select></div>
                            
                            <div><label>Fecha desde:</label><input type="date" class="form-input" style="background:#fff; margin:0;"></div>
                            <div><label>Fecha hasta:</label><input type="date" class="form-input" style="background:#fff; margin:0;"></div>
                            
                            <div style="display:flex; flex-direction:column; gap:8px; margin-top:5px; font-size:13px; color:#334155;">
                                <label style="display:flex; align-items:center; gap:8px; margin:0;"><input type="radio" name="rep" checked> Mostrar en pantalla</label>
                                <label style="display:flex; align-items:center; gap:8px; margin:0;"><input type="radio" name="rep"> Descargar reporte</label>
                                <label style="display:flex; align-items:center; gap:8px; margin:0;"><input type="checkbox"> Convertir a Colones</label>
                            </div>
                            
                            <div style="display:flex; align-items:flex-end;">
                                <button class="btn-top btn-t-green" style="width:100%; padding:12px; font-size:14px;"><i class="fas fa-search"></i> Buscar</button>
                            </div>
                        </div>
                        
                        <div style="margin-top:25px; background:#f1f5f9; padding:50px; text-align:center; border-radius:12px; border:1px dashed #cbd5e1; color:#64748b; font-size:16px;">
                            <i class="fas fa-inbox" style="font-size:30px; margin-bottom:15px; color:#94a3b8; display:block;"></i>
                            No se han cargado documentos para la aceptación en este rango de fechas.
                        </div>
                        
                        <p style="font-size:12px; color:#64748b; margin-top:20px; line-height:1.6;">
                            <b>Nota Fiscal:</b> Nuestro sistema marcará como aceptados automáticamente los documentos a los que no se les haya aplicado ninguna acción durante el mes de la transacción, más un plazo adicional de ocho días, conforme a lo establecido por la resolución DGT-R-033-2019 del Ministerio de Hacienda.
                        </p>
                    </div>
                `;
            }

            else if (opcion === 'Crear Documento' || opcion === 'Nueva Factura') {
                window.lineasDocumento = [];
                contenedor.innerHTML = `
                    <div class="card">
                        <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:15px; margin-bottom:25px; background:#f8fafc; padding:20px; border-radius:10px; border:1px solid #e2e8f0;">
                            <div><label>Cliente Receptor</label><select id="doc-cliente" class="form-select" style="background:#fff; margin:0;"></select></div>
                            <div><label>Condición de Venta</label><select id="doc-condicion" class="form-select" style="background:#fff; margin:0;"><option value="01">Contado</option><option value="02">Crédito</option></select></div>
                            <div><label>Medio de Pago</label><select id="doc-medio" class="form-select" style="background:#fff; margin:0;"><option value="04">Transferencia</option><option value="01">Efectivo</option></select></div>
                        </div>
                        
                        <div style="display:grid; grid-template-columns: 3fr 1fr 1fr 1fr auto; gap:10px; margin-bottom:20px; align-items:end;">
                            <div class="cabys-wrapper">
                                <label>Producto (Código CABYS o Nombre)</label>
                                <input type="text" id="busca-prod" class="form-input" style="background:#fff; margin:0;" placeholder="Escribe para buscar..." autocomplete="off" onkeyup="window.filtrarDropdownCabys(this.value)">
                                <div id="cabys-dropdown" class="cabys-dropdown"></div>
                            </div>
                            <div><label>Cantidad</label><input type="number" id="busca-cant" class="form-input" style="background:#fff; margin:0;" value="1" min="0.1" oninput="window.actualizarTotalLinea()"></div>
                            <div><label>Precio Unitario</label><input type="text" id="busca-precio" class="form-input" style="background:#e2e8f0; margin:0;" disabled></div>
                            <div><label>Total Línea</label><input type="text" id="busca-total" class="form-input" style="background:#e2e8f0; margin:0;" disabled></div>
                            <button class="btn-top btn-t-green" style="padding:10px 15px; margin-bottom:0;" onclick="window.agregarLinea()"><i class="fas fa-plus"></i></button>
                        </div>
                        
                        <table class="admin-table" style="margin-bottom:30px;">
                            <thead><tr><th>Cant.</th><th>CABYS</th><th>Descripción</th><th>P. Unit</th><th>IVA</th><th>Total</th><th></th></tr></thead>
                            <tbody id="doc-body"><tr><td colspan="7" style="text-align:center; color:#94a3b8;">No hay líneas agregadas al documento</td></tr></tbody>
                        </table>
                        
                        <div style="display:flex; justify-content:flex-end;">
                            <div style="background:#f8fafc; padding:20px; border-radius:10px; width:300px; border:1px solid #e2e8f0;">
                                <p style="margin:5px 0; display:flex; justify-content:space-between; color:#475569;">Subtotal: <span id="t-sub" style="color:#0f172a; font-weight:700;">₡0.00</span></p>
                                <p style="margin:5px 0; display:flex; justify-content:space-between; color:#475569;">IVA Total: <span id="t-iva" style="color:#0f172a; font-weight:700;">₡0.00</span></p>
                                <p style="border-top:2px solid #cbd5e1; padding-top:15px; margin-top:15px; display:flex; justify-content:space-between; font-weight:800; font-size:18px;">Total a Pagar: <span id="t-total" style="color:var(--sidebar-bg);">₡0.00</span></p>
                            </div>
                        </div>
                        <button id="btn-emitir-doc" class="btn-top" style="width:100%; margin-top:25px; padding:15px; font-size:15px;" disabled onclick="window.emitirDocumento('Factura')">Emitir y Firmar en Hacienda</button>
                    </div>
                `;
                const selC = document.getElementById('doc-cliente');
                if(!window.clientesCache || window.clientesCache.length === 0) { selC.innerHTML = '<option value="">Sin clientes en esta empresa</option>'; }
                else { selC.innerHTML = '<option value="">-- Seleccione Cliente --</option>' + window.clientesCache.map(c => `<option value="${c.id}">${escapeHTML(c.nombre)} (${escapeHTML(c.identificacion)})</option>`).join(''); }
            }

            else if (opcion === 'Ver Clientes' || opcion === 'Crear Cliente') {
                contenedor.innerHTML = `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid #e2e8f0; padding-bottom:15px;">
                            <h2 style="margin:0; color:#1e293b; font-size:18px;">Gestión de Clientes</h2>
                            <button class="btn-top" onclick="document.getElementById('form-cliente').style.display='block'"><i class="fas fa-user-plus"></i> Registrar Cliente</button>
                        </div>
                        <div id="form-cliente" style="display:${opcion==='Crear Cliente'?'block':'none'}; background:#f8fafc; padding:25px; border-radius:10px; margin-bottom:25px; border:1px solid #e2e8f0;">
                            <h3 style="color:#1e293b; margin-bottom: 15px; font-size:15px;">Ficha del Cliente</h3>

        async function cargarEmpresasContador() {
            try {
                const res = await fetch('/api/contador/empresas', {credentials: 'include'});
                const data = await res.json();
                
                document.getElementById('tot-empresas').innerText = data.length;
                
                let docsTotal = 0;
                data.forEach(e => docsTotal += e.documentos);
                document.getElementById('tot-docs').innerText = docsTotal;

                const lista = document.getElementById('lista-empresas-contador');
                if(data.length === 0) {
                    lista.innerHTML = "<div style='grid-column:1/-1; padding:20px; background:#f8fafc; border-radius:8px; border:1px dashed #cbd5e1; color:#64748b;'>No tienes empresas asignadas a tu portafolio aún.</div>";
                    return;
                }
                
                lista.innerHTML = data.map(e => `
                    <div style="background:#f8fafc; padding:20px; border-radius:12px; border:1px solid #e2e8f0; display:flex; flex-direction:column; justify-content:space-between;">
                        <div>
                            <h3 style="color:var(--sidebar-bg); font-size:17px; margin-bottom:5px; font-weight:800;"><i class="fas fa-building"></i> ${escapeHTML(e.nombre)}</h3>
                            <p style="color:#475569; font-size:12px; margin-bottom:15px; font-weight:600;">Plan: <span style="color:var(--neon-blue);">${escapeHTML(e.plan)}</span> | Documentos procesados: ${e.documentos}</p>
                        </div>
                        <button class="btn-top" style="width:100%;" onclick="seleccionarEmpresa(${e.id}, '${escapeHTML(e.nombre).replace(/'/g, "\\'")}')">Entrar al Sistema</button>
                    </div>
                `).join('');
            } catch(e) { console.log("Error cargando empresas del contador."); }
        }

        async function seleccionarEmpresa(id, nombre) {
            try {
                const res = await fetch('/api/contador/seleccionar_empresa', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    credentials: 'include', body: JSON.stringify({empresa_id: id})
                });
                const data = await res.json();
                if(data.success) {
                    const opsRes = await fetch('/api/cliente/datos-operativos', {credentials: 'include'});
                    window.userDataCache = await opsRes.json();
                    
                    fetch('/api/facturacion/clientes', {credentials: 'include'}).then(r=>r.json()).then(d => window.clientesCache = d).catch(e => console.log(e));
                    fetch('/api/facturacion/productos', {credentials: 'include'}).then(r=>r.json()).then(d => window.productosCache = d).catch(e => console.log(e));

                    document.getElementById('header-plan').innerText = `Plan ${escapeHTML(window.userDataCache.plan)} - Vencimiento: Próximo Mes`;
                    // Abrir Facturador por defecto
                    toggleSubmenu('facturar');
                    setTimeout(()=>{ window.renderModulo('Inicio Facturador', 'Facturar', document.querySelectorAll('.submenu-item')[3]); }, 100);

                } else { alert("Error al entrar a la base de datos de la empresa."); }
            } catch(e) { alert("Error de red."); }
        }

        async function crearEmpresaContador() {
            const nombre = document.getElementById('nueva-emp-nombre').value;
            if(!nombre) return alert("Debes ingresar el nombre legal o razón social.");
            
            try {
                const res = await fetch('/api/contador/empresas', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    credentials: 'include', body: JSON.stringify({nombre: nombre})
                });
                const data = await res.json();
                if(data.success) {
                    document.getElementById('nueva-emp-nombre').value = '';
                    document.getElementById('form-nueva-empresa').style.display = 'none';
                    cargarEmpresasContador();
                } else { alert("Error: " + data.message); }
            } catch(e) { alert("Error de red al crear empresa."); }
        }

        // =========================================
        // FUNCIONES DE FACTURACIÓN Y CABYS (BURBUJAS)
        // =========================================
        window.buscarCabysOficial = async function(q) {
            const drop = document.getElementById('cabys-oficial-dropdown');
            if(!q || q.length < 3) { drop.style.display = 'none'; return; }
            try {
                const res = await fetch(`/api/cabys/buscar?q=${encodeURIComponent(q)}`, {credentials: 'include'});
                const matches = await res.json();
                if(matches.length === 0) { 
                    drop.style.display = 'block'; 
                    drop.innerHTML = '<div class="cabys-item" style="color:#94a3b8;">No se encontró en Hacienda.</div>';
                    return; 
                }
                drop.innerHTML = matches.map(m => `
                    <div class="cabys-item" onclick="window.seleccionarCabysOficial('${m.codigo}', '${escapeHTML(m.descripcion).replace(/'/g, "\\'")}', ${m.impuesto})">
                        <b style="font-family:monospace; color:var(--sidebar-bg);">${m.codigo}</b> - ${escapeHTML(m.descripcion)} 
                        <span style="font-weight:bold; float:right;">IVA: ${m.impuesto}%</span>
                    </div>
                `).join('');
                drop.style.display = 'block';
            } catch(e) { console.log("Error API CABYS"); }
        };

        window.seleccionarCabysOficial = function(codigo, desc, impuesto) {
            document.getElementById('fp-cabys').value = codigo;
            document.getElementById('fp-desc').value = desc;
            document.getElementById('fp-iva').value = parseFloat(impuesto).toFixed(2);
            document.getElementById('cabys-oficial-dropdown').style.display = 'none';
            document.getElementById('buscador-cabys-oficial').value = ''; 
        };

        window.filtrarDropdownCabys = function(txt) {
            const drop = document.getElementById('cabys-dropdown');
            if(!txt || txt.length < 2) { drop.style.display = 'none'; return; }
            const matches = window.productosCache.filter(p => p.descripcion.toLowerCase().includes(txt.toLowerCase()) || p.codigo_cabys.includes(txt));
            if(matches.length === 0) { 
                drop.style.display = 'block'; 
                drop.innerHTML = '<div class="cabys-item" style="color:#94a3b8;">No en catálogo local.</div>';
                return; 
            }
            drop.innerHTML = matches.map(m => `
                <div class="cabys-item" onclick="window.seleccionarCabys('${m.codigo_cabys}', '${escapeHTML(m.descripcion).replace(/'/g, "\\'")}', ${m.precio_unitario}, ${m.impuesto}, '${m.unidad_medida}')">
                    <b style="font-family:monospace; color:var(--sidebar-bg);">${m.codigo_cabys}</b> - ${escapeHTML(m.descripcion)} 
                    <span style="font-weight:bold; float:right;">₡${m.precio_unitario}</span>
                </div>
            `).join('');
            drop.style.display = 'block';
        };

        window.seleccionarCabys = function(cabys, desc, precio, imp, uni) {
            window.prodSeleccionado = { codigo_cabys: cabys, descripcion: desc, precio_unitario: precio, impuesto: imp, unidad_medida: uni };
            document.getElementById('busca-prod').value = desc; 
            document.getElementById('busca-precio').value = precio;
            document.getElementById('cabys-dropdown').style.display = 'none';
            window.actualizarTotalLinea();
        };

        document.addEventListener('click', function(e) {
            const dropOficial = document.getElementById('cabys-oficial-dropdown');
            if (dropOficial && e.target.id !== 'buscador-cabys-oficial') dropOficial.style.display = 'none';
            const dropLocal = document.getElementById('cabys-dropdown');
            if (dropLocal && e.target.id !== 'busca-prod') dropLocal.style.display = 'none';
        });

        window.actualizarTotalLinea = function() {
            const cant = parseFloat(document.getElementById('busca-cant').value) || 0;
            const precio = parseFloat(document.getElementById('busca-precio').value) || 0;
            document.getElementById('busca-total').value = (cant * precio).toFixed(2);
        };

        window.agregarLinea = function() {
            if(!window.prodSeleccionado) return alert("Busca y selecciona un producto de la lista primero.");
            const cant = parseFloat(document.getElementById('busca-cant').value) || 1;
            window.lineasDocumento.push({ codigo_cabys: window.prodSeleccionado.codigo_cabys, descripcion: window.prodSeleccionado.descripcion, cantidad: cant, precio_unitario: window.prodSeleccionado.precio_unitario, monto_total: cant * window.prodSeleccionado.precio_unitario, impuesto: window.prodSeleccionado.impuesto, unidad_medida: window.prodSeleccionado.unidad_medida });
            document.getElementById('busca-prod').value = ""; document.getElementById('busca-cant').value = "1"; document.getElementById('busca-precio').value = ""; document.getElementById('busca-total').value = ""; window.prodSeleccionado = null; window.renderLineasDocumento();
        };

        window.renderLineasDocumento = function() {
            const tbody = document.getElementById('doc-body');
            let html = ''; let sub = 0; let iva = 0;
            window.lineasDocumento.forEach((l, i) => {
                html += `<tr><td>${l.cantidad}</td><td><code style="background:#f1f5f9; padding:2px 5px; border-radius:4px;">${escapeHTML(l.codigo_cabys)}</code></td><td><b>${escapeHTML(l.descripcion)}</b></td><td>₡${l.precio_unitario}</td><td>${l.impuesto}%</td><td style="font-weight:700; color:var(--sidebar-bg);">₡${l.monto_total.toFixed(2)}</td><td><button class="fact-btn-del" onclick="window.lineasDocumento.splice(${i},1); window.renderLineasDocumento();"><i class="fas fa-trash"></i></button></td></tr>`;
                sub += l.monto_total; iva += l.monto_total * (parseFloat(l.impuesto)/100);
            });
            tbody.innerHTML = html || `<tr><td colspan="7" style="text-align:center; color:#94a3b8;">No hay líneas agregadas al documento</td></tr>`;
            document.getElementById('t-sub').innerText = `₡${sub.toFixed(2)}`; document.getElementById('t-iva').innerText = `₡${iva.toFixed(2)}`; document.getElementById('t-total').innerText = `₡${(sub+iva).toFixed(2)}`;
            const btn = document.getElementById('btn-emitir-doc');
            if (window.lineasDocumento.length > 0) { btn.disabled = false; btn.style.background = 'var(--btn-green)'; btn.style.opacity = '1'; } else { btn.disabled = true; btn.style.background = 'var(--sidebar-bg)'; btn.style.opacity = '0.5'; }
        };

        window.emitirDocumento = async function(tipo) {
            const cliente_id = document.getElementById('doc-cliente').value;
            if(!cliente_id) return alert("Selecciona el Cliente Receptor.");
            const btn = document.getElementById('btn-emitir-doc'); btn.innerText = "Firmando en Hacienda..."; btn.disabled = true;
            let sub = 0; let iva = 0; window.lineasDocumento.forEach(l => { sub += l.monto_total; iva += l.monto_total * (parseFloat(l.impuesto)/100); });
            const payload = { cliente_id: cliente_id, condicion_venta: document.getElementById('doc-condicion').value, medio_pago: document.getElementById('doc-medio').value, lineas: window.lineasDocumento, total_gravado: sub, total_impuesto: iva, total_comprobante: sub + iva };
            const endpoint = tipo === 'Factura' ? '/api/facturacion/emitir' : '/api/facturacion/proformas/emitir';
            try {
                const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(payload) });
                const data = await res.json();
                if(data.success) { alert(`¡${tipo} generada con éxito!`); window.renderModulo(tipo === 'Factura' ? 'Historial de Facturas' : 'Proformas Generadas', 'Facturar', null); } 
                else { alert("Hacienda Rechazó: " + data.message); btn.innerText = `Emitir ${tipo}`; btn.disabled = false; }
            } catch(e) { alert("Error de conexión a internet."); btn.disabled = false; }
        };

        window.cargarClientesFact = function() {
            const list = document.getElementById('tabla-clientes-fact');
            fetch('/api/facturacion/clientes', {credentials: 'include'}).then(r=>r.json()).then(data => {
                if(!data || data.length === 0) { list.innerHTML = "<p style='color:#64748b; padding:20px; text-align:center;'>Sin clientes en la base de datos.</p>"; return; }
                list.innerHTML = `<table class="admin-table"><thead><tr><th>Nombre o Razón Social</th><th>Identificación</th><th>Correo de Envío</th><th>Acción</th></tr></thead><tbody>
                    ${data.map(c => `<tr><td><b style="color:#0f172a;">${escapeHTML(c.nombre)}</b></td><td>${escapeHTML(c.identificacion)}</td><td>${escapeHTML(c.correo)}</td><td><button class="fact-btn-del" onclick="window.borrarItem('clientes_facturacion', ${c.id}, 'Clientes')"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
                </tbody></table>`;
            });
        };

        window.guardarClienteFact = function(e) {
            e.preventDefault();
            const body = { nombre: document.getElementById('fc-nombre').value, tipo_identificacion: document.getElementById('fc-tipo').value, identificacion: document.getElementById('fc-cedula').value, correo: document.getElementById('fc-correo').value, telefono: document.getElementById('fc-telefono').value };
            fetch('/api/facturacion/clientes', { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(body) }).then(()=> { fetch('/api/facturacion/clientes', {credentials: 'include'}).then(r=>r.json()).then(d => window.clientesCache = d); window.renderModulo('Clientes', 'Clientes', null); });
        };

        window.cargarProductosFact = function() {
            const area = document.getElementById('tabla-productos-fact');
            fetch('/api/facturacion/productos', {credentials: 'include'}).then(r=>r.json()).then(data => {
                if(!data || data.length === 0) { area.innerHTML = "<p style='color:#64748b; padding:20px; text-align:center;'>Catálogo vacío.</p>"; return; }
                area.innerHTML = `<table class="admin-table"><thead><tr><th>CABYS</th><th>Descripción Comercial</th><th>Tarifa IVA</th><th>Precio (CRC)</th><th>Acción</th></tr></thead><tbody>
                    ${data.map(p => `<tr><td><code style="background:#f1f5f9; padding:2px 5px; border-radius:4px;">${escapeHTML(p.codigo_cabys)}</code></td><td><b style="color:#0f172a;">${escapeHTML(p.descripcion)}</b></td><td>${p.impuesto}%</td><td style="color:var(--sidebar-bg); font-weight:700;">₡${p.precio_unitario}</td><td><button class="fact-btn-del" onclick="window.borrarItem('productos_facturacion', ${p.id}, 'Catálogo CABYS')"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
                </tbody></table>`;
            });
        };

        window.guardarProductoFact = function(e) {
            e.preventDefault();
            const body = { codigo_cabys: document.getElementById('fp-cabys').value, descripcion: document.getElementById('fp-desc').value, precio_unitario: document.getElementById('fp-precio').value, unidad_medida: 'Sp', impuesto: document.getElementById('fp-iva').value };
            fetch('/api/facturacion/productos', { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify(body) }).then(()=> { fetch('/api/facturacion/productos', {credentials: 'include'}).then(r=>r.json()).then(d => window.productosCache = d); window.renderModulo('Catálogo CABYS', 'Productos', null); });
        };

        window.borrarItem = function(tabla, id, moduloRef) {
            if(confirm('¿Confirmas eliminar este registro fiscal?')) { fetch(`/api/eliminar/${tabla}/${id}`, { method: 'DELETE', credentials: 'include' }).then(() => window.renderModulo(moduloRef, '', null)); }
        };

        window.cargarHistorialDoc = function(tipo) {
            fetch('/api/cliente/datos-operativos', {credentials: 'include'}).then(r=>r.json()).then(data => {
                const area = document.getElementById('tabla-historial');
                const lista = tipo === 'factura' ? data.facturas : data.proformas;
                if(!lista || lista.length === 0) { area.innerHTML = "<p style='color:#64748b; text-align:center; padding:30px;'><i class='fas fa-folder-open' style='font-size:30px; margin-bottom:10px; display:block;'></i>Aún no has emitido documentos.</p>"; return; }
                area.innerHTML = `<table class="admin-table"><thead><tr><th>Fecha Creación</th><th>Consecutivo</th>${tipo==='factura'?'<th>Estado Ministerio</th>':''}<th>Monto Total</th><th>Descargar</th></tr></thead><tbody>
                    ${lista.map(d => `<tr><td>${new Date(d.fecha).toLocaleDateString()}</td><td><b style="color:#0f172a;">${escapeHTML(d.consecutivo)}</b></td>${tipo==='factura'?`<td><span style="background:${d.estado==='Rechazado'?'rgba(239,68,68,0.1)':'rgba(16,185,129,0.1)'}; color:${d.estado==='Rechazado'?'#ef4444':'#10b981'}; padding:4px 8px; border-radius:4px; font-weight:700; font-size:11px;">${escapeHTML(d.estado).toUpperCase()}</span></td>`:''}<td><b style="color:var(--sidebar-bg);">₡${d.monto}</b></td><td><button class="fact-btn-view" onclick="window.open('/api/facturacion/imprimir?tipo=${tipo}&id=${d.id}', '_blank')"><i class="fas fa-file-pdf"></i> PDF</button></td></tr>`).join('')}
                </tbody></table>`;
            });
        };

        // --- ARRANQUE ---
        window.onload = async () => {
            renderSidebar();
            try {
                const res = await fetch('/api/login', { method: 'GET', credentials: 'include' });
                if (res.status === 401) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                
                if(data.rol !== 'contador' && data.rol !== 'admin') {
                    window.location.href = '/dashboard_cliente.html';
                    return;
                }

                if(data.usuario) {
                    document.getElementById('header-user-name').innerText = escapeHTML(data.usuario);
                    document.getElementById('header-user-initial').innerText = escapeHTML(data.usuario).charAt(0).toUpperCase();
                }

                toggleSubmenu('inicio');
                mostrarModulo('Mi Dashboard', document.querySelector('.submenu-item'));

            } catch (e) { console.warn("Error de conexión"); }
        };

        async function logout() {
            if(confirm('¿Estás seguro de salir del sistema contable?')) { 
                await fetch('/api/logout', { credentials: 'include' }); 
                window.location.href = '/login.html'; 
            }
        }
    </script>
</body>
</html>
