<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCare Tech CR | Soporte Técnico Avanzado y Seguridad Electrónica</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

    <style>
        /* VARIABLES DE DISEÑO PRINCIPALES */
        :root { 
            --nav-bg: rgba(53, 92, 107, 0.6); 
            --neon-green: #7cf5a6; 
            --neon-green-hover: #65d98e;
            --icon-blue: #4ea5ce;
            --bg-light: #f4f7f6;
            --text-dark: #111111;
            --text-grey: #666666;
            --white: #ffffff;
            --footer-dark: #1a1a1a;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* RESETEO GENERAL DE ESTRUCTURA WEB */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overflow-x: hidden; }

        /* NAVEGACIÓN Y ENCABEZADO PREMIUM */
        header { background: var(--nav-bg); padding: 5px 40px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: var(--transition-smooth); }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; }
        .logo-area { display: flex; align-items: center; text-decoration: none; }
        .logo-img { height: 75px; width: auto; object-fit: contain; display: block; } 
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: var(--white); text-decoration: none; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 5px; transition: var(--transition-smooth); }
        .nav-links a:hover { color: var(--neon-green); }

        /* COMPONENTE INTERACTIVO DE DROPDOWN DE CATEGORÍAS */
        .dropdown-menu-container { position: relative; display: inline-block; }
        .dropdown-trigger { cursor: pointer; }
        .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background-color: var(--white); min-width: 260px; box-shadow: 0 12px 30px rgba(0,0,0,0.15); border-radius: 10px; padding: 12px 0; z-index: 1100; border: 1px solid #e2e8f0; transform: translateY(10px); transition: var(--transition-smooth); }
        .dropdown-content a { color: var(--text-dark) !important; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 600; }
        .dropdown-content a:hover { background-color: #f8fafc; color: var(--icon-blue) !important; padding-left: 28px; }
        .dropdown-menu-container:hover .dropdown-content, .dropdown-content.show { display: block; transform: translateY(0); }

        .nav-actions { display: flex; gap: 20px; align-items: center; }
        .search-bar { background: var(--white); padding: 10px 20px; border-radius: 30px; display: flex; align-items: center; width: 250px; border: 1px solid transparent; transition: var(--transition-smooth); }
        .search-bar:focus-within { border-color: var(--icon-blue); box-shadow: 0 0 10px rgba(78, 165, 206, 0.2); }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 14px; background: transparent; }
        .btn-neon { background: var(--neon-green); color: #000000; padding: 12px 30px; border-radius: 30px; text-decoration: none; font-size: 16px; font-weight: 700; border: none; cursor: pointer; transition: var(--transition-smooth); box-shadow: 0 4px 15px rgba(124, 245, 166, 0.3); }
        .btn-neon:hover { background: var(--neon-green-hover); transform: scale(1.05); box-shadow: 0 6px 20px rgba(124, 245, 166, 0.4); }

        /* HERO BANNER DINÁMICO */
        .hero-banner { width: 100%; height: 60vh; background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--white); }
        .hero-banner h1 { font-size: clamp(32px, 5vw, 56px); font-weight: 800; text-shadow: 0 4px 20px rgba(0,0,0,0.6); max-width: 950px; line-height: 1.25; opacity: 0; transform: translateY(30px); animation: heroFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; padding: 0 20px; }
        @keyframes heroFadeIn { to { opacity: 1; transform: translateY(0); } }

        /* DISEÑO ESTRUCTURAL */
        .container { max-width: 1240px; margin: 0 auto; padding: 0 24px; }
        .section-header { text-align: center; margin: 80px 0 50px; }
        .section-header h2 { font-size: clamp(28px, 4vw, 40px); font-weight: 800; color: var(--text-dark); line-height: 1.2; letter-spacing: -0.5px; }

        /* TARJETAS Y GRID */
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 30px; padding-bottom: 60px; }
        .service-card { background: var(--white); padding: 45px 30px; border-radius: 14px; text-align: center; box-shadow: var(--card-shadow); border: 1px solid #eaeaea; transition: var(--transition-smooth); position: relative; }
        .service-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-color: #cbd5e1; }
        .service-icon { font-size: 52px; color: var(--icon-blue); margin-bottom: 24px; display: block; }
        .service-img { width: 100%; height: 170px; object-fit: cover; border-radius: 10px; margin-bottom: 24px; }
        .btn-ver-mas { background: var(--neon-green); color: #000000; padding: 12px 28px; border-radius: 25px; text-decoration: none; font-size: 14px; font-weight: 700; display: inline-block; transition: var(--transition-smooth); border: none; cursor: pointer; }
        
        /* SECCIÓN VALORES Y MÁS */
        .value-section { background: linear-gradient(135deg, #1e333d 0%, #355c6b 100%); padding: 60px 0; color: var(--white); }
        .value-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
        .value-card { background: rgba(255, 255, 255, 0.04); padding: 24px 22px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.08); }

        /* FOOTER Y OTROS */
        .site-footer { background-color: var(--footer-dark); color: #ffffff; padding: 90px 0 45px; border-top: 4px solid var(--neon-green); }
        .wa-float { position: fixed; bottom: 25px; right: 25px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: grid; place-items: center; font-size: 32px; z-index: 2000; box-shadow: 0 6px 20px rgba(0,0,0,0.25); text-decoration: none; }
        
        /* RESPONSIVO BÁSICO */
        @media (max-width: 900px) { .nav-links, .search-bar { display: none; } .services-grid, .value-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="nav-bar">
            <a href="#" class="logo-area"><img src="Logo.png" alt="Logo" class="logo-img"></a>
            <nav class="nav-links">
                <div class="dropdown-menu-container">
                    <a class="dropdown-trigger">Ver Categorías ▾</a>
                    <div class="dropdown-content" id="nav-dropdown-cats"></div>
                </div>
                <a href="#nosotros">Proyectos</a>
                <a href="#catalogo">Tienda</a>
                <a href="#clientes">Reseñas</a>
                <a href="#contacto">Contáctanos ▾</a>
            </nav>
            <div class="nav-actions">
                <div class="search-bar"><input type="text" placeholder="Busca tu pieza..."><span>🔍</span></div>
                <a href="#" class="btn-neon" onclick="openWA('Hola, necesito asistencia técnica.')">¡Llama Ya!</a>
            </div>
        </div>
    </header>

    <section class="hero-banner"><div class="container"><h1 id="hero-title">Cargando...</h1></div></section>

    <div class="container" id="servicios">
        <div class="section-header"><h2>Reparamos Computadoras y Servidores</h2></div>
        <div class="services-grid" id="srv-c"></div>
    </div>

    <section class="value-section"><div class="container"><div id="cho-grid" class="value-grid"></div></div></section>

    <section class="features-section" id="nosotros"><div class="container"><div class="mission-vision-row"><div class="feature-box"><h4>Misión</h4><p id="m-t">Cargando...</p></div><div class="feature-box"><h4>Visión</h4><p id="v-t">Cargando...</p></div><div class="feature-box"><h4>Compromiso</h4><p id="c-t">Cargando...</p></div></div></div></section>

    <section class="catalog-section" id="catalogo"><div class="container"><div class="section-header"><h2>Catálogo de Productos</h2></div><div class="catalog-carousel" id="prod-c"></div></div></section>

    <section class="reviews-section" id="clientes"><div class="container"><div class="reviews-grid" id="rev-c"></div></div></section>

    <footer class="site-footer" id="contacto"><div class="container"><div class="final-copy">© 2026 iCare Tech CR.</div></div></footer>

    <a href="#" class="wa-float" onclick="openWA('Hola iCare Tech')"><i class="fab fa-whatsapp"></i></a>

    <script>
        const API = '/api';
        let allProducts = [], cacheServicios = [];

        function openWA(m) { window.open(`https://wa.me/50686390631?text=${encodeURIComponent(m)}`, "_blank"); }

        document.addEventListener("DOMContentLoaded", () => {
            fetch(`${API}/todo`)
                .then(r => {
                    if (!r.ok) throw new Error(`Error de servidor: ${r.status}`);
                    return r.json();
                })
                .then(data => {
                    if (data.config) {
                        document.getElementById('hero-title').innerText = data.config.hero_titulo || "Servicio Técnico Profesional";
                        document.getElementById('m-t').innerText = data.config.mision || "";
                        document.getElementById('v-t').innerText = data.config.vision || "";
                        document.getElementById('c-t').innerText = data.config.compromiso || "";
                    }
                    // Renderizado de servicios
                    const srvC = document.getElementById('srv-c');
                    if (srvC && data.servicios) {
                        data.servicios.forEach(s => { 
                            srvC.innerHTML += `<div class="service-card"><h3>${s.titulo}</h3><p>${s.descripcion}</p></div>`; 
                        });
                    }
                })
                .catch(err => {
                    console.error("Error al cargar datos:", err);
                    document.getElementById('hero-title').innerText = "Estamos realizando mantenimiento...";
                });
        });
    </script>
</body>
</html>
