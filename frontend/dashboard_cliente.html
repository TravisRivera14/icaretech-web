<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Operaciones | iCare Tech CR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0c10; --card: #1f2833; --accent: #00b4d8; --text: #f5f5f7; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #11141a; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .top-nav { display: flex; gap: 30px; margin-left: 40px; }
        .top-nav button { background: none; border: none; color: #8a99ad; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 15px; }
        .top-nav button:hover, .top-nav button.active { color: var(--accent); }
        
        .app-layout { display: flex; flex: 1; }
        .sidebar { width: 280px; background: #11141a; padding: 20px 0; border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; }
        .menu-title { font-size: 12px; color: #555; text-transform: uppercase; margin: 20px 20px 10px; font-weight: 600; }
        .nav-item { padding: 12px 20px; cursor: pointer; color: #8a99ad; font-size: 14px; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-item:hover { background: var(--card); color: var(--accent); }
        
        .submenu { list-style: none; padding-left: 45px; display: none; background: #0b0c10; }
        .submenu li { padding: 8px 0; cursor: pointer; color: #8a99ad; font-size: 13px; transition: 0.2s; }
        .submenu li:hover { color: var(--accent); }
        
        .main-content { flex: 1; padding: 40px; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: var(--accent); text-align: left; padding: 15px; border-bottom: 2px solid var(--accent); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header>
    <h1>iCare <span style="color:var(--accent)">OPS</span></h1>
    <nav class="top-nav" id="top-nav">
        <button onclick="showSection('datacenter')"><i class="fas fa-server"></i> Data Center</button>
        <button onclick="showSection('facturacion')"><i class="fas fa-file-invoice-dollar"></i> Facturación</button>
        <button onclick="showSection('tickets')"><i class="fas fa-ticket-alt"></i> Tickets</button>
        <button onclick="showSection('inventario')"><i class="fas fa-boxes"></i> Inventario</button>
    </nav>
</header>

<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div id="contenido-dinamico" class="card">
            <h2>Centro de Operaciones</h2>
        </div>
    </main>
</div>

<script>
    const menuData = {
        'datacenter': [{nombre: 'Resumen de Servidores'}, {nombre: 'Monitoreo'}, {nombre: 'Backups'}],
        'facturacion': [
            {nombre: 'Inicio'}, {nombre: 'Mi plan'}, {nombre: 'Clientes'}, {nombre: 'Productos'}, 
            {nombre: 'POS'}, {nombre: 'Facturación'}, {nombre: 'Proformas'}, {nombre: 'Recepción'}, 
            {nombre: 'Reportes'}, {nombre: 'Configuración'}
        ],
        'tickets': [{nombre: 'Crear Nuevo Ticket'}, {nombre: 'Tickets Activos'}, {nombre: 'Historial'}],
        'inventario': [{nombre: 'Equipos'}, {nombre: 'Piezas'}]
    };

    function showSection(sec) {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = `<div class="menu-title">${sec.toUpperCase()}</div>`;
        menuData[sec].forEach(item => {
            sidebar.innerHTML += `<div class="nav-item" onclick="render('${item.nombre}')">${item.nombre}</div>`;
        });
    }

    async function render(opcion) {
        const cont = document.getElementById('contenido-dinamico');
        cont.innerHTML = `<h2>${opcion}</h2><p>Cargando...</p>`;

        // Si es un módulo de formulario o vista especial, delegamos a renderModulo
        const modulosEspeciales = ['Crear Nuevo Ticket', 'Inicio', 'Mi plan', 'Clientes', 'Productos', 'POS', 'Facturación', 'Proformas', 'Recepción', 'Reportes', 'Configuración', 'Tickets Activos', 'Historial'];
        
        if (modulosEspeciales.includes(opcion)) {
            return renderModulo(opcion);
        }

        try {
            const res = await fetch('/api/cliente/datos-operativos', {credentials: 'include'});
            const data = await res.json();
            cont.innerHTML = `<h2>${opcion}</h2><p>Módulo de ${opcion} cargado desde el servidor.</p>`;
        } catch(e) { 
            cont.innerHTML = `<h2>Error</h2><p>No se pudo conectar al servidor.</p>`; 
        }
    }

    async function renderModulo(nombre) {
        const cont = document.getElementById('contenido-dinamico');
        
        if (nombre === 'Crear Nuevo Ticket') {
            cont.innerHTML = `
                <h2>Reportar Nuevo Requerimiento</h2>
                <form id="form-ticket" style="display:flex; flex-direction:column; gap:15px; max-width:600px;">
                    <input type="text" value="Empresa: ${sessionStorage.getItem('empresa') || 'Activa'}" disabled style="padding:10px; border-radius:5px; border:1px solid #444; background:#11141a; color:#8a99ad;">
                    <input type="text" id="ticketContacto" placeholder="Nombre completo" required style="padding:12px; border-radius:5px; border:1px solid #444; background:#0b0c10; color:#fff;">
                    <input type="tel" id="ticketWhatsApp" placeholder="WhatsApp" required style="padding:12px; border-radius:5px; border:1px solid #444; background:#0b0c10; color:#fff;">
                    <input type="text" id="ticketAsunto" placeholder="Asunto" required style="padding:12px; border-radius:5px; border:1px solid #444; background:#0b0c10; color:#fff;">
                    <textarea id="ticketDescripcion" placeholder="Detalle..." required style="padding:12px; border-radius:5px; border:1px solid #444; background:#0b0c10; color:#fff; height:120px;"></textarea>
                    <select id="prioridad" style="padding:12px; border-radius:5px; background:#0b0c10; color:#fff; border:1px solid #444;">
                        <option value="Baja">Baja</option><option value="Media">Media</option><option value="Alta">Alta</option>
                    </select>
                    <button type="submit" style="padding:15px; background:var(--accent); border:none; border-radius:5px; color:white; cursor:pointer;">Enviar Ticket</button>
                </form>`;
            document.getElementById('form-ticket').addEventListener('submit', crearTicket);
        } else {
            // Lógica para las otras secciones de facturación
            cont.innerHTML = `<h2>${nombre}</h2><div class="card"><p>Módulo de ${nombre} en construcción.</p></div>`;
        }
    }

    async function crearTicket(e) {
        e.preventDefault();
        const data = {
            asunto: document.getElementById('ticketAsunto').value,
            descripcion: document.getElementById('ticketDescripcion').value,
            prioridad: document.getElementById('prioridad').value,
            contacto: document.getElementById('ticketContacto').value,
            whatsapp: document.getElementById('ticketWhatsApp').value
        };
        const res = await fetch('/api/tickets/crear', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if((await res.json()).success) { alert("¡Ticket enviado!"); render('Tickets Activos'); }
    }

    showSection('facturacion');
</script>
</body>
</html>
