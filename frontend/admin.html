<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin iCare | Control Maestro Premium</title>
    <link rel="icon" href="Logo_Admin_v2.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --dark-bg: #0b0c10; --card-bg: #1f2833; --turquoise-main: #00b4d8; --turquoise-dark: #0077b6; --del: #ff3b30; --text-light: #f5f5f7; --text-secondary: #8a99ad; --border-smooth: rgba(255, 255, 255, 0.05); --radius-premium: 16px; --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); --shadow-premium: 0 10px 40px rgba(0, 0, 0, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.2px; }
        body { background: var(--dark-bg); color: var(--text-light); min-height: 100vh; display: flex; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 12, 16, 0.95); z-index: 99999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .login-card { background: var(--card-bg); padding: 45px; border-radius: 24px; box-shadow: var(--shadow-premium); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border-smooth); }
        .sidebar { width: 280px; background: #11141a; border-right: 1px solid var(--border-smooth); padding: 30px 20px; position: fixed; height: 100vh; }
        .sidebar-item { padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: var(--transition-smooth); margin-bottom: 6px; }
        .sidebar-item:hover, .sidebar-item.active { background: var(--card-bg); color: #ffffff; }
        .main-content { margin-left: 280px; flex: 1; padding: 40px 50px; }
        .tab-section { display: none; } .tab-section.active { display: block; }
        .card { background: var(--card-bg); padding: 30px; border-radius: var(--radius-premium); margin-bottom: 25px; border: 1px solid var(--border-smooth); }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border-smooth); background: var(--dark-bg); color: white; outline: none; }
        button { background: var(--turquoise-main); color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border-smooth); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>Control Maestro</h2>
        <form id="form-login-master">
            <input type="text" id="login-user" placeholder="Usuario" required>
            <input type="password" id="login-pass" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
        </form>
    </div>
</div>

<aside class="sidebar">
    <div class="sidebar-item active" onclick="switchTab('tab-tickets')"><i class="fas fa-headset"></i> Tickets</div>
    <div class="sidebar-item" onclick="switchTab('tab-empresas')"><i class="fas fa-building"></i> Empresas</div>
    <div class="sidebar-item" onclick="switchTab('tab-contenidos')"><i class="fas fa-sliders"></i> Contenidos</div>
</aside>

<main class="main-content">
    <section id="tab-tickets" class="tab-section active">
        <div class="card">
            <h2>Tickets de Soporte</h2>
            <table class="ticket-table" style="width:100%">
                <tbody id="tabla-tickets-soporte"></tbody>
            </table>
        </div>
    </section>

    <section id="tab-empresas" class="tab-section">
        <div class="card">
            <h2>Vincular Cliente</h2>
            <input type="text" id="newSupportEmpName" placeholder="Nombre empresa">
            <button onclick="agregarEmpresaSoporte()">+ Vincular</button>
        </div>
        <div class="card">
            <div id="lista-empresas-soporte-bajas"></div>
        </div>
    </section>

    <section id="tab-contenidos" class="tab-section">
        <div class="card">
            <h2>Gestión de Servicios</h2>
            <input type="text" id="sTitle" placeholder="Título Servicio">
            <textarea id="sDesc" placeholder="Descripción"></textarea>
            <button onclick="subirServicio()">Guardar Servicio</button>
        </div>
        <div class="card">
            <h2>Productos/Piezas</h2>
            <input type="text" id="pName" placeholder="Nombre producto">
            <input type="number" id="pPrice" placeholder="Precio">
            <button onclick="subirProducto()">Guardar Producto</button>
        </div>
    </section>
</main>

<script>
    const API = '/api';
    let cacheData = { servicios: [], productos: [], socios: [], empresas: [], beneficios: [], objetivos: [], resenas: [] };

    function switchTab(id) {
        document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function loadContent() {
        fetch(`${API}/todo`)
        .then(r => r.json())
        .then(data => {
            cacheData = data;
            renderTickets();
            renderEmpresas();
        });
    }

    function renderTickets() {
        fetch(`${API}/admin/tickets`)
        .then(r => r.json())
        .then(data => {
            const tbody = document.getElementById('tabla-tickets-soporte');
            tbody.innerHTML = data.map(t => `<tr><td>${t.empresa_nombre}</td><td>${t.asunto}</td><td>${t.estado}</td></tr>`).join('');
        });
    }

    function renderEmpresas() {
        const div = document.getElementById('lista-empresas-soporte-bajas');
        div.innerHTML = cacheData.empresas.map(e => `
            <div class="list-item">
                <span>${e.nombre}</span>
                <button onclick="del('empresas_recomiendan', ${e.id})">Eliminar</button>
            </div>`).join('');
    }

    function agregarEmpresaSoporte() {
        const nombre = document.getElementById('newSupportEmpName').value;
        fetch(`${API}/admin/empresas-soporte`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nombre})
        }).then(() => loadContent());
    }

    function subirServicio() {
        const data = {
            titulo: document.getElementById('sTitle').value,
            descripcion: document.getElementById('sDesc').value
        };
        fetch(`${API}/servicios`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(() => loadContent());
    }

    function subirProducto() {
        const data = {
            nombre: document.getElementById('pName').value,
            precio: document.getElementById('pPrice').value
        };
        fetch(`${API}/productos`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(() => loadContent());
    }

    function del(t, id) {
        fetch(`${API}/eliminar/${t}/${id}`, { method: 'DELETE' }).then(() => loadContent());
    }

    document.getElementById('form-login-master').onsubmit = (e) => {
        e.preventDefault();
        document.getElementById('login-overlay').style.display = 'none';
        loadContent();
    };
</script>
</body>
</html>
