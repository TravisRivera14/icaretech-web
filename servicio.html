<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Soporte | iCare Tech CR</title>
    <link rel="icon" href="Logo_Pestana_v2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-page: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-sec: #6e6e73;
            --accent-blue: #0071e3;
            --border-subtle: #d2d2d7;
            --nav-bg: rgba(255, 255, 255, 0.8);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-page); color: var(--text-main); overflow-x: hidden; line-height: 1.5; }

        header { 
            background: var(--nav-bg); 
            backdrop-filter: blur(20px);
            padding: 20px 40px; 
            position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid var(--border-subtle);
        }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; }
        .logo-img { height: 40px; width: auto; object-fit: contain; }

        .support-container { max-width: 600px; margin: 60px auto; padding: 0 20px; }
        .ticket-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 18px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .ticket-card h2 { font-size: 24px; font-weight: 600; margin-bottom: 10px; color: var(--text-main); text-align: center; }
        .ticket-card p { color: var(--text-sec); text-align: center; margin-bottom: 35px; font-size: 15px; }

        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.3px; }
        .form-control {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-subtle);
            outline: none; font-size: 15px; background: var(--bg-page);
        }
        .form-control:focus { border-color: var(--accent-blue); }
        
        .priority-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .priority-option {
            border: 1px solid var(--border-subtle); padding: 10px; border-radius: 8px; text-align: center;
            font-weight: 600; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        
        .priority-option.selected[data-value="Baja"] { background: #34c759; color: white; border-color: #34c759; }
        .priority-option.selected[data-value="Media"] { background: #ff9500; color: white; border-color: #ff9500; }
        .priority-option.selected[data-value="Alta"] { background: #ff3b30; color: white; border-color: #ff3b30; }

        .btn-submit {
            width: 100%; padding: 14px; border-radius: 980px; background: var(--accent-blue);
            color: white; font-weight: 600; border: none; cursor: pointer;
            transition: opacity 0.2s; font-size: 15px; margin-top: 15px;
        }
        .btn-submit:hover { opacity: 0.8; }
        
        .site-footer { color: var(--text-sec); padding: 45px 0; text-align: center; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <a href="index.html" class="logo-area">
                <img src="Logo.png" alt="iCareTech CR Logo" class="logo-img">
            </a>
        </div>
    </header>

    <div class="support-container">
        <div class="ticket-card">
            <h2>Centro de Soporte Técnico</h2>
            <p>Reporta tu requerimiento. Nuestro equipo de ingeniería lo atenderá.</p>
        
            <form id="ticketForm" onsubmit="enviarTicket(event)">
                <div class="form-group">
                    <label for="empresaSelect">Empresa</label>
                    <select id="empresaSelect" class="form-control" required>
                        <option value="">Cargando...</option>
                    </select>
                </div>
            <div class="form-group">
                <label for="ticketContacto">Contacto</label>
                <input type="text" id="ticketContacto" class="form-control" placeholder="Nombre completo" required>
            </div>

            <div class="form-group">
                <label for="ticketWhatsApp">WhatsApp de contacto</label>
                <input type="tel" id="ticketWhatsApp" class="form-control" placeholder="+506 8888 8888" required>
            </div>

            <div class="form-group">
                <label for="ticketAsunto">Asunto</label>
                <input type="text" id="ticketAsunto" class="form-control" placeholder="Ej: Servidor inaccesible" required>
            </div>

            <div class="form-group">
                <label for="ticketDescripcion">Descripción</label>
                <textarea id="ticketDescripcion" class="form-control" rows="4" placeholder="Detalle del problema..." required></textarea>
            </div>

            <div class="form-group">
                <label>Prioridad</label>
                <div class="priority-selector">
                    <div class="priority-option" data-value="Baja" onclick="selectPriority('Baja')">Baja</div>
                    <div class="priority-option" data-value="Media" onclick="selectPriority('Media')">Media</div>
                    <div class="priority-option selected" data-value="Alta" onclick="selectPriority('Alta')">Alta</div>
                </div>
            </div>

            <button type="submit" class="btn-submit">Enviar Ticket</button>
        </form>
    </div>
</div>

    <footer class="site-footer">
        <div>© 2026 iCare Tech CR.</div>
    </footer>

    <script>
        const API = '/api';
        let prioridadSeleccionada = "Alta";

        function selectPriority(val) {
            prioridadSeleccionada = val;
            document.querySelectorAll('.priority-option').forEach(opt => {
                if(opt.getAttribute('data-value') === val) opt.classList.add('selected');
                else opt.classList.remove('selected');
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetch(`${API}/todo`)
                .then(r => r.json())
                .then(data => {
                    const select = document.getElementById('empresaSelect');
                    if(data.empresas && data.empresas.length > 0) {
                        select.innerHTML = '<option value="">-- Selecciona una empresa --</option>';
                        data.empresas.forEach(emp => {
                            select.innerHTML += `<option value="${emp.id}">${emp.nombre}</option>`;
                        });
                    } else {
                        select.innerHTML = '<option value="">No hay empresas registradas</option>';
                    }
                }).catch(() => {
                    document.getElementById('empresaSelect').innerHTML = '<option value="">Error cargando empresas</option>';
                });
        });

        function enviarTicket(e) {
            e.preventDefault();
            const data = {
                empresa_id: document.getElementById('empresaSelect').value,
                contacto: document.getElementById('ticketContacto').value,
                whatsapp: document.getElementById('ticketWhatsApp').value, /* ¡AQUÍ ESTÁ LA MAGIA! AHORA SÍ SE ENVÍA */
                asunto: document.getElementById('ticketAsunto').value,
                descripcion: document.getElementById('ticketDescripcion').value,
                prioridad: prioridadSeleccionada
            };

            fetch(`${API}/tickets`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(res => {
                alert("¡Ticket creado con éxito!");
                document.getElementById('ticketForm').reset();
                selectPriority('Alta');
            })
            .catch(() => alert("Error al procesar el ticket. Reintenta más tarde."));
        }
    </script>
</body>
</html>
