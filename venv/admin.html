<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin</title>
</head>
<body>
    <h1>Gestionar Productos</h1>
    <input id="nombre" placeholder="Nombre">
    <input id="precio" placeholder="Precio">
    <button onclick="guardar()">Guardar</button>
    <hr>
    <div id="lista-admin"></div>

    <script>
        function guardar() {
            const data = { nombre: document.getElementById('nombre').value, precio: document.getElementById('precio').value };
            fetch('/api/productos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(() => location.reload());
        }

        fetch('/api/todo').then(r=>r.json()).then(data => {
            const l = document.getElementById('lista-admin');
            data.productos.forEach(p => {
                l.innerHTML += `<p>${p.nombre} <button onclick="fetch('/api/eliminar/productos/${p.id}', {method:'DELETE'}).then(()=>location.reload())">X</button></p>`;
            });
        });
    </script>
</body>
</html>
