<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acceso | iCare Tech CR</title>
    <link rel="icon" href="Logo_Pestana_v2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0b0c10;
            --card-bg: #1f2833;
            --text-light: #f5f5f7;
            --neon-blue: #00b4d8;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        
        body { background: var(--bg-dark); color: var(--text-light); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; }
        .recover-container { background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--border-color); width: 100%; max-width: 400px; text-align: center; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 15px; background: #11141a; border: 1px solid var(--border-color); color: white; border-radius: 8px; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; background: var(--neon-blue); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; margin-top: 10px; }
        .method-btn { background: #11141a; border: 1px solid var(--neon-blue); color: var(--neon-blue); margin-bottom: 10px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="recover-container">
        <img src="Logo.png" alt="Logo" style="width: 120px; margin-bottom: 20px;">
        <h2 id="title-text">Recuperar Acceso</h2>
        <p id="desc-text" style="color: #8a99ad; font-size: 14px; margin-bottom: 25px;">Selecciona cómo deseas recibir tu código de verificación.</p>
        
        <div id="step-1">
            <button class="method-btn" onclick="selectMethod('email')"><i class="fas fa-envelope"></i> Vía Correo Electrónico</button>
            <button class="method-btn" onclick="selectMethod('phone')"><i class="fas fa-phone"></i> Vía WhatsApp/SMS</button>
        </div>

        <div id="step-2" class="hidden">
            <div class="input-group">
                <input type="text" id="input-data" placeholder="Ingresa tu correo o teléfono">
            </div>
            <button onclick="solicitarCodigo()">Enviar Código</button>
        </div>

        <div class="links" style="margin-top: 20px;">
            <a href="login.html" style="color: #8a99ad; text-decoration: none; font-size: 14px;"><i class="fas fa-arrow-left"></i> Volver al Login</a>
        </div>
    </div>

    <script>
        let metodoSeleccionado = "";

        function selectMethod(method) {
            metodoSeleccionado = method;
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('title-text').innerText = method === 'email' ? "Recuperar por Correo" : "Recuperar por Teléfono";
            document.getElementById('input-data').placeholder = method === 'email' ? "Tu correo electrónico" : "Tu número de teléfono";
        }

        async function solicitarCodigo() {
            const dato = document.getElementById('input-data').value;
            
            // Aquí llamaríamos a la API para enviar el código
            alert(`Enviando código de verificación a ${dato} vía ${metodoSeleccionado}...`);
            
            // Simulación de flujo
            window.location.href = "login.html"; // Luego de esto, el usuario debería ir a una pantalla para ingresar el código
        }
    </script>
</body>
</html>
