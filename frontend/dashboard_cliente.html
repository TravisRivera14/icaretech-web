<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Operaciones | iCare Tech CR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0c10; --card: #1f2833; --accent: #00b4d8; --text: #f5f5f7; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #11141a; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .top-nav { display: flex; gap: 30px; margin-left: 40px; }
        .top-nav button { background: none; border: none; color: #8a99ad; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 15px; }
        .top-nav button:hover, .top-nav button.active { color: var(--accent); }
        
        .app-layout { display: flex; flex: 1; }
        .sidebar { width: 280px; background: #11141a; padding: 20px 0; border-right: 1px solid rgba(255,255,255,0.05); }
        .menu-title { font-size: 12px; color: #555; text-transform: uppercase; margin: 20px 20px 10px; font-weight: 600; }
        .nav-item { padding: 12px 20px; cursor: pointer; color: #8a99ad; font-size: 14px; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-item:hover { background: var(--card); color: var(--accent); }
        
        .submenu { list-style: none; padding-left: 45px; display: none; background: #0b0c10; }
        .submenu li { padding: 10px 0; cursor: pointer; color: #8a99ad; font-size: 13px; transition: 0.2s; }
        .submenu li:hover { color: var(--accent); }
        
        .main-content { flex: 1; padding: 40px; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: var(--accent); text-align: left; padding: 15px; border-bottom: 2px solid var(--accent); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header>
    <h1>iCare <span style="color:var(--accent)">OPS</span></h1>
    <nav class="top-nav" id="top-nav">
        <button onclick="showMainSection('datacenter')"><i class="fas fa-server"></i> Data Center</button>
        <button onclick="showMainSection('facturacion')"><i class="fas fa-file-invoice-dollar"></i> Facturación</button>
        <button onclick="showMainSection('tickets')"><i class="fas fa-ticket-alt"></i> Tickets</button>
        <button onclick="showMainSection('inventario')"><i class="fas fa-boxes"></i> Inventario</button>
    </nav>
</header>

<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
        <div id="contenido-dinamico" class="card">
            <h2>Panel de Control</h2>
            <p>Selecciona una sección superior para gestionar tus operaciones.</p>
        </div>
    </main>
</div>

<script>
    const menuData = {
        'facturacion': [
            { nombre: 'Facturas Emitidas', icon: 'fa-file-invoice' },
            { nombre: 'Nueva factura', icon: 'fa-file-plus' },
            { nombre: 'Nuevo tiquete', icon: 'fa-receipt' },
            { nombre: 'Documentos generados', icon: 'fa-list' }
        ],
        'datacenter': [
            { nombre: 'Resumen de Servidores', icon: 'fa-server' },
            { nombre: 'Backups y Seguridad', icon: 'fa-shield-alt' }
        ],
        'tickets': [
            { nombre: 'Tickets Activos', icon: 'fa-clock' },
            { nombre: 'Crear Nuevo Ticket', icon: 'fa-plus-circle' }
        ],
        'inventario': [
            { nombre: 'Equipos en Custodia', icon: 'fa-laptop' }
        ]
    };

    function showMainSection(section) {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = '<div class="menu-title">' + section.toUpperCase() + '</div>';
        
        menuData[section].forEach(item => {
            sidebar.innerHTML += `
                <div class="nav-item" onclick="renderModulo('${item.nombre}')">
                    <i class="fas ${item.icon}"></i> ${item.nombre}
                </div>`;
        });
        showMainSectionActive(section);
    }

    function showMainSectionActive(activeSection) {
        document.querySelectorAll('.top-nav button').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.toLowerCase().includes(activeSection)) btn.classList.add('active');
        });
    }

    async function renderModulo(nombre) {
        const contenedor = document.getElementById('contenido-dinamico');
        contenedor.innerHTML = `<h2>${nombre}</h2><p>Cargando datos...</p>`;
        
        try {
            const res = await fetch('/api/cliente/datos-operativos', { credentials: 'include' });
            if (!res.ok) throw new Error("Error al conectar con iCare Core");
            const data = await res.json();

            if (nombre === 'Facturas Emitidas') {
                contenedor.innerHTML = `<h2>${nombre}</h2>
                    <table>
                        <thead><tr><th>Consecutivo</th><th>Fecha</th><th>Monto</th><th>Estado</th></tr></thead>
                        <tbody>${data.facturas.map(f => `<tr><td>${f.consecutivo}</td><td>${f.fecha}</td><td>₡${f.monto}</td><td>${f.estado}</td></tr>`).join('')}</tbody>
                    </table>`;
            } else {
                contenedor.innerHTML = `<h2>${nombre}</h2><p>Módulo bajo mantenimiento.</p>`;
            }
        } catch (e) {
            contenedor.innerHTML = `<h2>Error</h2><p>${e.message}</p>`;
        }
    }

    // Inicializar
    showMainSection('facturacion');
</script>
</body>
</html>
