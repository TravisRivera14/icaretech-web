<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCare Tech CR | Soporte Técnico Avanzado y Seguridad Electrónica</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* MANTENEMOS TUS ESTILOS ORIGINALES */
        :root { --nav-bg: rgba(53, 92, 107, 0.6); --neon-green: #7cf5a6; --neon-green-hover: #65d98e; --icon-blue: #4ea5ce; --bg-light: #f4f7f6; --text-dark: #111111; --text-grey: #666666; --white: #ffffff; --footer-dark: #1a1a1a; --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); overflow-x: hidden; }
        header { background: var(--nav-bg); padding: 5px 40px; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; }
        .logo-img { height: 75px; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: var(--white); text-decoration: none; font-weight: 600; }
        .btn-neon { background: var(--neon-green); color: #000; padding: 12px 30px; border-radius: 30px; font-weight: 700; cursor: pointer; text-decoration: none; }
        .container { max-width: 1240px; margin: 0 auto; padding: 0 24px; }
        .hero-banner { width: 100%; height: 60vh; background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 30px; padding-bottom: 60px; }
        .service-card { background: white; padding: 45px 30px; border-radius: 14px; text-align: center; box-shadow: var(--card-shadow); }
        .btn-ver-mas { background: var(--neon-green); color: black; padding: 12px 28px; border-radius: 25px; border: none; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <div class="nav-bar">
            <a href="#" class="logo-area"><img src="Logo.png" alt="Logo" class="logo-img"></a>
            <nav class="nav-links">
                <a href="#servicios">Servicios</a>
                <a href="#catalogo">Tienda</a>
                <a href="#contacto">Contacto</a>
            </nav>
            <a href="#" class="btn-neon" onclick="openWA('Consulta')">¡Llama Ya!</a>
        </div>
    </header>

    <section class="hero-banner">
        <h1 id="hero-title">Cargando...</h1>
    </section>

    <div class="container" id="servicios">
        <div class="services-grid" id="srv-c"></div>
    </div>

    <script>
        const API = '/api';
        function openWA(m) { window.open(`https://wa.me/50686390631?text=${encodeURIComponent(m)}`, "_blank"); }

        document.addEventListener("DOMContentLoaded", () => {
            fetch(`${API}/todo`)
            .then(r => r.json())
            .then(data => {
                // RENDERIZADO SEGURO
                if (data.config) {
                    document.getElementById('hero-title').innerText = data.config.hero_titulo || "Servicio Técnico";
                }
                
                if (data.servicios && Array.isArray(data.servicios)) {
                    const srvC = document.getElementById('srv-c');
                    if(srvC) {
                        srvC.innerHTML = data.servicios.map(s => `
                            <div class="service-card">
                                <h3>${s.titulo}</h3>
                                <p>${s.descripcion}</p>
                                <button class="btn-ver-mas" onclick="alert('Detalle de ${s.id}')">Ver Más</button>
                            </div>`).join('');
                    }
                }
            })
            .catch(err => {
                console.error("Error al cargar datos:", err);
                document.getElementById('hero-title').innerText = "Bienvenido a iCare Tech CR";
            });
        });
    </script>
</body>
</html>
