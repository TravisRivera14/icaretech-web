<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iCare Tech CR</title>
</head>
<body>
    <h1>Catálogo</h1>
    <div id="lista"></div>
    <script>
        fetch('/api/todo')
            .then(r => r.json())
            .then(data => {
                const l = document.getElementById('lista');
                data.productos.forEach(p => {
                    l.innerHTML += `<div><h3>${p.nombre}</h3><p>Precio: ₡${p.precio}</p></div>`;
                });
            });
    </script>
</body>
</html>
